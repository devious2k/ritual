ess with which you should attend to your WM and you to the SW and preserve peace, order and harmony in the Lodge, so that the beauty of our Ceremonies be not marred by any impropriety; and if, unfortunately, any dissension should arise among the members of the Lodge, you are thereby instructed to hold out the olive branch, emblem of peace, betwixt the contending parties. Congratulates Officer."}, {"s": "DC", "t": "From centre of the Lodge with s..p and s..n. WM, who do you appoint your JD?"}, {"s": "WM", "t": "Bro. OP."}, {"s": "DC", "t": "squares the Lodge and takes Bro. OP to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. OP, I appoint you JD of this Lodge, and I invest you with your Collar and Jewel of Office. It is your duty to attend on the WM, and assist the Ws, in the active duties of the Lodge, such as the reception of Candidates into the different Degrees of the Order, and in the immediate practice of our Rites. This wand, the emblem of your office, I entrust to you, not doubting your vigilant attention. The dove is an emblem of celerity and peace, and indicates the swiftness with which you should attend the SW, and you to the JW, and preserve peace, order and harmony in the Lodge, so that the beauty of our Ceremonies be not marred by any impropriety; and if, unfortunately, any dissension should arise among the members of the Lodge, you are thereby instructed to hold out the olive branch, emblem of peace, betwixt the contending parties. Congratulates Officer."}, {"s": "DC", "t": "From centre of Lodge with s..p and s..n. WM, who do you appoint your ADC?"}, {"s": "WM", "t": "Bro. RS."}, {"s": "DC", "t": "squares the Lodge and takes Bro. RS to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. RS, you have been appointed ADC of the Lodge and I now invest you with the Collar and Jewel of your Office. Appropriate instructions from the WM who then congratulates the Officer. ADC continues with the investiture. ADC From the centre of the Lodge with s..p and s..n. WM, who do appoint the Organist of the Lodge?"}, {"s": "WM", "t": "Bro. ST, ADC squares the Lodge and takes Bro. ST to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. ST, you are appointed Organist of the Lodge and I now invest you with the Collar and Jewel of your Office. Appropriate instructions from the WM who then congratulates the Officer. ADC From centre of the Lodge with s..p and s..n. WM, who do you appoint Assistant Secretary of the Lodge?"}, {"s": "WM", "t": "Bro. TU. ADC squares the Lodge and takes Bro. TU to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. TU, you have been appointed Assistant Secretary of the Lodge and I now invest you with the Collar and Jewel of your Office. Appropriate instructions from the WM who then congratulate the Officer. ADC From centre of the Lodge with s..p and s..n. WM, who do you appoint I.G. of the Lodge?"}, {"s": "WM", "t": "Bro. WX. ADC squares the Lodge and takes Bro. WX to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. WX, you are appointed IG of this Lodge, and I invest you with the Collar and Jewel of your office. Your duty is to admit Masons on proof, receive Candidates in due from, and obey the commands of the JW. The cross-swords, which are the emblem of your office, refer to two of the four cardinal Virtues, namely, Temperance and Fortitude; they also point out to you, that while with one point you admit the Candidate, you will with the other guard the entrance of the Lodge. Congratulates Officer. ADC From centre of the Lodge with s..p and s..n. Who do you appoint Stewards of the Lodge?"}, {"s": "WM", "t": "Bros. ---- The ADC assisted by the DC collect the Brethren from their seats and present them individually to the WM who invests them from the left hand side of the pedestal they are then lined up in front of the WM who instructs them as follows. Bros. you are appointed Stewards of this Lodge, and I invest you with your Collars and Jewels of Office. Your duties are to introduce visitors, and see that they are properly accommodated, to assist in the collection of the duties and Subscriptions, to keep an eye on the Lodge expenses at refreshment, and to see that the tables are properly furnished, and that every Brother is suitably provided for; and generally to assist the Ds and other officers in performing their respective duties. Your regular and early attendance will be the best proof of your zeal and attachment. Brethren are then escorted to their seats by the ADC assisted by the DC. ADC From centre of the Lodge with s..p and s..n. WM, Bro. YZ, having being elected T of the Lodge is it now your wish to invest him?"}, {"s": "WM", "t": "It is Bro. ADC. At this point the IG takes the place of the T during the T investiture. ADC squares the Lodge and takes Bro. YZ to the left side of the WM's pedestal and return him to the NW Corner for him to retire after being invested. Bro. YZ, you have been appointed T of this Lodge, and I invest you with the Collar and Jewel of your Office. Your duty is to keep off all cowans and intruders to Masonry, and see that Candidates are properly prepared. If it should at any time unfortunately happen that a Brother should present himself in a state of inebriety, it will be your duty to report the same to the IG; and he to the JW, that the responsibility of his admission rest not upon you. As the sword in the hands of the Tyler is to enable him to keep off all cowans, so it symbolically teaches us to set a guard upon our tongues, and place a watch at the entrance of our thoughts, thereby excluding every unqualified thought, word, or deed, and endeavouring to preserve a conscience void of offence against God and man. ADC That completes the investitures of the Officers, WM. Address to the WM is delivered from the NW corner. PM WM, you having been Installed in the Chair of this Worthy and Worshipful Lodge cannot be insensible to the obligations which devolve on you as its Head, nor of the responsibility for the faithful Discharge of the Duties annexed to the Appointment; the Honour, Reputation, and Usefulness of this Lodge will materially depend on the Skill and Assiduity with which you manage its concerns, while the Happiness of its members will generally be promoted in proportion to the Zeal and Ability with which you promulgate the Genuine Principles of the Institution; as a pattern for imitation consider the Glorious Luminary of Nature, which rising in the East, diffuses Light and Lustre to all within its circle: in like manner it will be your peculiar province to communicate Light and Instruction to the Brethren of your Lodge; forcibly impress upon them the Dignity and high Importance of Masonry, seriously admonish them never to disgrace it, charge them to practise out of the Lodge those duties they have been taught in it, and by virtuous, amiable and discreet conduct prove to the world the happy and beneficial effects of our ancient Institution, so that when any one is said to be a member of it, the world may know he is one to whom the Burdened Heart may pour forth its Sorrows, to whom the Distressed may prefer their Suit, whose Hand is guided by Justice, and whose Heart is expanded by Benevolence; in fine. W. Master, by a strict observance of the Bylaws of your Lodge, the Constitutions of Masonry, but above all by the use of the Sacred Writings, which are given as the Rule and Guide of your Faith, you will be enabled to lay up a Crown of Joy and Rejoicing, which will continue when time with you shall be no more, and God grant you health and strength to perform the duties of your high office with satisfaction to yourself, and advantage to the Lodge. Address to the Wardens is delivered from the N side. PM Bro. Ws be upstanding. Bro. S and J Wardens, the WM having appointed you to his principal offices, you are to consider yourselves, by the acceptance thereof, as pledged to a strict performance of the duties attached thereto, and to a regular attendance during the time for which you are appointed. You are too well acquainted with the principles of Masonry and the laws of our Institution to warrant any distrust that you will be found wanting in the discharge of the Duties of your respective Offices; suffice it to say, that what you observe praiseworthy in others you will carefully imitate, and what in them may appear defective you will in yourselves amend; you ought to be examples of Good Order and Regularity, for it is only by paying due observance to the Laws in or own conduct we can reasonably expect compliance to them from others; you are assiduously to assist the WM in the discharge of the duties of his important trust, by communicating light and imparting knowledge to all whom he may place under your direction. From the spirit you have hitherto evinced, we entertain no doubt your future conduct will be such as to merit the esteem of the Brethren, and the gratifying testimony of a clear conscience. Bro. W's be seated. Address to the Brethren is delivered from the E. Brethren of the Vulcan Lodge be upstanding. Brethren, such is the nature of our Constitution, that as some must of necessity rule and teach, so others of course must learn to submit and obey: humility in each is an essential qualification. The Brethren whom the WM has selected to assist him in the ruling and governing of the Lodge are too well acquainted with the principles of Masonry and the Laws of our Institution to warrant any distrust that they will be found wanting in the discharge of the duties of their respective offices, or that they will exceed the power with which they are entrusted, and you, Brethren, are of too generous a disposition to envy their preferment; I therefore trust we shall have but one aim in view, to please each other, and unite in the grand design of being happy and communicating happiness, and as this Association has been formed and perfected with so much unanimity and concord, long may it continue; may Brotherly Love and affection ever distinguish us as men and Masons; may the principles and tenets of our profession, which are founded on the basis of religious virtue, teach us to measure our Actions by the Rule of Rectitude, square our Conduct by the Principles of Morality, and guide our Inclinations and even our Thoughts within the Compass of Propriety; hence, we shall learn to be meek, humble, and resigned, to be faithful to our God, our Country, and our Laws, to drop a tear of sympathy on the failings of a Bro., and to pour the healing balm of consolation in the bosom of the afflicted. May these principles and tenets be transmitted pure and unpolluted through this L. from generation to generation. Be seated Brethren. Presentation of the PM's Jewel to the IPM is an informal address delivered at the right side of the WM's pedestal. Other Lodge Business"}, {"s": "WM", "t": "One k..k followed by S and JWs. Brethren for the first time I rise to enquire if any brother has ought to propose for the good of Freemasonry in general or this the Vulcan Lodge No. 4510 in particular. Bro. Sec. are there any communications from the Grand Lodge. Sec. reads communications from Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Grand Lodge. If present greetings are given by G Officers."}, {"s": "WM", "t": "One k..k followed by S and JWs. Brethren for the second time I rise etc., Bro. Sec are there any communications from Prov. Grand Lodge. Sec. reads communication from Prov. Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Provincial Grand Lodge. Greetings from PGL given by the most recently appointed PGO of the Lodge present."}, {"s": "WM", "t": "One k..k followed by S and JWs. Brethren for the third time I rise etc., Bro. Sec are there any further communications. Sec. reads any other communication."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications but I do have apologies from .. Proposition/notice of motion and any other business given at this point."}, {"s": "DC", "t": "Visiting Brethren wishing to give greetings may now do so commencing on the left of the WM and proceeding in a clockwise direction round the Lodge Room. Done."}, {"s": "SW", "t": "Brethren of the Vulcan Lodge No. 4510 upstanding."}, {"s": "ALL", "t": "With s..p and s..n. Hearty greetings WM. If a `Ruler' is present, his ADC will organise his departure accompanied by Officers of GL and PGL before the WM closes the Lodge. If a `representative' is present he will remain until the Lodge is formally closed. Closing the Lodge Generally The WM gives one k..k , followed by the S and JWs."}, {"s": "WM", "t": "Brethren, assist me to close the Lodge. All rise. Bro. JW. JW with s..p and s..n What is the constant care of every Mason?"}, {"s": "JW", "t": "To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done. JW drops s..n"}, {"s": "JW", "t": "Bro. IG With s..p and s..n prove the Lodge close Tyled."}, {"s": "IG", "t": "Bro. IG drops s..n gives three k..s, which are answered by the Tyler; he takes the s..p and gives the s..n of the First Degree, and says, Bro. JW, the Lodge is closed tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n. WM, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro. SW. SW with s..p and s..n the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren in the First Degree. The Brethren take the s..p and stand to order with the s..n of an EAFM."}, {"s": "WM", "t": "Bro. SW, your constant place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "As the Sun sets in the West to close the day, so the SW is placed in the West to close the Lodge, by command of the"}, {"s": "WM", "t": "after having seen that every Brother has had his due."}, {"s": "WM", "t": "And has every Bro. had his due?"}, {"s": "SW", "t": "To the best of my masonic belief they have WM."}, {"s": "WM", "t": "Brethren, before we close the Lodge."}, {"s": "Chap", "t": "Let us with allreverence and humility express our gratitude to the Great Architect of the Universe, for favours already received, and may He continue to preserve our order by cementing and adorning it with every moral and social virtue."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro. SW the labours of the evening being ended, you have my command to close the Lodge. Gives the k..s."}, {"s": "SW", "t": "Brethren, in the name of the Great Architect of the universe, and by command of the WM, I close the Lodge. Gives the k..s when all drop s..n."}, {"s": "JW", "t": "And it is closed accordingly, until the third Monday of lodges of emergency excepted, of which every subscribing Bro. will receive due notice. Gives the k..s, followed by the IG and T. The JD, without wand, goes directly to the JW's chair, turns the first degree TB switches off his light then switches out the SW's light. The SD switches out the WM's light. The IPM, closes the VoSL and C..s placing the C..s with the points inside the angle of the S..e., pointing W. He gives CB and returns to his chair. The SW lowers his c..n and the JW raises his simultaneously."}, {"s": "IPM", "t": "Brethren nothing now remains but according to ancient custom to lock up our s..s in a safe and sacred repository of the Heart uniting in the act of fidelity, fidelity, fidelity all strike LB with their RH's on each of these words and may God preserve the order all raise RH to R shoulder palm forwards."}, {"s": "WM", "t": "I extend a hearty invitation to all our visitors to stay to our after meeting and I hope as many as possible of our own Brethren will stay to entertain them. The ALMS box will be in the hands of the IG for those not staying to the After Meeting."}, {"s": "DC", "t": "I will thank the Brethren to remain standing while the WM accompanied by his Ws, Officers of GL, PGL, and IM's retire. Bro. Organist may we have the closing ode please. The ADC exchanges CBs with the JD, and commences to square the Lodge followed by the JD At the NE corner he exchanges CB with the SD and continues to s..e the Lodge exchanging a CB with the J and SWs who exit their chairs from the left following the Ds. as they pass, after exchanging CBs. with the WM. The ADC, Ds and Ws continue to s..e the Lodge to the door followed by the WM, Rep. of RWPGM, Officers of GL, PGL and IMs. who exit through the D's crossed wands. The IG stands inside the door of the Lodge with the Alms Box. The Tyler stands outside the door with s..d."}]};

const ROLE_NAMES = {
  'WM': 'Worshipful Master',
  'SW': 'Senior Warden',
  'JW': 'Junior Warden',
  'SD': 'Senior Deacon',
  'JD': 'Junior Deacon',
  'IG': 'Inner Guard',
  'DC': 'Director of Ceremonies',
  'Tyler': 'Tyler',
  'Chap': 'Chaplain',
  'SEC': 'Secretary',
  'IPM': 'Immediate Past Master',
  'CAN': 'Candidate',
  'ALL': 'All Brethren',
  'JD & CAN': 'JD & Candidate',
  'SD & CAN': 'SD & Candidate',
};

const CEREMONY_ICONS = {
  '1st Degree - Initiation': '1°',
  '2nd Degree - Passing': '2°',

};

// ─── STATE ───
let S = {
  screen: 'select-ceremony', // select-ceremony, select-role, practice
  ceremony: null,
  role: null,
  mode: 'overview', // overview, script, cue, quiz, checklist
  cueIdx: 0,
  cueRevealed: false,
  quizIdx: 0,
  quizAnswer: '',
  quizFeedback: null,
  quizScore: 0,
  quizTotal: 0,
  checked: {},
};

// Load saved state
try {
  const saved = JSON.parse(sessionStorage.getItem('ritual-practice') || '{}');
  if (saved.checked) S.checked = saved.checked;
} catch(e) {}

function save() {
  try { sessionStorage.setItem('ritual-practice', JSON.stringify({ checked: S.checked })); } catch(e) {}
}

// ─── HELPERS ───
function getLines() { return CEREMONIES[S.ceremony] || []; }

function getMyLines() {
  return getLines().map((l, i) => ({...l, idx: i})).filter(l => l.s === S.role);
}

function getCueCards() {
  const lines = getLines();
  const cards = [];
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].s === S.role) {
      // Find previous non-direction speaker lines as context
      const context = [];
      for (let j = Math.max(0, i - 3); j < i; j++) {
        if (lines[j].s !== '_dir') {
          context.push(lines[j]);
        } else {
          context.push(lines[j]);
        }
      }
      cards.push({
        context: context,
        line: lines[i],
        idx: i,
      });
    }
  }
  return cards;
}

function getRolesForCeremony() {
  const lines = getLines();
  const counts = {};
  lines.forEach(l => {
    if (l.s !== '_dir' && l.s !== 'ALL') {
      counts[l.s] = (counts[l.s] || 0) + 1;
    }
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

// Expand Masonic abbreviations so spoken full titles match abbreviated text
const ABBREV_MAP = {
  'wm': 'worshipful master', 'sw': 'senior warden', 'jw': 'junior warden',
  'sd': 'senior deacon', 'jd': 'junior deacon', 'ig': 'inner guard',
  'dc': 'director of ceremonies', 'sec': 'secretary', 'ipm': 'immediate past master',
  'can': 'candidate', 'chap': 'chaplain', 'gl': 'grand lodge', 'pgl': 'provincial grand lodge',
  'im': 'installed master', 'cb': 'courteous bow', 'sq': 'square',
  "wm's": 'worshipful masters', "sw's": 'senior wardens', "jw's": 'junior wardens',
  "sd's": 'senior deacons', "jd's": 'junior deacons',
  "d's": 'deacons', "w's": 'wardens', "im's": 'installed masters',
};

function expandAbbrevs(str) {
  return str.replace(/\b[\w']+\b/g, w => {
    const lower = w.toLowerCase();
    return ABBREV_MAP[lower] || w;
  });
}

function similarity(a, b) {
  if (!a || !b) return 0;
  a = expandAbbrevs(a).replace(/[.,!?;:\'"\"]/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
  b = expandAbbrevs(b).replace(/[.,!?;:\'"\"]/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
  if (a === b) return 1;
  const wa = a.split(' '), wb = b.split(' ');
  let matches = 0;
  wb.forEach(w => { if (wa.includes(w)) matches++; });
  return matches / Math.max(wa.length, wb.length);
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function checkedKey(idx) { return S.ceremony + '|' + S.role + '|' + idx; }

function renderScript() {
  const lines = getLines();
  let h = '<div class="card"><div class="section-title">Full Ceremony Script</div>';
  h += `<p style="font-size:13px;color:#7a8ba8;margin-bottom:16px;">Your lines (${S.role}) are highlighted in gold.</p>`;
  
  for (const l of lines) {
    const isMe = l.s === S.role;
    const isDir = l.s === '_dir';
    
    h += `<div class="line-block${isMe ? ' my-line' : ''}">`;
    if (isDir) {
      h += `<div class="dir-text">${esc(l.t)}</div>`;
    } else {
      h += `<div class="speaker${isMe ? ' my-speaker' : ''}">${l.s}</div>`;
      h += `<div class="text">${esc(l.t)}</div>`;
    }
    h += '</div>';
  }
  
  h += '</div>';
  return h;
}

function renderCue() {
  const cards = getCueCards();
  if (cards.length === 0) return '<div class="card"><p>No lines found for this role in this ceremony.</p></div>';
  
  const idx = S.cueIdx % cards.length;
  const card = cards[idx];
  const progress = ((idx + 1) / cards.length) * 100;

  let h = `<div class="card cue-card pillared">
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div style="font-size:12px;color:#7a8ba8;margin-bottom:16px;">${idx + 1} of ${cards.length}</div>`;

  // Context lines (preceding dialogue)
  if (card.context.length > 0) {
    h += '<div class="context-lines"><div class="ctx-label">Preceding lines</div>';
    for (const c of card.context) {
      if (c.s === '_dir') {
        h += `<div class="ctx-line" style="font-style:italic;color:#9a7050;">${esc(c.t)}</div>`;
      } else {
        h += `<div class="ctx-line"><span class="ctx-speaker">${c.s}:</span> ${esc(c.t)}</div>`;
      }
    }
    h += '</div>';
  }

  h += `<div class="cue-label" style="margin-top:16px;">Your Response (${S.role})</div>`;
  
  if (S.cueRevealed) {
    h += `<div class="your-line">${esc(card.line.t)}</div>`;
  } else {
    h += `<div class="your-line hidden-line" onclick="S.cueRevealed=true;render()">Tap to reveal your line</div>`;
    h += `<button class="mic-btn ${hasVoiceSupport() ? '' : 'unsupported'}" id="micBtn"
      ontouchstart="event.preventDefault();startVoice('cue')" ontouchend="event.preventDefault();stopVoice()"
      onmousedown="startVoice('cue')" onmouseup="stopVoice()">&#x1F3A4;</button>
    <div class="mic-hint">${hasVoiceSupport() ? 'Hold to speak — reveals on release' : ''}</div>
    <div class="voice-transcript" id="voiceTranscript"></div>`;
  }

  h += `<div class="btn-nav">
    <button class="btn btn-ghost" onclick="prevCue()" ${idx === 0 ? 'disabled style="opacity:0.4"' : ''}>← Previous</button>
    ${!S.cueRevealed
      ? `<button class="btn btn-primary" onclick="S.cueRevealed=true;render()">Reveal</button>`
      : `<button class="btn btn-primary" onclick="nextCue()">${idx < cards.length - 1 ? 'Next →' : 'Restart ↺'}</button>`
    }
  </div></div>`;

  return h;
}

function renderQuiz() {
  const cards = getCueCards();
  if (cards.length === 0) return '<div class="card"><p>No lines to quiz on.</p></div>';

  const idx = S.quizIdx % cards.length;
  const card = cards[idx];

  let h = `<div class="card">
    <div class="section-title">Test Your Knowledge</div>
    <div class="score-display">Score: ${S.quizScore} / ${S.quizTotal} ${S.quizTotal > 0 ? '(' + Math.round(S.quizScore/S.quizTotal*100) + '%)' : ''}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(idx + 1) / cards.length * 100}%"></div></div>`;

  if (card.context.length > 0) {
    h += '<div class="context-lines"><div class="ctx-label">Preceding lines</div>';
    for (const c of card.context) {
      if (c.s === '_dir') {
        h += `<div class="ctx-line" style="font-style:italic;color:#9a7050;">${esc(c.t)}</div>`;
      } else {
        h += `<div class="ctx-line"><span class="ctx-speaker">${c.s}:</span> ${esc(c.t)}</div>`;
      }
    }
    h += '</div>';
  }

  h += `<label style="font-size:12px;font-weight:600;color:#d4af37;display:block;margin:16px 0 6px;text-transform:uppercase;letter-spacing:1px;">Your response (${S.role}):</label>

    <button class="mic-btn ${hasVoiceSupport() ? '' : 'unsupported'}" id="micBtn"
      ontouchstart="event.preventDefault();startVoice('quiz')" ontouchend="event.preventDefault();stopVoice()"
      onmousedown="startVoice('quiz')" onmouseup="stopVoice()">&#x1F3A4;</button>
    <div class="mic-hint">${hasVoiceSupport() ? 'Hold to speak — releases to submit' : 'Voice not supported in this browser'}</div>
    <div class="voice-transcript" id="voiceTranscript"></div>`;

  if (S.quizFeedback !== null) {
    const sim = similarity(S.quizAnswer, card.line.t);
    const good = sim > 0.6;
    h += `<div class="feedback ${good ? 'correct' : 'incorrect'}">
      <strong>${good ? '✓ Well done!' : 'Keep practising!'}</strong>
      <span style="font-size:12px;opacity:0.8;"> (${Math.round(sim * 100)}% match)</span>
      <br><br><strong>Correct answer:</strong><br>"${esc(card.line.t)}"
    </div>`;
  }

  h += `<div class="btn-nav">
    ${S.quizFeedback === null
      ? `<button class="btn btn-primary" onclick="checkQuiz()">Check Answer</button>
         <button class="btn btn-ghost" onclick="skipQuiz()">Skip</button>`
      : `<button class="btn btn-primary" onclick="nextQuizQ()">Next →</button>`
    }

  return h;
}

function renderChecklist(myLines) {
  const total = myLines.length;
  const checked = myLines.filter((_, i) => S.checked[checkedKey(i)]).length;
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;

  let h = `<div class="card">
    <div class="section-title">Mastery Checklist</div>
    <p style="font-size:13px;color:#7a8ba8;margin-bottom:12px;">Tick off each line as you master it.</p>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="text-align:center;font-size:13px;color:#7a8ba8;margin-bottom:16px;">${checked} / ${total} mastered (${pct}%)</div>`;

  myLines.forEach((l, i) => {
    const key = checkedKey(i);
    const isChecked = S.checked[key];
    const preview = l.t.length > 100 ? l.t.substring(0, 100) + '...' : l.t;
    h += `<div class="checklist-item">
      <div class="check-box ${isChecked ? 'checked' : ''}" onclick="toggleCheck('${key}')"></div>
      <div class="check-label">${esc(preview)}</div>
    </div>`;
  });

  h += `<div class="btn-nav" style="margin-top:16px;">
    <button class="btn btn-ghost btn-sm" onclick="clearChecks()">Reset All</button>
  </div></div>`;

  return h;
}

// ─── ACTIONS ───
function pickCeremony(name) {
  S.ceremony = name;
  S.screen = 'select-role';
  render();
}

function pickRole(role) {
  S.role = role;
  S.screen = 'practice';
  S.mode = 'overview';
  S.cueIdx = 0;
  S.cueRevealed = false;
  S.quizIdx = 0;
  S.quizAnswer = '';
  S.quizFeedback = null;
  S.quizScore = 0;
  S.quizTotal = 0;
  render();
}

function goBack() {
  S.screen = 'select-role';
  render();
}

function setMode(m) {
  S.mode = m;
  if (m === 'cue') { S.cueIdx = 0; S.cueRevealed = false; }
  if (m === 'quiz') { S.quizIdx = 0; S.quizAnswer = ''; S.quizFeedback = null; }
  render();
}

function prevCue() {
  if (S.cueIdx > 0) { S.cueIdx--; S.cueRevealed = false; render(); }
}

function nextCue() {
  const cards = getCueCards();
  S.cueIdx = (S.cueIdx + 1) % cards.length;
  S.cueRevealed = false;
  render();
}

function checkQuiz() {
  const cards = getCueCards();
  const card = cards[S.quizIdx % cards.length];
  const sim = similarity(S.quizAnswer, card.line.t);
  S.quizTotal++;
  if (sim > 0.6) S.quizScore++;
  S.quizFeedback = true;
  render();
}

function skipQuiz() {
  const cards = getCueCards();
  S.quizIdx = (S.quizIdx + 1) % cards.length;
  S.quizAnswer = '';
  S.quizFeedback = null;
  render();
}

function nextQuizQ() {
  const cards = getCueCards();
  S.quizIdx = (S.quizIdx + 1) % cards.length;
  S.quizAnswer = '';
  S.quizFeedback = null;
  render();
}

function toggleCheck(key) {
  S.checked[key] = !S.checked[key];
  if (!S.checked[key]) delete S.checked[key];
  save();
  render();
}

function clearChecks() {
  const myLines = getMyLines();
  myLines.forEach((_, i) => { delete S.checked[checkedKey(i)]; });
  save();
  render();
}

// ─── VOICE INPUT (Web Speech API) ───
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let voiceActive = false;

function hasVoiceSupport() { return !!SpeechRecognition; }

function startVoice(mode) {
  if (!hasVoiceSupport() || voiceActive) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-GB';
  recognition.interimResults = true;
  recognition.continuous = false;

  const micBtn = document.getElementById('micBtn');
  const transcript = document.getElementById('voiceTranscript');
  if (micBtn) micBtn.classList.add('recording');
  voiceActive = true;

  let finalText = '';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (transcript) transcript.textContent = finalText || interim || '';
    if (mode === 'quiz') {
      S.quizAnswer = finalText || interim || '';
      const input = document.getElementById('quizInput');
      if (input) input.value = S.quizAnswer;
    }
  };

  recognition.onend = () => {
    voiceActive = false;
    if (micBtn) micBtn.classList.remove('recording');
    if (mode === 'quiz' && finalText.trim()) {
      S.quizAnswer = finalText.trim();
      checkQuiz();
    } else if (mode === 'cue' && finalText.trim()) {
      S.cueRevealed = true;
      render();
    }
  };

  recognition.onerror = (e) => {
    voiceActive = false;
    if (micBtn) micBtn.classList.remove('recording');
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      if (transcript) transcript.textContent = 'Voice error — try again';
    }
  };

  recognition.start();
}

function stopVoice() {
  if (recognition && voiceActive) {
    recognition.stop();
  }
}

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
