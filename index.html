the construction of which he was, as you no doubt are well aware, the principal Architect. The manner of his death was as follows: Bro Wardens. The Wardens advance. The SW stands on the left of the Can., the JW on his right D's prepare the G..e. - Fifteen F.Cs., of that superior class appointed to preside over the rest, finding that the work was nearly completed, and that they were not in possession of the s..s of the Third Degree, conspired to obtain them by any means, and even to have recourse to violence; at the moment, however, of carrying their conspiracy into execution, twelve of the fifteen recanted, but three of a more determined and atrocious character than the rest persisted in their impious design, in the prosecution of which they planted themselves respectively at the E., N., and S., entrances of the Temple, wither our M. had retired to pay his adoration to the MOST HIGH, as was his wonted custom at the hour of high twelve. Having finished his devotions, he attempted to return by the S. entrance, where he was opposed by the first of those ruffians, who, for want of other weapons, had armed himself with a heavy p..b r..e, and in a threatening manner demanded the s..s of a MM, warning him that death would be the consequence of a refusal; but our M., true to his O..i..n, answered that those s..s were known but to t..e in the world, and without the consent and co-operation of the other t..o, he neither could nor would divulge them, but intimated he had no doubt that patience and industry would in due time entitle the worthy Mason to a participation of them, but that, for his own part, he would rather suffer death than betray the sacred trust reposed in him. This answer not proving satisfactory, the ruffian aimed a violent blow at the h..d of our M., but being startled by the firmness of his demeanour, missed his f..e..d, and only glanced on this r..t t..e, here the JW may touch the Can. r..t t..e with p..b r..e, but with such force as to cause him to reel and sink on his l..t k..e here the Can may sink on his l..e k..e. Recovering from this shock, he made for the N. entrance, where he was accosted by the second of those ruffians, to whom he gave a similar answer with undiminished firmness, when the ruffian, who was armed with the l..l, struck him a violent blow on the l..t t..e here the SW may touch the Can.'s l..t t..e, which brought him to the ground on his r..t k..e here the Can.'s may sink on his r..t k..e. Finding this retreat cut off at both these points, he staggered faint and bleeding to the E. entrance, where the third ruffian was posted, who received a similar answer to this insolent demand (for even at this trying moment our M. remained firm and unshaken), when the villain, who was armed with a heavy m..l struck him a violent blow on the f..e..d, here the WM may touch the Can's f..e..d with m..l, which laid him l..s at this feet, which the Can may imitate. The two W\u2019s l..d him to the f..r the D's covering him with a s..t. The W's stand at the corners of, the s..e at the C's f..t, the D's at the corners at his h..d."}, {"s": "ALL", "t": "Stand to order with s..n of F..y except WM, W's and D's who stand with p..l s..n."}, {"s": "WM", "t": "The Brethren will take notice that in the recent ceremony, as well as in his present situation, our Brother has been made to represent one of the brightest characters recorded in the annals of Masonry, namely, HA, who lost his life in consequence of his unshaken fidelity to the sacred trust reposed in him; and I hope this will make a lasting impression on his and your minds, should you ever be placed in a similar state of trial."}, {"s": "WM", "t": "Bro JW will you endeavour to raise the representative of our M by the EA's g..p. Which he does, and reports with p..l s..n."}, {"s": "JW", "t": "WM, it proves a s..p. The JW and SW s..e the g..e taking up each others posts. The SW moving S as the JW moves N"}, {"s": "WM", "t": "Bro SW, try the FC's. Which he does, and reports with p..l s..n."}, {"s": "SW", "t": "WM, it proves a s..p likewise. SW and JW resume their original position by moving round the s..e as before."}, {"s": "WM", "t": "Bro Ws., having both failed in your attempts, there remains a third method, by taking a more firm hold of the s..s of the r..t h..d and R..g him on the f..e p..s of f..w..p, which with your assistance I will now make trial of. He leaves the p..d..l from the l..t, and they raise the Can. b..t l..t h..ds straight out over R s..s. SW ensures Can. l..t h..d is horizontal. To Can. It is thus that all MMs. are r..d from a figurative d..h to a reunion with the former companions of their toil. Bro W\u2019s, resume your seats. Done."}, {"s": "DC", "t": "Be seated Brethren. WM To Can, turning him to face S. Let me now beg you to observe, that the light of a MM is darkness visible, serving only to express that gloom which rests on the prospect of futurity; it is that mysterious veil which the eye of human reason cannot penetrate, unless assisted by that light which is from above; yet even by this glimmering ray you may perceive that you stand on the very brink of the g..e, into which you have just figuratively descended, and which, when this transitory life shall have passed away, will again receive you into it's cold bosom; let the emblems of mortality which lie before you lead you to contemplate on your inevitable destiny, and guide your reflections to that most interesting of all human studies, the knowledge of yourself. Be careful to perform your allotted task while it is yet day, continue to listen to the voice of nature, which bears witness that even in this perishable frame resides a vital and an immortal principle, which inspires a holy confidence that the Lord of life will enable us to trample the king of terrors beneath our feet, and lift our eyes to that bright morning star, IG raises lights whose rising brings peace and salvation to the faithful and obedient of the human race. Here the WM takes b..h h..s of Can. and gently moves round towards the l..t, until they occupy each other's place. Continues. I cannot better reward the attention you have paid to this Exhortation and Charge, than by entrusting you with the s..s of this Degree. You will therefore advance towards me as a FC, first as an EA. which is done; You will now take another short pace with your l..t f..t, bringing the r..t h..l into its hollow, as before done that is the third regular s..p in Freemasonry, and it is in this position the s..s of this Degree are communicated: they consist of s..ns, a t..n, and w..d; of the s..ns, the first and second are casual, and the third penal. The first casual s..n is called the s..n of h..r, and is given from the FC's, Stand to order as a FC. The sign is given by dropping, &c. &c., as if s..k with h..r at some d. and a. s..t. The second casual s..n is called the s..n of s..p..y, and is given by & c. Place your r..t h..d in this position. The p..l s..n is given by drawing the h..d & c. This is in allusion to the symbolic penalty at one time included in the Obligation in this Degree had he improperly disclosed the s..s entrusted to him which implied that as a man of honour, a MM would rather have had the BCA, the BTT and BT on the C and the ATOSTT 4 CW's of H so that no trace or remembrance of so vile a wretch may longer be found among men, particularly MM's. The g..p or t..n is the first of the FP of F, which are:* H..d to H..d F..t to F..t K..e to K..e, B..t to B..t and H..d over B..k, and may be thus briefly explained: Demonstrates. H..d to H..d, I greet you as a Bro F..t to f..t, I will support you in all your laudable undertakings. K..e to k..e, the posture of my daily supplications shall remind me of your wants. B..t to b.t your lawful secrets, when entrusted to me as such, I will keep as my own. And h..d over b..k, I will support your character in your absence as in your presence. It is in this position, and in this only, and then only in a w..r, except in open Lodge, that the w..d is given; it is .. or .. Both words having a nearly similar import, the one denotes the d..h of the builder, the other the builder is s..n. You are now at liberty to retire, in order to restore yourself to your personal comforts, and on your return to the Lodge, the s..ns, t..n, and w..d will be further explained. The SD conducts the Can to the NW Corner of the Lodge."}, {"s": "SD", "t": "To Can. Salute the WM as a MM p..l s..n only. Done. Can retires. The g..e is removed. TB and pointer put down by S and J D's."}, {"s": "Tyler", "t": "gives k..s of Third Degree."}, {"s": "IG", "t": "To JW with s..p and s..n. Bro JW there is a report."}, {"s": "JW", "t": "Stands, gives k..s, s..p and s..n. WM there is a report."}, {"s": "WM", "t": "Enquire who seeks admission Bro JW."}, {"s": "JW", "t": "Seated. To Bro IG who stands with s..p and s..n. See who seeks admission Bro IG."}, {"s": "IG", "t": "Looks through hatch and to WM direct with s..p and s..n. WM, Bro AB seeks re-admission."}, {"s": "WM", "t": "Admit him if properly clothed. Bro SD."}, {"s": "IG", "t": "Opens door, admits Bro AB to the SD who conducts him to the NW corner."}, {"s": "SD", "t": "Advance and salute the WM in each of the Three Degrees of craft Masonry. P..l s..n only. Done. The SD and Can s..e the Lodge and the SD places Can at the SW's left facing E."}, {"s": "SW", "t": "Rising, with the s..n of F..y holding up Can's r..t h..d. WM, I present to you Bro AB, on his being raised to the Third Degree, for some further mark of your favour."}, {"s": "WM", "t": "Bro SW, I delegate to you to invest him with the distinguishing b..e of a MM."}, {"s": "SW", "t": "Leaves chair, turns Can. of face S. To Can. By the WM's command, I invest you puts it on with the distinguishing b..e of a MM, to mark the further progress you have made in the science. SW salutes WM and returns to his chair from the south. SD conducts Can to NW corner."}, {"s": "WM", "t": "To Can. I must state that the b..e with which you have now been invested, not only points out your rank as a MM, but is meant to remind you of those great duties you have just solemnly engaged yourself to observe, and while it marks your own superiority, it calls on you to afford assistance and instruction to the Brethren in the inferior Degrees. The SD places the Can with h..ls to the T..b facing the WM and returns to his seat. We left off at that part of our traditional history which mentions the d..h of our Master H..m A..f; a loss so important as that of the principal Architect could not fail of being generally and severely felt; the want of those plans and designs which had hitherto been regularly supplied to the different classes of workmen was the first indication that some heavy calamity had befallen our M. The Menatschin, or Prefects, or, more familiarly speaking, the Overseers, deputed some of the most eminent of their number to acquaint King Solomon with the utter confusion into which the absence of H..m had plunged them, and to express their apprehension that to some fatal catastrophe must be attributed to his sudden and mysterious disappearance. King Solomon immediately ordered a general muster of the workmen throughout the different departments, when three of the same class of Overseers could not be found. On the same day the twelve Craftsmen who had originally joined the conspiracy came before the King, and made a voluntary confession of all that they knew down to the time of withdrawing themselves from the number of the conspirators. This naturally increased the fears of King Solomon for the safety of his chief artist; he therefore selected fifteen trusty FC\u2019s, and ordered them to make a diligent search after the person of our M if he were yet alive, or had suffered death in the attempt to extort from him the secrets of his exalted Degree. Accordingly, a stated day having been appointed for their return to Jerusalem, they formed themselves into three FC l..s and departed from the three entrances of the Temple; many days were spent in fruitless search; indeed, one class returned without having made any discovery of importance; a second, however, were more fortunate, for on the evening of a certain day, after having suffered the greatest privations and personal fatigues, one of the Brethren who had rested himself in a reclining posture, to assist his rising caught hold of a shrub which grew near, which, to his surprise, came easily out of the ground; on a closer examination he found that the earth had been recently disturbed; he therefore hailed his companions, and with their united endeavours reopened the ground, and there found the body of our M. very indecently interred. They covered it again with all respect and reverence, and to distinguish the spot, stuck a sprig of A..a at the head of the g..e; they then hastened to Jerusalem to impart the afflicting intelligence to King Solomon; he, when the first emotions of grief had subsided, ordered them immediately to return, and raise our M to such a sepulture as became his rank and exalted talents; at the same time informing them that by his untimely death the s..s of a MM were lost; he therefore charged them to be particularly careful in observing whatever casual s..n, t..n or w..d might occur, whilst paying this last sad tribute of respect to departed merit. They performed their task with the utmost fidelity, for on reopening the ground, one of the Brethren, looking round, observed some of his companions in this position gives the s..n of h..r..r, struck with h..r..r at the dreadful and afflicting sight, while others viewing the ghastly w..d, still visible on his f..e..d, smote their own in sympathy with his sufferings; Done. Two of the Brethren then descended the grave, and endeavoured to raise our M by the EA's g..p, which proved a s..p; they then tried the FC's, which proved a s..p likewise; having both failed in their attempts, a zealous and expert Brother took a more f..m h..d of the .. of the .., and with their assistance raised him on the five p..s of f..w..p while others, more animated, exclaimed .. or .., both words having a nearly similar import; the one signifying the d..h of the B., the other the B. is s..n. King Solomon therefore ordered that those casual s..ns, and that t..n and w..d, should designate all MMs. throughout the universe, until time or circumstances should restore the genuine. It only remains to account for the third class, who had pursued their researches in the direction of Joppa, and were meditating their return to Jerusalem, when accidentally passing the mouth of a cavern they heard sounds of deep lamentation and regret. On entering the cave to ascertain the cause, they found three men answering the description of those missing, who, on being charged with the m..r, and finding all chance of escape cut off, made a full confession of their guilt. They were then bound and led to Jerusalem, where King Solomon sentenced them to that death the heinousness of their crime so amply merited. Our M was ordered to be reinterred as near the Sanctum Sanctorum as the Israelitish law would permit, there in a G..e, from the centre, three feet E., and three feet W., three feet between N. and S., and five feet or more perpendicular. He was not buried in the Sanctum Sanctorum, because nothing common or unclean was allowed to enter there, not even the High Priest but once a year, nor then, until after many washings and purifications against the great day of expiation for sin, for by the Israelitish law all flesh was deemed unclean. The same fifteen trusty F.Cs. were ordered to attend the funeral, clothed in w..e a..s and g..s, as emblems of their innocence. You have already been informed that the W.T. with which our M. was slain where the P..b R..e L..l and H.M. The ornaments of a MM's l..e are the Porch, Dormer, and Square Pavement. The Porch was the entrance to the Sanctum Sanctorum; the Dormer, the window that gave light to the same; and the Square Pavement for the High Priest to walk on. The High Priest's office was to burn incense to the honour and glory of the Most High, and to pray fervently that the Almighty, of his unbounded wisdom and goodness, would be pleased to bestow peace and tranquillity on the Israelitish nation, during the ensuing year. The Coffin, Skull and Cross-bones, being emblems of mortality, allude to the untimely death of our Master H.A. who was slain three thousand years after the creation of the world. The sprig of Acacia is for remembrance."}, {"s": "WM", "t": "moves Can. with both h..ds to NE part of the Lodge. You have already been informed of three s..ns in this Degree; the whole are five, corresponding in number with the five p..s of f..p. They are the s..n of h..r, the s..n of s..y, the p..l s..n, the s..n of g..f and d..s, and the s..n of j..y and e..n, likewise called the g..d or r..l s..n. For the sake of regularity, I will go through them, and you will please copy me. Stand to order as a FC Done. This is the s..n of h..r; this of s..y. This the p..l s..n. The s..n of g..f and d..s is given by &c.; this took its rise at the time when our M. was making his way from the N. to the E. entrance of the Temple, when his agony was so great that the perspiration stood in large drops on his forehead and he made use of this s..n, done, as a temporary relief to his sufferings. This is the s..n of j..y and e..n, likewise called the g..d or r..l s..n; it took its rise at the time when the Temple was completed, and K.S. and the princes of his household went to view it, when they were so struck with its magnificence, that with one simultaneous motion they exclaimed, Oh, wonderful Masons. Can. repeats. On the Continent of Europe, the s..n of g..f and d..s is given differently: by clasping the h..s and raising them with their backs to the f..d, exclaiming \"c. t.m.a., y.c.o.t.w.,\" Can. repeats, on the supposition that all MMs are Bs to H.A., who was a w's son. In Scotland, Ireland, and the States of America, the s..n of g..f and d..s is given still differently, by throwing up the h..s with the p..s extended to the heavens, and dropping them with three distinct motions to the sides, exclaiming \"O.L.mG.; O.L.m.G; O.L.mG.; i.t.n.h.f.t.w.'s s.? Can. repeats."}, {"s": "DC", "t": "hands WT to WM. I now present to you the working tools of a MM; they are the S..t P..l, and C..s. The S..t is an implement which acts on a centre pin, whence a line is drawn to mark out ground for the foundation of the intended structure; with the P..l the skilful artist delineates the building in a draft or plan, for the instruction and guidance of the workmen; the C..s enable him with accuracy and precision to ascertain and determine the limits and proportions of its several parts. But as we are not all operative Masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, the S..t points out that straight and undeviating line of conduct laid down for our pursuit in the V. of the S.L.; the P..l teaches us that our words and actions are observed and recorded by the Almighty Architect, to whom we must give an account of our conduct through life; and the C..s remind us of His unerring and impartial justice, who, having defined for our instruction the limits of good and evil, will reward or punish as we have obeyed or disregarded His divine commands. Thus the working tools of a MM teach us to bear in mind, and to act according to, the laws of our Divine Creator, that when we shall be summoned from this sublunary abode, we may ascend to the Grand Lodge above, where the World's great Architect lives and reigns forever."}, {"s": "DC", "t": "Brethren, one, two, clap. WM hands WT to DC. Done."}, {"s": "SD", "t": "SD conducts Can to NW corner. WM Bro AB it is my duty to inform you that there is another step which it is necessary for you to take to complete your Masonic course. The Preliminary Declaration of the Book of Constitutions states \"that Pure Ancient Masonry consists of 3 degrees and no more namely those of the Entered Apprentice, the Fellow Craft and the Master Mason including the Supreme Order of the Holy Royal Arch\". Now that you have received these degrees it is the last Royal Arch Order which it is NECESSARY and ESSENTIAL for you to acquire. It is the sequel to the Third Degree and the coping stone of Freemasonry. For some unexplained reason this Order is not conferred in a Craft Lodge but in another assembly called a Chapter which is attached to the Craft Lodge and whose members are referred to as Companions. The Chapter is subordinate to the Supreme Grand Chapter of England and the officials are the same as those of the Grand Lodge of England. Further fees are necessary although very much less in amount. Before this Order can be acquired a lapse of not less that one month must take place after being raised."}, {"s": "SD", "t": "conducts Can to a seat and exchanges CB S and J D's return TB and pointer and return to their seats. Ceremony of Closing the Lodge in the Third Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W's. Brethren, assist me to close the Lodge in the Third Degree. All rise. Bro JW, who takes s..p and gives s..n what is the constant care of every MM?"}, {"s": "JW", "t": "To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "Bro IG, who takes s..p and gives s..n., prove the Lodge close Tyled."}, {"s": "IG", "t": "IG gives three k..s of MM, which are answered by the Tyler; the IG takes the s..p and gives the p..l s..n of the Third Degree and says, Bro JW the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s takes s..p and gives the s..n. Worshipful Master, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW, who takes s..p and gives s..n, the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as MMs."}, {"s": "WM", "t": "To order, Brethren, in the Third Degree. The Brethren take the s..p, and stand to order with the p..l s..n of the Third Degree. Bro JW, whence come you?"}, {"s": "JW", "t": "From the West, whither we have been in search of the genuine secrets of a MM."}, {"s": "WM", "t": "Bro SW, have you found them?"}, {"s": "SW", "t": "We have not, WM but we bring with us certain substituted secrets, which we are anxious to impart for your approbation."}, {"s": "WM", "t": "To SW. Let those substituted secets be regularly communicated to me."}, {"s": "SW", "t": "advances up the N side of the Lodge, and stands on the edge of the pavement, opposite to and facing the JWs. chair. JW advances from his chair towards the SW and halts about 3 short paces from the SW who stands still during the whole of this part of the ceremony. Copying the JWs. other actions. JW gives the First Degree s..n and grip to the"}, {"s": "SW", "t": "and raising their hands whisper s..h. They unclasp hands. JW takes another step. he gives the Second Degree s..n and grip to the SW and raising their hands whispers \"t..c..\". They unclasp hands. JW takes another step and gives the full Third Degree s..n, followed by the 5 points of f..w..p to the SW, at each point whispering the appropriate words \"h..d to h..d I greet you as a Brother\". F..t to f..t I will support you in all your laudable undertakings\". \"K..e to k..e the posture of my daily supplications shall remind me of your wants\". \"B..t to b..t your lawful secrets when entrusted to me as such I will keep as my own\". \"And h..d over b..k I will support your character in your absence as in their presence. It is in this position and in this only and then only in a whisper except in open Lodge that the words are given. They are .. or .. both words having a similar import the one denotes the death of the builder, the other the builder is slain\". Both W's. resume the positions of the third p..l sign. JW turns about and resumes his position at his chair."}, {"s": "SW", "t": "advances to the centre of the Lodge about three short paces from the VoSL and says."}, {"s": "SW", "t": "WM, condescend to receive from me the substituted secrets of a MM."}, {"s": "WM", "t": "Bro SW I will receive them with pleasure and for the benefit of the Brethren you will speak the words aloud. At the conclusion both WM and SW assume the position of the Third p..l s..n. WM resumes his position on the dais. SW waits until WM has taken up his position, then turns about, and resumes his position at his seat. The substituted secrets of a MM thus regularly communicated to me I as Master of this Lodge and thereby the humble representative of KS sanction and confirm with my approbation, and declare that they shall designate you and all MMs throughout the universe until time or circumstances shall restore the genuine\"."}, {"s": "ALL", "t": "With gratitude to our M we bend. All with G or R s..n."}, {"s": "DC", "t": "All Gratitude to the Most High, once only. All resume p..l s..n."}, {"s": "WM", "t": "Bro SW the labours of this degree being ended you have my command to close this MM's Lodge. K..ks."}, {"s": "SW", "t": "Brethren in the name of the Most High and by the command of the WM I close this MM's Lodge k..s, all drop sign."}, {"s": "JW", "t": "And it is closed accordingly k..s followed by IG and T."}, {"s": "IPM", "t": "places one point of the c..s under the s..e and gives Second Degree sign while SD reverses the third tracing board."}, {"s": "DC", "t": "Be seated Brethren. Done. ALTERNATIVE"}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s, stands and says, by virtue of the power vested in me as Master of this Lodge and thereby the humble representative of KS, I close this MM Lodge and this shall be my warrant. Gives the Third Degree k..s followed by the S and J W\u2019s, IG and T. SD with wand turns the Third Degree TB while the IPM places one p..t of the c..s..s under the S..e after giving a CB he returns to his chair, and it now stands open in the Second Degree and this shall be my warrant, gives Second Degree k..s followed by the S and J W\u2019s, IG and T."}, {"s": "WM", "t": "Gives k..s followed by the S and J W\u2019s. Bro IG admit the FC. Done. Closing the Lodge in the Second Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to close the Lodge in the Second Degree. All rise. Bro JW, what is the constant care of every FCFM?"}, {"s": "JW", "t": "With s..p and s..n. To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "Drops s..n. Bro IG, prove the Lodge close Tyled. IG gives s..p and s..n which is returned by the JW."}, {"s": "IG", "t": "IG gives three k..s of FC, which are answered by the Tyler, IG takes s..p and s..n of the Second Degree and says, Bro JW the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s, step and s..n. Worshipful Master, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW, the next care?"}, {"s": "SW", "t": "With s..p and s..n. To see that the Brethren appear to order as Craftsmen."}, {"s": "WM", "t": "To order, Brethren, in the Second Degree. The Brethren take the s..p, and stand to order with the s..n of a FCFM."}, {"s": "WM", "t": "Bro JW, in this position what have you discovered?"}, {"s": "JW", "t": "A sacred symbol."}, {"s": "WM", "t": "Bro SW, where is it situated?"}, {"s": "SW", "t": "In the centre of the building."}, {"s": "WM", "t": "To JW. To whom does it allude?"}, {"s": "JW", "t": "To the Grand Geometrician of the Universe."}, {"s": "WM", "t": "Then, Brethren."}, {"s": "Chap", "t": "Let us remember that wherever we are, or whatever we do, He is with us, and His ALL -seeing eye observes us, and while we continue to act in conformity with the principles of the Craft, let us not fail to discharge our duty to Him with fervency and zeal."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro SW, the labours of this Degree being ended, you have my command to close this FC Lodge. Gives the k..s with L.H."}, {"s": "SW", "t": "Brethren, in the name of the Grand Geometrician of the Universe, and by command of the WM, I close this FC Lodge. Gives k..s with LH when all drop s..n."}, {"s": "JW", "t": "Happy we have met, Happy may we part, And happy meet again. Gives the k..s, also the IG and T. The JD with wand turns the Second Degree tracing board while the IPM returns both p..s of the c..s under the s..e. After giving the First Degree s..n he returns to his seat."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Bro IG admit the EAs. ALTERNATIVE"}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s., stands and says, by virtue of the power vested in me as Master of this Lodge and thereby the humble representative of KS, I close this FC Lodge and this shall be my warrant, gives the Second Degree k..s followed by the S and J W\u2019s., IG and T. WM sits. JD with wand turns the Second Degree TB while the IPM places both p..s of the c..s under the S..e, after giving CB returns to his chair."}, {"s": "WM", "t": "Stands. And it now stands open in the First Degree and this shall be my warrant. Gives First Degree k..s followed by S and J W\u2019s, IG and T WM sits. WM gives one k..k followed by S and J W\u2019s. and says, Bro IG admit the EAs. IG With s..p and s..n. Done. Other Lodge Business"}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the first time I rise to enquire if any brother has ought to propose for the good of Freemasonry in general or this the Vulcan Lodge No. 4510 in particular. Bro Sec are there any communications from the Grand Lodge. Sec. reads communications from Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Grand Lodge. If present greetings are given by G Officers."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the second time I rise etc., Bro Sec are there any communications from Prov. Grand Lodge. Sec. reads communication from Prov. Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Provincial Grand Lodge. Greetings from PGL given by the most recently appointed PGO of the Lodge present."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the third time I rise etc., Bro Sec are there any further communications. Sec. reads any other communications."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications but I do have apologies from .. Proposition/notice of motion and any other business given at this point."}, {"s": "DC", "t": "Visiting Brethren wishing to give greetings may now do so commencing on the left of the WM and preceding in a clockwise direction round the Lodge Room. Done."}, {"s": "SW", "t": "Brethren of the Vulcan Lodge No. 4510 upstanding."}, {"s": "ALL", "t": "With s..p and s..n. Hearty greetings WM. Closing the Lodge Generally The WM gives one k..k, followed by the S and J W\u2019s."}, {"s": "WM", "t": "Brethren, assist me to close the Lodge All rise. Bro JW. JW with s..p and s..n What is the constant care of every Mason?"}, {"s": "JW", "t": "To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done. JW drops sign"}, {"s": "JW", "t": "Bro IG with s..p and s..n prove the Lodge close Tyled."}, {"s": "IG", "t": "Bro IG drops sign gives three k..s, which are answered by the Tyler; he takes the s..p and gives the s..n of the First Degree, and says, Bro JW, the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s step and s..n Worshipful Master, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW with s..p and s..n the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren in the First Degree. The Brethren takes the s..p and stand to order with the s..n of an EA."}, {"s": "WM", "t": "Bro SW your constant place in the Lodge?"}, {"s": "SW", "t": "In the West"}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "As the Sun sets in the West to close the day, so the SW is placed in the West to close the Lodge, by command of the"}, {"s": "WM", "t": "after having seen that every Brother has had his due."}, {"s": "WM", "t": "And has every Bro had his due?"}, {"s": "SW", "t": "To the best of my masonic belief they have WM."}, {"s": "WM", "t": "Brethren, before we close the Lodge."}, {"s": "Chap", "t": "Let us with all reverence and humility express our gratitude to the Great Architect of the Universe, for favours already received, and may He continue to preserve our order by cementing and adorning it with every moral and social virtue."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro SW the labour of the evening being ended, you have my command to close the Lodge. Gives the k..s with L.H."}, {"s": "SW", "t": "Brethren, in the name of the Great Architect of the universe, and by command of the WM, I close the Lodge. Gives the k..s with L.H. when all drop s..n."}, {"s": "JW", "t": "And it is closed accordingly, until the third Monday of emergencies excepted, of which every subscribing Bro will receive due notice. Gives the k..s, also the IG and T. The JD without wand goes directly to the JW's chair, turns the first degree TB switches off his light then turns out the SW's light. The SD turns out the WM's light. The IPM, closes the VoSL and c..s placing them with the p..s inside the angle of the S..e pointing W. He gives CB and returns to his chair. The SW lowers his C..N and the JW raises his C..N all simultaneously."}, {"s": "IPM", "t": "Brethren nothing new remains but according to ancient custom to lock up our S..S in a safe and sacred repository of the Heart uniting in the act of fidelity, fidelity, fidelity all strike LB with their RH's on each of these words and may G preserve the order all raise RH to R shoulder palm forwards."}, {"s": "WM", "t": "I extend a hearty invitation to all our visitors to stay to our after meeting and I hope as many as possible of our Brethren will stay to entertain them. The Alms Box will be in the hands of the IG."}, {"s": "DC", "t": "I will thank the Brethren to remain standing while the WM Officers of GL, PGL, and installed Masters retire. Bro Organist may we have the Closing Ode. The organist commences the closing ode. The ADC exchanges CBs with the JD, and commences to SQ. the Lodge followed by the JD. At the NE corner he exchanges CB with the SD and continues to s..e the Lodge exchanging CB with the J and S W\u2019s. who exit their chairs from the left following the D's as they pass after exchanging CBs with the WM, the ADC D's and W\u2019s continue to s..e the Lodge to the door followed by the WM, Officer of GL, PGL and IMs. who exit through the Ds crossed wands. The IG stands inside the door of the Lodge with the Alms Box. The Tyler stands outside the door with s..d."}, {"s": "WM", "t": "takes Candidate outside with him to be greeted by the Brethren."}], "Installation": [{"s": "_dir", "t": "The Prov. G. Officers of the Year in the Lodge, remain outside the Lodge room to entertain the Ruler/Representative and do"}, {"s": "_dir", "t": "not salute when entering the Lodge."}, {"s": "_dir", "t": "Assembly in the Lodge Room"}, {"s": "DC", "t": "With Wand. All below rank of IM please enter the Lodge. Brethren enter and occupy the seats in the N or S with the exception of the D's and W's. The W's stand immediately inside the door with the D's to their E, carrying their wands, the Juniors in the N. The IM's Officers of Prov. GL and GL form a procession in two's outside the door, junior in rank first, WM, IPM and DC last."}, {"s": "Tyler", "t": "With sword, on signal from DC enters the Lodge Room. Upstanding Brethren to receive the WM. The D's followed by the W's lead the procession in narrow columns E along the N side of the Lodge stopping approx. 3 feet short of the KS and all turn inwards. The organist commences the opening ode, the D's cross their wands and the"}, {"s": "WM", "t": "followed by IPM enter and proceed under them to their seats. The DC directs the officers of GL and Prov. GL in two's, Seniors first, to the WM's right and IM's to the WM's left. The DC passes under the D's wands and commences to Sq. the Lodge, the D's, after uncrossing their wands, and W's following. The DC stops in front of the JW's chair, the D's stop and cross their wands to allow the JW to enter his chair from the E side where he remains standing and exchanges CB with the DC. The DC, D's and SW proceed to the SW's chair where the procedure is repeated for the SW to enter his chair. The JD then goes to his chair and exchanges CB's with the DC. The DC then proceeds to the NE corner followed by the SD who goes to his chair and exchanges CBs with the DC; who proceeds to his seat. Opening the Lodge in the First Degree"}, {"s": "WM", "t": "The WM gives one k..k followed by the S and J W\u2019s. Brethren, assist me to open the Lodge. To JW, calling him by name Bro AB what is the first care of every Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "To IG, by name Bro AB, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "Gives three k..s, which are answered by the Tyler. The IG turns to the JW. Bro AB, the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives three k..s, and says, to WM. WBro AB, the Lodge is properly Tyled."}, {"s": "WM", "t": "To. SW, by name Bro AB the next care?"}, {"s": "SW", "t": "To see that none but Masons are present."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order with the s..n of an EA. Bro JW, how many principal officers are there in the Lodge?"}, {"s": "JW", "t": "Three: the WM, S and J W's."}, {"s": "WM", "t": "Bro SW, how many assistant officers are there?"}, {"s": "SW", "t": "Three, besides the Tyler or Outer Guard: namely, the S and JD\u2019s and IG."}, {"s": "WM", "t": "To JW. The situation of the Tyler or Outer Guard?"}, {"s": "JW", "t": "Outside the door of the Lodge."}, {"s": "WM", "t": "To JW. His duty?"}, {"s": "JW", "t": "Being armed with a drawn sword, to keep off all intruders and Cowans to Masonry, and see that the Candidates are properly prepared."}, {"s": "WM", "t": "Bro IG, Your situation in the Lodge?"}, {"s": "IG", "t": "Within the entrance of the Lodge."}, {"s": "WM", "t": "To IG. Your duty?"}, {"s": "IG", "t": "To admit Masons on proof, receive the Candidates in due form, and obey the commands of the JW."}, {"s": "WM", "t": "Bro JD. Your situation in the Lodge?"}, {"s": "JD", "t": "At the right of the SW."}, {"s": "WM", "t": "To JD Your duty?"}, {"s": "JD", "t": "To carry all messages and communications of the WM from the S to the JW and see that the same are punctually obeyed."}, {"s": "WM", "t": "Bro SD Your situation in the Lodge?"}, {"s": "SD", "t": "At or near to the right of the WM."}, {"s": "WM", "t": "To SD. Your duty?"}, {"s": "SD", "t": "To bear all messages and commands of the WM to the SW and await the return of the JD."}, {"s": "WM", "t": "Bro JW. Your place in the Lodge?"}, {"s": "JW", "t": "In the South."}, {"s": "WM", "t": "To JW. Why are you placed there?"}, {"s": "JW", "t": "To mark the Sun at its Meridian, to call the Brethren from labour to refreshment, and from refreshment to labour, that profit and pleasure may be the result."}, {"s": "WM", "t": "Bro SW. Your place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "To mark the setting Sun; to close the Lodge by command of the WM, after having seen that every Brother has had his due."}, {"s": "WM", "t": "W Bro IPM. The Master's place?"}, {"s": "IPM", "t": "In the East."}, {"s": "WM", "t": "To IPM. Why is he placed there?"}, {"s": "IPM", "t": "As the Sun rises in the East to open and enliven the day, so the WM is placed in the East to open the Lodge, and employ and instruct the Brethren in Freemasonry."}, {"s": "WM", "t": "The Lodge being duly formed, before I declare it open."}, {"s": "Chap", "t": "Let us invoke the assistance of the Great Architect of the Universe on all our undertakings; may our labours, thus begun in order, be conducted in peace, and closed in harmony."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Great Architect of the Universe, I declare the Lodge duly opened for the purposes of Freemasonry in the First Degree. The WM gives three k..s, when all drop s..n, k..s are repeated by the S and J W's, IG and Tyler. On completion of the k..s the JD with wand squares the Lodge, crossing immediately in front of the JW, saluting the WM on passing, turns the first d..e TB and switches on the JW's and the SW's lights. The IPM opens the VoSL places both P..S of the c..s under the s..e, pointing W salutes the WM and returns to his seat. The SD switches on the WM's light. The JW lowers his c..n and the SW raises his. These movements are carried out simultaneously."}, {"s": "DC", "t": "Be seated Brethren. Admittance of a \"Ruler of the Province\" He may be the RWPGM or the Dep. PGM or the Ass. PGM and will be accompanied by his own DC. The Provincial G. Officers of the year remain outside the Lodge with the Ruler."}, {"s": "Tyler", "t": "Three k..s."}, {"s": "IG", "t": "With s..p and s..n, Bro JW there is a report."}, {"s": "JW", "t": "Stands, three k..s, s..p and s..n. WM there is a report."}, {"s": "WM", "t": "Bro JW enquire who seeks admission."}, {"s": "JW", "t": "Seated. To IG who stands with s..p and s..n. Bro IG see who seeks admission."}, {"s": "IG", "t": "Enquires through the hatch of the door. To WM with s..p and s..n. WM outside the door is W Bro ..(rank) who seeks admission."}, {"s": "WM", "t": "Bro IG admit him. Acc DC Enter and salutes WM. Outside the door of the Lodge is .. who demands admission."}, {"s": "WM", "t": "We will receive him with pleasure under your direction. Acc DC Will the Officers of the PGL of this Province etc. The Brethren retire under the direction of the Acc DC From the door of the Lodge. Upstanding Brethren to receive .. Done. The procession enters the Lodge and the Ruler is escorted by his Acc DC to the WM who offers him the gavel and Ruler occupies the chair. The WM moves into the IPMs chair. The procession return to their places in the Lodge. Acc DC With s..p and s..n beneath \"G\". WM Vulcan Lodge is this evening honoured by the presence of .., and I call upon you to greet him with .. EA's s..s taking the time from me. To order Brethren. Done. Be seated Brethren. Ruler responds."}, {"s": "DC", "t": "The Grand Officers will be saluted under the direction of the Lodge. DC naming one (most senior in rank) who will respond. The gavel is returned to the WM who resumes his chair, the Ruler occupying the seat immediately to his right. ALTERNATIVE Admittance of the Representative of the RWPGM of the Province The Provincial Grand Officers of the year remain outside the Lodge with the Representative."}, {"s": "Tyler", "t": "Three k..s."}, {"s": "IG", "t": "With s..p and s..n, Bro. JW there is a report."}, {"s": "JW", "t": "Stands, three k..s, s..p and s..n. WM there is a report."}, {"s": "WM", "t": "Bro. JW enquire who seeks admission."}, {"s": "JW", "t": "Seated. To IG who stands with s..p and s..n. Bro. IG see who seeks admission."}, {"s": "IG", "t": "Enquires through the hatch of the door. To WM with s..p and s..n. WM, W. Bro ..(Assistant Provincial Grand Director of Ceremonies), seeks admission."}, {"s": "WM", "t": "Admit him. Prov DC Good evening WM and Brethren. Outside the door of your Lodge stands W.Bro..(rank), representing the RWPGM, who seeks admission."}, {"s": "WM", "t": "We will receive him with pleasure under your direction. Prov DC Will the Officers of this Province retire to escort the Representative of the RWPGM into the Lodge. The Brethren retire with the exception of the PG Officers holding office in the Lodge. From the door of the Lodge. Upstanding Brethren to receive the Representative of the RWPGM. Done. The procession enters the Lodge, juniors first and the Representative is escorted by the Prov. DC to the WM who welcomes him. The Representative takes his seat on the immediate right of the WM and the procession return to their places in the Lodge. Prov DC With s..p and s..n beneath \"G\". WM, Vulcan Lodge is this evening honoured by the presence of W.Bro.. (rank) representing the RWPGM and I call upon you to greet him with 3 EA s..s taking the time from me. Done. Be seated Brethren. Done. Representative responds."}, {"s": "DC", "t": "The Grand Officers will be saluted under the direction of the DC naming one, most senior in rank, who will respond. Special Greetings/Standing to Order in Respect of Departed Merit The WM gives one k..k followed by the S and JWs. and makes an appropriate announcement. Minutes The WM gives one k..k followed by the S and JWs."}, {"s": "WM", "t": "The next business is to read and if approved confirm the minutes of the last regular meeting Bro. Sec. Which must be done in the 1st Degree and no other."}, {"s": "SEC", "t": "stands with s..p and s..n then reads the minutes. Those are the minutes as I have them recorded WM With s..p and s..n."}, {"s": "WM", "t": "Gives one k..k followed by S and JWs. Brethren you have heard the minutes as read by our Bro. Sec. will all Brethren who were then present and deem them a true and correct record please signify in the usual manner among Masons. Done. To the contrary. Done. Bro.Sec., your minutes are confirmed."}, {"s": "SEC", "t": "With s..p and s..n. Thank you WM. SD takes the Minute Book from Sec. to WM for signature, accepts Minute Book from"}, {"s": "WM", "t": "with s..p and s..n and returns it to the Sec."}, {"s": "WM", "t": "Gives one k..k followed by S and JWs. I declare all offices vacant. WM invites the Chaplain, Secretary and DC to continue in the Lodge and the Tyler to remain in position outside. Officers remove their collars and gauntlets. WM Gives one k..k followed by S and JWs. W.Bro would you please occupy the SW's chair. Done."}, {"s": "DC", "t": "conducts W.Bro. to the SWs. chair and escorts SW to the N of the Lodge. W.Bro, would you occupy the JW's chair."}, {"s": "DC", "t": "conducts W.Bro, to the JW's chair and escorts JW to a spare seat. W.Bro., would you occupy the position of IG."}, {"s": "DC", "t": "conducts W.Bro to position of IG and escorts IG to a spare seat. Gives one k..k followed by S and JWs. I would thank all EAs. to retire from the Lodge for a short while. EAs salute WM at the NW corner. Opening the Lodge in the Second Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and JWs. Brethren, assist me to open the Lodge in the econd Degree. All rise. Bro. JW, what is the first care of every FCFM?"}, {"s": "JW", "t": "With s..p and s..n. To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW Direct that duty to be done."}, {"s": "JW", "t": "To IG with s..p and s..n Bro. IG, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "gives three k..s, and being answered by the Tyler, he takes the s..p and gives the s..n of the First Degree, and says, Bro. JW the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n. Worshipful Master, the Lodge is properly Tyled."}, {"s": "WM", "t": "Bro. SW, the next care?"}, {"s": "SW", "t": "With s..p and s..n. To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order as EAs. Bro. JW, are you a FCFM?"}, {"s": "JW", "t": "I am, WM; try me, and prove me."}, {"s": "WM", "t": "To JW, By what instrument in Architecture will you be proved?"}, {"s": "JW", "t": "The S..e."}, {"s": "WM", "t": "To JW. What is a S..e?"}, {"s": "JW", "t": "An angle of 90 degrees, or the fourth part of a circle."}, {"s": "WM", "t": "To JW. Being yourself acquainted with the proper method, you will prove the Brethren Craftsmen, and demonstrate that proof to me by copying their example."}, {"s": "JW", "t": "Brethren, it is the W. Master's command that you prove yourselves Craftsmen. When the Brethren have taken the s..p and given the s..n , and the JW has seen them to be correct, he makes the following report:"}, {"s": "JW", "t": "WM, the Brethren have proved themselves Craftsmen, and in obedience to your command I thus copy their example. Done."}, {"s": "WM", "t": "Bro. JW, I acknowledge the correctness of the s..n. Gives s..p and s..n. Before we open the Lodge in the Second Degree."}, {"s": "Chap", "t": "Let us supplicate the Grand Geometrician of the Universe, that the rays of heaven may shed their influence, to enlighten us in the paths of virtue and science."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Grand Geometrician of the Universe, I declare the Lodge duly opened, on the S..e, for the instruction and improvement of Craftsmen."}, {"s": "WM", "t": "gives second degree k..ks when all drop s..n and are then repeated by S and JWs, IG, and T. The JD with wand turns the second degree TB while the IPM raises one p..t of the c..s above the s..e, and gives the second degree s..n before returning to his place."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "One k..k followed by the SW, JW, IG and Tyler. The next business is to install the M-elect of the Lodge."}, {"s": "DC", "t": "Presents the M-elect, by the r..t h..d, below G, facing the WM. WM, I present to you Bro.. the WM elect of this Lodge to receive at your hands the benefit of Installation."}, {"s": "WM", "t": "W.Bro., DC your presentation shall be attended to, for which purpose, I will first address a few observations to the Brethren and will then call the attention of Bro.. to the necessary qualifications in every Candidate for the Master's Chair."}, {"s": "DC", "t": "Resumes his seat."}, {"s": "WM", "t": "Brethren, from time immemorial, it has been an established custom among FMs. for each Lodge once in every year, at a stated period, to select, from amongst those who are past Ws., an experienced Craftsman to preside over them in the capacity of Master: he must have been regularly elected by the M, Ws, and Brethren., in open Lodge assembled, and have been presented to a Board of IMs., to receive from his predecessor the benefit of Installation, the better to qualify him for the discharge of the duties of his important trust. Bro. AB, you having been so elected and presented, I claim your attention, while I recite to you those qualifications which are essential in every Can. for the Master's Chair. 1st Every Candidate for the Office of Master ought to be of good report, true and trusty, and be held in high estimation among his Brethren and Fellows. 2nd He must have been regularly initiated, passed, and raised in the established degrees of the Order, well skilled in the Noble Science, and have duly served the Office of Warden in a regular Lodge. 3rd He ought to be exemplary in conduct, courteous in manner, easy of address, and steady in principle, able and willing to undertake the management of the Work; well skilled in the Ancient Charges, Regulations, and Landmarks of the Order; have been duly elected by the M, Ws, and Brethren. in open Lodge assembled, and approved by a Board of IMs. Can you, my worthy Brother, undertake the Mastership of this Lodge on these qualifications? ME I can."}, {"s": "WM", "t": "Then I shall direct your attention to the Secretary, while he reads to you those Ancient Charges and Regulations, to all of which your unqualified assent is essential, which you will signify by the Sign of Fidelity, at the same time bowing the head a little forward as a token of submission. Secretary reads the Charges. SEC 1st You agree to be a good Man and true and strictly to obey the Moral law. 2nd You are to be a peaceable Subject, and cheerfully to conform to the Laws of the Country in which you reside. 3rd You promise not to be concerned in plots or conspiracies against the Government, but patiently to submit to the decisions of the Supreme Legislature. 4th You agree to pay a proper respect to the Civil Magistrate, to work diligently, live creditably, and act honourably by all Men. 5th You agree to hold in veneration the original Rulers and Patrons of the Order of Freemasonry, and their regular successors, supreme and sub-ordinate, according to their Stations; and to submit to the Awards and Resolutions of your Brethren. in general L. convened, in every case consistent with the Constitutions of the Order. 6th You agree to avoid private piques and quarrels, and to guard against intemperance and excess. 7th You agree to be cautious in your carriage and behaviour, courteous to your Brethren., and faithful to your L. 8th You promise to respect genuine and true Brethren, and to discountenance Impostors and all Dissenters from the original Plan of Freemasonry. 9th You agree to promote the general good of Society, to cultivate the Social Virtues, and to propagate the knowledge of the Mystic Art as far as your influence and ability can extend. 10th You promise to pay homage to the Grand Master for the time being, and to his Officers when duly installed, and strictly to conform to every Edict of the Grand Lodge. 11th You admit that it is not in the power of any Man or Body of Men to make any alteration or innovation in the Body of Masonry without the consent first obtained of the Grand Lodge. 12th You promise a regular attendance on the Communications and Committees of the G.L., upon receiving proper notice thereof; and to pay attention to all the duties of F. My., upon proper and convenient occasions. 13th You admit that no new lodge can be formed without permission of the Grand Master or his Deputy, and that no countenance ought to be given to any irregular Lodge, or to any person initiated therein; and that no public processions of Masons clothed with the Badges of the Order can take place without the special Licence of the G.M. or his Deputy. 14th You admit that no person can regularly be made a Freemason or admitted a Member of any Lodge without previous Notice and due inquiry into his Character; and that no Brother can be advanced to a higher Degree except in strict conformity with the Laws of the Grand Lodge. 15th You promise that no Visitor shall be received into your Lodge without due examination, and producing proper Vouchers of his having been initiated in a regular Lodge. ME turns to face WM."}, {"s": "SEC", "t": "With second degree s..n. Those are the ancient charges and regulations WM."}, {"s": "WM", "t": "Do you submit to, and promise to support these Ancient Charges and Regulations as Masters have done in all ages? ME I do."}, {"s": "WM", "t": "Then you will advance to the pedestal and take a Solemn Ob. as regards your duties as the Master of his Lodge. Master-Elect removes his gloves. You will k..l on your r..t k..e, place your r..t h..d on the VoSL, repeat your names, and say after me:- OBLIGATION I, AB, in the presence of TGGOTU, and this Worthy and Worshipful Lodge of FC Freemasons, regularly held, assembled, and properly dedicated do agree to accept the Office of Master of this lodge, and the duties thereof zealously, faithfully, and impartially administer, to the best of my skill and ability, until the next regular period of Election within this Lodge, and until a Successor shall have been duly elected and installed in my stead. I further solemnly promise, that I will not, either during my Mastership, or at any time the Lodge shall be under my Direction, permit or suffer any Deviation from the Ancient Landmarks of our Order. I will not administer, or cause to be administered, any Rite or Ceremony contrary to or subversive of our Ancient Institution; but, on the contrary, will support, maintain, and uphold, pure and unsullied, the Principles and Tenets of the Craft. That I will to the utmost of my power enforce due obedience to those excellent Rules and Regulations to which I have already given my assent, and will in all respects conscientiously discharge my duty as a Ruler in the Craft and M of this L, so help me AG, and keep me steadfast in this my Solemn Ob. as Master-Elect of this Lodge."}, {"s": "WM", "t": "As a pledge of your fidelity and to render this a solemn Ob., you will seal it with your lips twice on the VoSL. Done. Rise duly Ob. M-Elect. The M-elect is escorted to a seat by the IM."}, {"s": "DC", "t": "Be seated Brethren. Done."}, {"s": "WM", "t": "With k..k followed by S and JWs. I would thank all FCs to retire from the Lodge for a short while. FCs. salute the WM at the NW Corner. Opening the Lodge in the Third Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and JWs. Brethren, assist me to the open the Lodge in the Third Degree. All Rise."}, {"s": "WM", "t": "Bro. JW, what is the first care of every Master Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW, Direct that duty to be done."}, {"s": "JW", "t": "IG with s..p and s..n. Bro. IG see that the Lodge is properly Tyled."}, {"s": "IG", "t": "gives three k..s of FC, and being answered by the Tyler, he takes the s..p and gives the s..n of the Second Degree and says, Bro. JW, the Lodge is properly Tyled. Gives the k..s, s..p and s..n Worshipful Master, the Lodge is properly Tyled."}, {"s": "WM", "t": "Bro. SW, the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Craftsmen."}, {"s": "WM", "t": "To order, Brethren, in the Second Degree. The Brethren take the s..p, and stand to order with the s..n of a FC."}, {"s": "WM", "t": "Bro. JW, are you a M.Mason?"}, {"s": "JW", "t": "I am, WM try me, and prove me."}, {"s": "WM", "t": "To JW. By what instruments in Architecture will you be proved?"}, {"s": "JW", "t": "The s..e and C..p..s."}, {"s": "WM", "t": "To JW. Being yourself acquainted with the proper method, you will prove the Brethren M.Masons by s..ns and demonstrate that proof to me by copying their example."}, {"s": "JW", "t": "Brethren, it is the WM's command that you prove yourselves M.Masons by s..ns. Which they do and when he sees they are correct, he reports as follows:-"}, {"s": "JW", "t": "WM, the Brethren have proved themselves M.Masons by s..ns, and in obedience to your command, I thus copy their example. Done."}, {"s": "WM", "t": "Bro. JW, I acknowledge the correctness of the s..ns. Gives them, with the s..p. Bro. JW whence come you?"}, {"s": "JW", "t": "The East."}, {"s": "WM", "t": "Bro. SW, whither directing your course?"}, {"s": "SW", "t": "The West."}, {"s": "WM", "t": "To Bro. JW. What inducement have you to leave the East and go to the West?"}, {"s": "JW", "t": "To seek for that which was lost, which, by your instruction, and our own industry, we hope to find."}, {"s": "WM", "t": "To Bro. JW. What is that which was lost?"}, {"s": "SW", "t": "The genuine Secrets of a MM."}, {"s": "WM", "t": "To Bro. JW. How came they lost?"}, {"s": "JW", "t": "By the untimely death of our Master H. A..ff."}, {"s": "WM", "t": "To Bro. SW. Where do you hope to find them?"}, {"s": "SW", "t": "With the Centre."}, {"s": "WM", "t": "To Bro. JW. What is a Centre?"}, {"s": "JW", "t": "A point within a circle, from which every part of the circumference is equidistant."}, {"s": "WM", "t": "To Bro. SW. Why with the Centre?"}, {"s": "SW", "t": "That being the point from which a M. Mason cannot err."}, {"s": "WM", "t": "We will assist you to repair that loss."}, {"s": "Chap", "t": "And may Heaven aid our united endeavours."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Most High, I declare the Lodge duly opened, on the Centre, for the purposes of F..y in the Third Degree."}, {"s": "WM", "t": "gives the k..s when all drop the s..n followed by the S and JWs, IG and Tyler. The SD turns the Third Degree TB while the IPM raises both p..s of the c..s above the s..e. He then gives the Third Degree s..n before returning to his seat."}, {"s": "DC", "t": "All glory to the Most High. Three times as all give g..d or r..l s..n on each occasion. Be seated Brethren."}, {"s": "WM", "t": "Give 3 k..s followed by the S and JWs. I would thank all those Brethren below the rank of an Installed Master, with the exception of the ME to leave the Lodge for a short while, under the direction of the DC. MM\u2019s withdraw, IG closes and locks the door, resumes seat. MMs. form a double column, in the North, facing East, and they square the lodge, saluting the WM, DC leading. Board of IMs. is opened and the Inner Working Ceremony performed before the `Board' is closed. The Lodge is then \"Called Off\" for a short break, after which IM's return and the Lodge is \"Called On\" to resume in the Third Degree. Visiting MM's are assembled outside the Lodge room by the Tyler, admitted to form a procession of a double column, in the N, facing E. They salute the newly installed Master as MM's in passing, the DC requests Visitors to occupy the seats at the rear of the Lodge room. This is repeated again for the MMs. of the Lodge."}, {"s": "IPM", "t": "Brethren., during your temporary absence Bro AB, has been regularly Installed in the chair of King Sol. according to ancient custom, and I now for the first time and in the E, proclaim him WM of this the Vulcan Lodge No. 4510 under the Registry of the GL of England, until the next regular period of Election within the Lodge, and until a Successor shall have been duly elected and installed in his stead. Brethren, you will greet our newly installed WM with 3 G..d or R..l s..ns taking the time from the Bro. DC."}, {"s": "DC", "t": "Brethren, quarter turn r..t, Brethren we will salute our newly installed WM with three G..d or R..l s..ns taking the time from me. To order Brethren. Done. Be seated Brethren. Please occupy the front seats. The Third Degree WT's are presented and explained to the WM at the pedestal."}, {"s": "IPM", "t": "I now present to you the working tools of a MM; they are the S..t, P..l, and C..s. The S..t is an implement which acts on a centre pin, whence a line is drawn to mark out ground for the foundation of the intended structure; with the P..l the skilful artist delineates the building in a draft or plan, for the instruction and guidance of the workmen; the C..s enable him with accuracy and precision to ascertain and determine the limits and proportions of its several parts. But as we are not all operative Masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, the S..t points out that straight and undeviating line of conduct laid down for our pursuit in the VoSL; the P..l teaches us that our words and actions are observed and recorded by the Almighty Architect, to whom we must give an account of our conduct through life; and the C..s remind us of His unerring and impartial justice, who, having defined for our instruction the limits of good and evil, will reward or punish as we have obeyed or disregarded His divine commands. Thus the working tools of a M.M. teach us to bear in mind, and to act according to, the laws of our Divine Creator, that when we shall be summoned from this sublunary abode, we may ascend to the Grand Lodge above, where the World's great Architect lives and reigns for ever. IPM with s..p and s..n resumes his seat."}, {"s": "DC", "t": "Brethren, one, two, clap. Done."}, {"s": "IPM", "t": "Handing the Gavel to the WM. WM, you will now close the Lodge from the 3rd Degree by warrant."}, {"s": "WM", "t": "Gives one k..k followed by S and JWs., stands and says, by virtue of the power vested in me as Master of this Lodge and thereby the humble representative of KS, I close this MM Lodge and this shall be my warrant. Gives the Third Degree k..s followed by the S and JWs, IG and T. WM sits. DC turns the Third Degree TB while the IPM places one p..t of the c..s..s under the S..e after giving a CB he returns to his chair, and it now stands open in the Second Degree and this shall be my warrant, gives Second Degree k..s followed by the S and JWs, IG and T."}, {"s": "WM", "t": "Gives k..s followed by the S and JWs. Bro. IG admit the FC."}, {"s": "IG", "t": "looking through hatch in door, asks Tyler are there any FCs to report to WM. The Lodge and visiting FC.s are instructed by the IG to proceed to NE corner. The procession of Lodge members is formed again, FCs leading."}, {"s": "DC", "t": "Brethren, we will salute the WM as FCs. in passing. Done."}, {"s": "IPM", "t": "Brethren, during your temporary absence Bro. AB has been regularly installed into the Chair of KS according to ancient customs and I now for the second time and in the W. proclaim him WM of this the Vulcan Lodge No. 4510 under the registry of the GL of England, until the next regular period of Election within the Lodge, and until a Successor has been duly elected and installed in his stead. Brethren, you will greet our newly installed WM with 5 h..t, h..d and b..e s..ns taking the time from the Bro. DC."}, {"s": "DC", "t": "Brethren, quarter turn to the r..t. We will salute our newly installed WM with 5 h..t h..d and b..e s..ns to the rhythm of the Second degree k..ks, taking the time from me. Stand to order as an FC. Done. Be seated Brethren."}, {"s": "IPM", "t": "To WM. I now present to you the working tools of an FCFM, which are the S..e, L..l and P..b..e, the S..e is to try and adjust rectangular corners of buildings, and assist in bringing rude matter into due form; the L..l to lay l..ls and prove horizontals; and the P..b..e to try and adjust uprights, while fixing them on their proper bases. But as we are not all operative Masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, the S..e teaches morality, the L..l equality, and the P..b..e justness and uprightness of life and actions. Thus by s..e conduct, l..l steps, and upright intentions, we hope to ascend to those immortal mansions whence all goodness emanates. IPM with s..p and s..n resumes his seat."}, {"s": "DC", "t": "Brethren, one, two, clap. Done."}, {"s": "IPM", "t": "Handing the gavel to the WM. WM, you will now close the Lodge from the Second Degree by warrant."}, {"s": "WM", "t": "Gives one k..k followed by S and JWs., stands and says, by virtue of the power vested in me as Master of this Lodge and thereby the humble representative of KS, I close this FC Lodge and this shall be my warrant, gives the Second Degree k..s followed by the S and JWs, IG and T. WM sits. SW turns the Second Degree TB while the IPM places both p..s of the c..s under the S..e, after giving CB returns to his chair."}, {"s": "WM", "t": "And it now stands open in the First Degree and this shall be my warrant. Gives First Degree k..s followed by S and JWs, IG and T."}, {"s": "WM", "t": "Gives one k..k followed by S and JWs. and says, Bro. IG admit the EAs."}, {"s": "IG", "t": "looking through hatch in door asks the Tyler, are there any EAs. to report to the WM? The Lodge or visiting EAs. are instructed by the IG to proceed to the NE Corner. The procession of Lodge members is formed again, EAs. leading."}, {"s": "DC", "t": "Brethren, we will salute the WM as EAs. in passing."}, {"s": "IPM", "t": "Brethren, during your temporary absence Bro. AB has been regularly installed into the Chair of K..g S..n according to ancient customs and I now for the third time and in the S proclaim him WM of this the Vulcan Lodge No. 4510 under then registry of the GL of England until the next regular period of Election within the Lodge, and until a Successor has been duly elected and installed in his stead. Brethren, you will greet our newly installed WM with 3 EA s..ns taking the time from the Bro. DC."}, {"s": "DC", "t": "Brethren, quarter turn to the r..t. We will salute our newly installed WM with 3 EAs..ns taking the time from me. To order Brethren. Done. Be seated Brethren. PM I now present you the working tools of an EA Freemason; they are the 24-in. G..e, the common G..l, and C..l. The 24in G..e is to measure the work, the common G..l to knock off all superfluous knobs and excrescences, and the C..l to further smooth and prepare the stone, and render it fit for the hands of the more expert workman. But as we are not all operative masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, the 24-in. G..e represents the 24 hours of the day, part to be spent in prayer to Almighty God, part in labour and refreshment, and part in serving a friend or Brother in time of need, without detriment to ourselves or connections. The common G..l represents the force of conscience, which should keep down all vain and unbecoming thoughts which might obtrude during any of the aforementioned periods, so that our words and actions may ascend unpolluted to the throne of the grace. The C..l points out the advantages of education, by which means we are rendered fit members for well-organised society. PM with s..p and s..n resumes his seat."}, {"s": "IPM", "t": "WM, I now present to you the Warrant of the Lodge. It has for many years been entrusted to the hands of Worthy and Distinguished Masons, and I am sure that in delivering it to your charge it will lose none of it's former splendour, but will be transmitted to your successor pure and unsullied as you now receive it. I now present you with the Book of Constitutions, which I recommend to your serious perusal, as you will find there is scarcely a case can occur in your L. but this Book will set you right. These are the Bylaws of your Lodge which you may decide to have read at least once in the year, in order that the Brethren. may not plead ignorance of them. This is the Inventory of the Lodge. IPM with s..p and s..n resumes his seat. PM giving the address on the Hall Stone Jewel to the newly installed Master does so at the right hand side of the Master's dais when facing him, remembering to have the jewel in his possession from the outgoing Master. ADDRESS ON THE HALL STONE JEWEL"}, {"s": "IPM", "t": "Worshipful Master, I now present to your notice the HALL STONE JEWEL, which was conferred on this Lodge by the Most Worshipful the Grand Master. He shows it to the WM. You will observe that its form is symbolic, for on the side squares are inscribed the date 1914 - 1918; four years of supreme sacrifice. In the centre is a winged figure, representing Peace, supporting a Temple. This symbolises the gift made by the English Craft of a new Temple in memory of those Brethren who made the supreme sacrifice in the cause of their King and their Country.The Jewel is suspended by the Square and Compasses, two of the Great though Emblematical Lights in Freemasonry, and is attached to a ribbon, which I now have much pleasure in placing about your neck. WM stands and the Ribbon is placed over his head, after which he resumes his seat. The wearing of that jewel by the Master of a Lodge fulfils a double purpose. First, it provides visible evidence that the Lodge has faithfully and conscientiously discharged its obligations to the Fraternity; secondly, it should ever provide an inspiration to every Brother to put service before self. This Jewel, Worshipful master, you will transfer to your successor on the occasion when he is installed in the high and honourable Office which you now occupy. He, in turn, will transfer it to his successor, and so it is to be hoped, it will ever adorn the Master of this Lodge, until time with us shall be no more. PM with s..p and s..n resumes his seat."}, {"s": "IPM", "t": "In the centre of the Lodge with s..n. WM, is it now your wish to invest the officers of the Lodge? IPM's are invested at the right side of the pedestal; IPM continues until the DC is invested; then the DC carries on until the ADC is invested and then he completes the investiture. At the appropriate time the Tyler's place outside is taken by the IG until the Tyler returns. ADDRESSES TO THE OFFICERS (Optional)"}, {"s": "IPM", "t": "WM, who do you appoint the SW of the Lodge?"}, {"s": "WM", "t": "Bro. AB."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. AB to the left side of the WM's pedestal and returns him to his seat after being invested. Installed Masters are invested from the right hand side of the WM's pedestal. Bro. AB, you are appointed SW of this Lodge, and I invest you with the Collar and Jewel of your Office. The l..l, being an emblem of equality, points out to you the equal measure you are bound to pursue, in conjunction with the WM, in the well ruling and governing of the Lodge. Your regular and punctual attendance at our stated meetings is essentially requisite. In the absence of the Master, you are to govern the Lodge, and in his presence to assist him in the government of it. We firmly rely upon your knowledge of Masonry, and attachment to the Lodge, for the faithful discharge of the duties of your office, and that you will not fail to attend the Quarterly Communications of the Grand Lodge, in order that this Lodge may be properly represented. Congratulates Officer."}, {"s": "IPM", "t": "In centre of the Lodge with s..p and s..n. Who do you appoint the JW of the Lodge?"}, {"s": "WM", "t": "Bro. EF."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. EF to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. EF, you are appointed JW of this Lodge, and I invest you with the Collar and Jewel of your Office. The p..b. r..e, being an emblem of uprightness, points out the integrity of measure you are bound to pursue in conjunction with the WM and Bro. SW, in the well ruling and governing of the Lodge; but more particularly to that part of your duty which relates to the admission of visitors, lest through your neglect any unqualified person should gain admission to our assemblies, and the Brethren be thereby innocently led to violate their O.B. You are to be regular in your attendance at our stated meetings, to assist in transacting the business of the evening; this is necessary, as unless due attention be paid by the officers you cannot expect the Brethren to be punctual at the appointed time. Congratulates Officer."}, {"s": "IPM", "t": "In centre of the Lodge with s..p and s..n. WM who do you appoint Chaplain of the Lodge?"}, {"s": "WM", "t": "Bro. GH."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. GH to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. GH, you are appointed Chaplain to this Lodge, and I invest you with the Collar and Jewel of your Office. Your duty, which is to offer up prayers and invocations to the GAOTU, is better known to you than I can explain it. Congratulates Officer."}, {"s": "IPM", "t": "In centre of the Lodge with s..p and s..n. Bro. IJ, having being elected Treasurer of the Lodge is it now your wish to invest him?"}, {"s": "WM", "t": "It is W.Bro. IPM."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. IJ to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. IJ, you have been elected to the office of Treasurer of this Lodge, and I invest you with the Collar and Jewel of your Office. It is your duty to receive all money from the hands of the Secretary, keep just and regular accounts of the same, and pay thereout at the WM's will and pleasure, with the consent of the Lodge; and I trust that your regard for the Fraternity will prompt you to the faithful discharge of the duties of your office. The cross- keys are an emblem of silence and secrecy. The metal key is to preserve the treasures of the Lodge, but the symbolical key is an emblem of the tongue, whose eloquence should be used to unlock the hearts of your Brethren, and cause them to dispense their treasures in the cause of the necessitous and the orphan. By the symbolic key, you are taught to preserve a tongue of good report, and in case you should hear a Brother slanderously spoken of, to defend and vindicate his character; but if, unfortunately, that cannot be done with honour and propriety, to preserve that excellent Masonic virtue, silence. Congratulates Officer."}, {"s": "IPM", "t": "In centre of the Lodge with s..p and s..n. WM, who do you appoint Secretary of the Lodge?"}, {"s": "WM", "t": "Bro. KL."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. KL to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. KL, you are appointed to the office of Secretary to this Lodge, and I invest you with the Collar and Jewel of your Office. It is your province to record the minutes, particularly the dates of Initiation, Passing and Raising, lest a Brother should through neglect be deprived of his privileges; it is also your duty to settle the accounts, and issue the Summonses of the Lodge Meetings; you will likewise affix the Lodge Seal to such documents as the WM may direct. Your good inclinations to Masonry, and to this Lodge, will, no doubt, prompt you to the faithful discharge of the duties of your office, and by so doing you will merit the esteem and applause of your Brethren. The cross-pens are an emblem of silent communication. The pen should never be used in a cause of oppression, but the fluid should flow freely from it in the defence of a Brother's character when assailed, and should be eloquent in the cause of the destitute and oppressed. Congratulates Officer."}, {"s": "IPM", "t": "From centre of the Lodge with s..p and s..n. WM, who do you appoint DC?"}, {"s": "WM", "t": "Bro. QR."}, {"s": "IPM", "t": "squares the Lodge and takes Bro. IJ to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. QR, you are appointed DC, of this Lodge, and I invest you with the Collar and Jewel of your Office. Your duty is to see that the Ceremonies of the Lodge are carried on with propriety and decorum, the visitors and Brethren placed according to their rank, and the officers in their respective stations. I trust you will give to your duties the attention which their importance demands. Congratulates Officer. DC continues with the investiture."}, {"s": "DC", "t": "From centre of the Lodge with s..p and s..n. WM, who do you appoint Almoner?"}, {"s": "WM", "t": "Bro. ST."}, {"s": "DC", "t": "squares the Lodge and takes Bro. ST to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. ST, you have been appointed Almoner of the Lodge and I now invest you with the Collar and Jewel of your Office. Appropriate instructions from the WM who then congratulates the Officer."}, {"s": "DC", "t": "From centre of the Lodge with s..p and s..n. WM, who do you appoint Charity Steward?"}, {"s": "WM", "t": "Bro. UV."}, {"s": "DC", "t": "squares the Lodge and takes Bro. UV to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. UV you are appointed Charity Steward of the Lodge and I now invest you with the Collar and Jewel of your Office. Appropriate instructions from the WM who then congratulates the Officer."}, {"s": "DC", "t": "From the centre of the Lodge with s..p and s..n. WM, who do you appoint SD of the Lodge?"}, {"s": "WM", "t": "Bro. MN."}, {"s": "DC", "t": "squares the Lodge and takes Bro. MN to the left side of the WM's pedestal and returns him to his seat after being invested. Bro. MN, you are appointed the SD of this Lodge, and I invest you with your Collar and Jewel of Office. It is your duty to attend on the WM, and assist the Ws, in the active duties of the Lodge, such as the reception of Candidates into the different Degrees of the Order, and in the immediate practice of our Rites. This wand, the emblem of your office, I entrust to you, not doubting your vigilant attention. The dove is an emblem of celerity and peace, and indicates the swiftn
