ou have heard the minutes as read by our Bro Sec will all Brethren who were then present and deem them a true and correct record please signify in the usual manner among Masons. Done. To the contrary Done. Bro Sec the minutes are confirmed."}, {"s": "SEC", "t": "With s..p and s..n. Thank you WM."}, {"s": "SD", "t": "takes the Minute Book to WM for signature, and with s..p s..n returns it to the Sec."}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. I will thank all EA's with the exception of Bro AB to retire from the Lodge for a short while. Questions before Passing"}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s. Brethren, Bro AB is this evening a Candidate to be passed to the Second Degree, but it is first requisite that he should give proofs of his proficiency in the former; I shall therefore proceed to put the necessary questions. Bro JD. The JD places the Can. at the NE corner facing the WM."}, {"s": "WM", "t": "To Can. Where were you first prepared to be made a Mason?"}, {"s": "CAN", "t": "In my heart."}, {"s": "WM", "t": "Where next?"}, {"s": "CAN", "t": "In a convenient room adjoining the Lodge."}, {"s": "WM", "t": "Describe the mode of your preparation."}, {"s": "CAN", "t": "I was divested of m..t..l and h..d w..d, my r..t a..m, l..t b..t and k..e, were made b..e, my r..t h..l was s..p s..d, and a c..e t..w placed about my neck."}, {"s": "WM", "t": "Where were you made a Mason?"}, {"s": "CAN", "t": "In the body of a Lodge, just, perfect, and regular."}, {"s": "WM", "t": "And when?"}, {"s": "CAN", "t": "When the sun was at its Meridian."}, {"s": "WM", "t": "In this country Freemason's Lodges are usually held in the evening, how do you account for that, which at the first view appears a paradox?"}, {"s": "CAN", "t": "The earth constantly revolving on its axis in its orbit round the Sun, and Freemasonry being universally spread over its surface, it necessarily follows that the Sun is always at its meridian with respect to Freemasonry."}, {"s": "WM", "t": "What is Freemasonry?"}, {"s": "CAN", "t": "A peculiar system of morality, veiled in allegory, and illustrated by Symbols."}, {"s": "WM", "t": "Name the grand principles on which the Order is founded."}, {"s": "CAN", "t": "Brotherly Love, Relief, and Truth."}, {"s": "WM", "t": "Who are fit and proper persons to be made Masons?"}, {"s": "CAN", "t": "Just, upright, and free men, of mature age, sound judgement, and strict morals."}, {"s": "WM", "t": "How do you know yourself to be a Mason?"}, {"s": "CAN", "t": "By the regularity of my initiation, repeated trials and approbation, and a willingness at ALL times to undergo an examination when properly called on."}, {"s": "WM", "t": "How do you demonstrate the proof of being a Mason to others?"}, {"s": "CAN", "t": "By s..ns, t..s, and the perfect points of my entrance."}, {"s": "WM", "t": "These, Brethren, are the usual Questions. If any Brother desires me to put others, I will do so."}, {"s": "WM", "t": "To Can. Do you pledge your honour as a man, and your fidelity as a Mason, that you will steadily persevere through the Ceremony of being passed to the Degree of a FC?"}, {"s": "CAN", "t": "I do."}, {"s": "WM", "t": "Do you likewise pledge yourself, that you will conceal what I shall now impart to you with the same strict caution as the other secrets in Freemasonry?"}, {"s": "CAN", "t": "I do."}, {"s": "WM", "t": "Then I will entrust you with a test of merit, which is a p..s g..p and p..s w..d leading to the Degree to which you seek to be admitted. The JD places the Candidate within reach of the WM's r..t h..d. The p..s g..p is given by a distinct p..s..e of the .. between the first and second etc. This p..s g..p demands a p..s w..d, which is S..h. Repeat."}, {"s": "CAN", "t": "S..h."}, {"s": "WM", "t": "Resumes to Can. S..h denotes p..y, and is usually depicted in our Lodges by an ear of corn, near to a f..l of w..r. You must be particularly careful to remember this word, as without it you cannot gain admission into a Lodge in a superior degree. Pass S..h. The JD takes the Can. by the right hand to the NW corner."}, {"s": "JD", "t": "To Can. Salute the WM as an EAFM Done. Candidate then retires to be prepared. Opening the Lodge In The Second Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to open the Lodge in the Second Degree. All rise. Bro JW, what is the first care of every FCFM?"}, {"s": "JW", "t": "With s..p and s..n. To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "To IG with s..p and s..n. Bro IG, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "IG gives three k..s and being answered by the Tyler, he takes the s..p and gives the s..n of the First Degree, and says, Bro JW, the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n. Worshipful Master, the Lodge is properly Tyled."}, {"s": "WM", "t": "Bro SW, the next care?"}, {"s": "SW", "t": "With s..p and s..n. To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order as EAs. Bro JW, are you a FCFM?"}, {"s": "JW", "t": "I am, WM try me, and prove me."}, {"s": "WM", "t": "To JW. By what instrument in Architecture will you be proved?"}, {"s": "JW", "t": "The S..e."}, {"s": "WM", "t": "To JW. What is a S..e?"}, {"s": "JW", "t": "An angle of 90 degrees, or the fourth part of a circle."}, {"s": "WM", "t": "To JW. Being yourself acquainted with the proper method, you will prove the Brethren Craftsmen, and demonstrate that proof to me by copying their example."}, {"s": "JW", "t": "Brethren, it is the WM's command that you prove yourselves Craftsmen. When the Brethren have taken the s..p and given the s..n , and the JW has seen them to be correct, he makes the following report: WM, the Brethren have proved themselves Craftsmen, and in obedience to your command I thus copy their example. Done."}, {"s": "WM", "t": "Bro JW, I acknowledge the correctness of the s..n. Gives s..p and s..n. Before we open the Lodge in the Second Degree."}, {"s": "Chap", "t": "Let us supplicate the Grand Geometrician of the Universe, that the rays of heaven may shed their influence, to enlighten us in the paths of virtue and science."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Grand Geometrician of the Universe, I declare the Lodge duly opened, on the S..e, for the instruction and improvement of Craftsmen."}, {"s": "WM", "t": "gives second degree k..k when all drop s..n and are then repeated by S and J W\u2019s, IG, and T. The JD with wand turns the second degree TB while the IPM raises one p..t of the c..s above the s..e, and gives the second degree s..n before returning to his place."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s. Brethren, I have much pleasure in announcing that I shall be assisted in the ceremony this evening by .. When the Candidate is ready, the Tyler gives the k..k, the IG advances towards the JW with the s..p and s..n of the Second Degree."}, {"s": "IG", "t": "Bro JW, there is an alarm."}, {"s": "JW", "t": "Rises, gives the k..k, s..p and s..n. WM there is an alarm."}, {"s": "WM", "t": "Bro JW, inquire the cause of the alarm."}, {"s": "JW", "t": "Seated. To IG who stands with s..p and s..n. Bro IG, see the cause of the alarm."}, {"s": "IG", "t": "Opens the door, and asks the Tyler, Whom have you there?"}, {"s": "Tyler", "t": "To IG. Bro AB, who has been regularly initiated into Freemasonry, and has made such progress as he hopes will recommend him to be passed to the Degree of a FC, for which ceremony he is properly prepared."}, {"s": "IG", "t": "To Tyler. How does he hope to obtain the privileges of the Second Degree?"}, {"s": "Tyler", "t": "To IG. By the help of God, the assistance of the s..e and the benefit of a p..s w..d."}, {"s": "IG", "t": "To Candidate. Give me the p..s g..p and p..s w..d. Done. Wait while I report to the WM. The IG closes the door, advances with s..p and s..n towards the WM."}, {"s": "WM", "t": "at the door of the Lodge stands Bro AB, who has been regularly initiated into Freemasonry, and has made such progress as he hopes will recommend him to be passed to the Degree of a FC, for which ceremony is he properly prepared."}, {"s": "WM", "t": "How does he hope to obtain the privileges of the Second degree?"}, {"s": "IG", "t": "By the help of God, the assistance of the S..e and the benefit of a p..s w..d."}, {"s": "WM", "t": "We acknowledge the propriety of the aid by which he seeks admission; do you, Bro IG, vouch that he is in possession of the p..s w..d?"}, {"s": "IG", "t": "I do, WM."}, {"s": "WM", "t": "Then let him be admitted in due form. Bro Deacons. The Can. is met at the door by the IG, who applies the external angle of the S..e to the Can's b..t, and then raises it above his own head, that the WM may see he has so applied it. The SD then with his l..t h..d takes the r..t h..d of the Can. with the JD taking his l..t leads him to K..g S..l in front of the SW."}, {"s": "SD", "t": "Advance and salute the WM as a Mason. Done by all three."}, {"s": "WM", "t": "Let the Can. k..l, while the blessing of Heaven is invoked on what we are about to do. One k..k by WM, S and J W\u2019s. During the Prayer the D's cross w..ds over the Can. JD ensures the Can. gives s..n of R..e."}, {"s": "ALL", "t": "All rise with s..n of R..e."}, {"s": "Chap", "t": "We supplicate the continuance of Thine aid, O merciful Lord, on behalf of ourselves and him who k..s before Thee; may the work begun in Thy name be continued to Thy Glory, and evermore established in us, by obedience to Thy precepts."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Let the Can. rise."}, {"s": "DC", "t": "Be seated Brethren. 1st Perambulation The SD takes Can. by the r..t h..d, and leads him once round the Lodge, as follows:"}, {"s": "SD", "t": "To Can. Salute the WM as an EAFM Done. Advance to the JW as an EAFM."}, {"s": "JW", "t": "What is that?"}, {"s": "SD", "t": "& CAN The first regular s..p in F..y."}, {"s": "JW", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The p..l s..n of a EAFM. Drop s..n."}, {"s": "JW", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A g..p or t..n."}, {"s": "JW", "t": "Stands. Give me that g..p or t..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The g..p of t..n of an EAFM."}, {"s": "JW", "t": "What does this g..p or t..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "JW", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN At my initiation I was taught to be cautious but with you I will l..r or h..e it."}, {"s": "JW", "t": "L..r (or h..e) it and you begin. Done. Pass .. Guides Can in front of p..d..l and proceeds to SW."}, {"s": "SD", "t": "Salute the SW as a EAFM. Done and returns to the NW Corner. 2nd Perambulation"}, {"s": "WM", "t": "K..ks, followed by S and J W\u2019s. The Brethren will take notice that Bro AB, who has been regularly initiated into F..y, is about to pass in view before them, to show that he is the Can. properly prepared to be passed to the Degree of a FC."}, {"s": "SD", "t": "The Candidate is again led round the Lodge as follows. Salute the WM as a Mason. Done. Salute the JW as a Mason. Done. Advance to the SW as an EAFM showing the s..n and communicating the p..s g..p and p..s w..d you received from the WM previous to leaving the Lodge. Done."}, {"s": "SW", "t": "The SW rises, and Can. gives p..s g..p. What is this?"}, {"s": "SD", "t": "& CAN The p..s g..p leading from the First to the Second Degree."}, {"s": "SW", "t": "What does this p..s g..p demand?"}, {"s": "SD", "t": "& CAN A p..s w..d."}, {"s": "SW", "t": "Give me that p..s w..d."}, {"s": "SD", "t": "& CAN S..h."}, {"s": "SW", "t": "What does s..h denote?"}, {"s": "SD", "t": "& CAN P..y."}, {"s": "SW", "t": "How is it depicted in our Lodges?"}, {"s": "SD", "t": "& CAN By an ear of corn near to a f..l of w..r."}, {"s": "SW", "t": "Pass, .. The SD takes Can. to the left side of the SW, who takes him by the r..t h..d and presents him to the WM, as follows:- Rises, and gives the s..n of F..y. WM, I present to you Bro AB, a Can. properly prepared to be passed to the Second Degree."}, {"s": "WM", "t": "Bro SW, you will direct the SD to instruct the Can. to advance to the E in due form."}, {"s": "SD", "t": "conducts Can. to NW Corner."}, {"s": "SW", "t": "Bro SD, it is the WM's command that you instruct the Can. to advance to the E in due form."}, {"s": "SD", "t": "& CAN The SD conducts the Candidate E turning to face JW. The method of advancing from W to E in this degree is by f..e s..ps, as if ascending a w..g s..e; place your l..t f..t pointing to the JW and r..t f..t to the SW and commencing with the l..t f..t. For your instruction I will first go through them, after which, you will please copy my example. Done."}, {"s": "JD", "t": "joins SD and Can. at p..l."}, {"s": "WM", "t": "To Can. Bro AB, as in every case the different Degrees of F..y are to be kept separate and distinct, another O..i..n will now be required of you, in many respects similar to the former; are you willing to take it?"}, {"s": "SD", "t": "& CAN I am."}, {"s": "WM", "t": "Then you will k..l on your r..t k..e, your l..t f..t formed in a s..e, place your r..t h..d on the VoSL, while your l..t a..m will be supported in the angle of the S..e; repeat your names at length, and say after me. The WM and Ws give one k..k, the Brethren rise and place their r..t h..d on l..t b..t. while D's cross w..ds over Can. OBLIGATION I, AB, in the presence of the Grand Geometrician of the Universe, and of this worthy and worshipful Lodge of Fellow Craft Freemasons, regularly held, assembled, and properly dedicated, of my own free will and accord, do hereby and hereon most solemnly promise and swear, that I will always hele, conceal, and never improperly reveal any or either of the s..s or mysteries of or belonging to the Second Degree in Freemasonry, denominated the F. Craft's, to him who is but an EA, any more than I would either of them to the uninstructed or popular world who are not Masons; I further solemnly promise to act as a true and faithful craftsman, answer s..ns, obey summonses, and maintain the principles inculcated in the former Degree; these several points I solemnly swear to observe, without evasion, equivocation, or mental reservation of any kind. So help me, Almighty God, and keep me steadfast in this my solemn O..l..n. of a FCFM. The WM removes the S..e."}, {"s": "WM", "t": "Continues As a pledge of your fidelity, and to render this a solemn O..l..n, which might otherwise be considered but a serious promise, you will seal it with your l..s t..e on the VoSL. Done. D's lower wands and b..n d..p s..n. Your progress in Masonry is marked by the position of the S..e and C..p..s. When you were made an EA both p..s were hidden; in this Degree one is disclosed, implying that you are now midway in Freemasonry, superior to an EA, but inferior to that to which I trust you will hereafter attain. Takes him by the r..t h..d. Rise, newly O..i..d FCFM."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "SD takes Can. to SE corner facing E. Having taken the solemn O..i..n of a FCFM, I shall now proceed to entrust you with the s..s of this Degree. You will therefore advance towards me, as at your initiation Done; you will now take another short p.a. towards me with your l..t f..t, bringing the r..t h..e into its h..w as before Done; that is the second regular s..p in F..y, and it is in this position the s..s of the Degree are communicated. They consist, as in the former instance, of a s..n, t..n and w..d, with this difference, that in this Degree the s..n is of a threefold nature. The first part of this threefold s..n is called the s..n of F..y, and is given by, etc., Can. copies emblematically to shield the repository of your s..s from the attacks of the insidious. The second part is called the h..l..g s..n, or s..n of p..e, and is given by, etc. Can. copies. This took its rise at the time that J..a fought the battles of the Lord, when it was in this position he prayed fervently to the Almighty to continue the light of day, that he might complete the overthrow of his enemies. The third part is called the p..l s..n and is given by etc. Can. copies, this alludes to the symbolic penalty at one time included in the O..i..n in this degree which implied that as a man of honour, a FCFM would rather have had the LBCO the HTT and given as PTTRB of the A and the DBOTF than have improperly disclosed the s..s entrusted to him. The g..p or t..n is given by a distinct pressure, etc.; Whereby one F.C. may know another by night as well as by day. This g..p demands a w..d, a w..d to be given and received with the same strict caution as that in the former Degree; it is never to be given at length, but always by, etc.; to enable you to do this, I must tell you that the w..d is .. the w..d is spelt, Can. repeats, as in the course of the ceremony you will be called on for this word, the SD will now dictate the answers you are to give. SD and Can. step back two paces."}, {"s": "WM", "t": "I will thank Bro AB to advance to me as a FCFM first as an EA. Done. What is that?"}, {"s": "SD", "t": "& CAN The second regular s..p in F..y."}, {"s": "WM", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "WM", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The s..n of F..y emblematically to shield the repository of my s..s from the attacks of the insidious."}, {"s": "WM", "t": "Do you bring anything else?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "WM", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The H.J. s..n or s..n of P.o.e."}, {"s": "WM", "t": "When did it takes it's rise?"}, {"s": "SD", "t": "& CAN At the time that J fought the battles of the L when it was in this position he prayed fervently to the almighty to continue the light of day that he might complete the overthrow of his enemies."}, {"s": "WM", "t": "Do you bring anything further?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "WM", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The p.n.s s..n of a FCFM."}, {"s": "WM", "t": "To what does it allude?"}, {"s": "SD", "t": "& CAN The symbolic penalty of this degree which implied that as a man of honour, a FCFM would rather have had the LBCO, the HTT and given as PTTRB of the A and the DBOTF than have improperly disclosed the s..s entrusted to him. Drop hands."}, {"s": "WM", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A g..p or t..n. Done."}, {"s": "WM", "t": "Give me that g..p or t..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The g..p or t..n of a FCFM whereby one FC may know another by night as well as by day."}, {"s": "WM", "t": "What does this g..p or t..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "WM", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN In this Degree as in the former I was taught to be cautious but with you I will l..r or h..e it."}, {"s": "WM", "t": "L..r (or h..e) it and you begin. Done. This w..d is derived from the r..t h..d p..r at the p..h..y or entrance of KST, so named after J..n, the Assistant High Priest, who officiated at its dedication; the import of the w..d is to e..b..h, and when conjoined with that in the former Degree, s..a..y, for God said, \"In s..h I will establish this mine house to stand firm for ever\". Pass .. J..n. Can handed to SD. 3rd Perambulation"}, {"s": "SD", "t": "To JW with s..n, Bro JW. I present to you Bro AB, on his being passed to the second Degree."}, {"s": "JW", "t": "I will thank Bro AB to advance to me as a FCFM first as an EA. Done. What is that?"}, {"s": "SD", "t": "& CAN The second regular s..p in F..y."}, {"s": "JW", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The s..n of F..y."}, {"s": "JW", "t": "Do you bring anything else?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The H..g s..n or s..n of P..e."}, {"s": "JW", "t": "Do you bring anything further?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The P..l s..n of a FCFM. Drop hands."}, {"s": "JW", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A g..p or t..n."}, {"s": "JW", "t": "Give me that g..p or t..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The g..p or t..n of a FCFM."}, {"s": "JW", "t": "What does this g..p or t..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "JW", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN In this Degree as in the former I was taught to be cautious but with you I will l..r or h..e it."}, {"s": "JW", "t": "L..r (or h..e) it and you begin. Done. Pass .. The Can. is then conducted to the SW and is presented as before."}, {"s": "SD", "t": "With sign, Bro SW, I present to you Bro AB, on his being passed to the second Degree."}, {"s": "SW", "t": "I will thank Bro AB to advance to me as FCFM, first as an EA. Done. What is that?"}, {"s": "SD", "t": "& CAN The second regular s..p in F..y."}, {"s": "SW", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The s..n of F..y emblematically to shield the repository of my s..s from the attacks of the insidious."}, {"s": "SW", "t": "Do you bring anything else?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The H..g s..n or s..n of P..e."}, {"s": "SW", "t": "When did it take it's rise?"}, {"s": "SD", "t": "& CAN At the time that J. fought the battles of the L., when it was in this position he prayed fervently to the Almighty to continue the light of day that he might complete the overthrow of his enemies."}, {"s": "SW", "t": "Do you bring anything further?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The P..l s..n of a FCFM."}, {"s": "SW", "t": "To what does it allude?"}, {"s": "SD", "t": "& CAN The symbolic penalty of this degree which implied that as a man of honour, a FCFM would rather have had the LBCO, the HTT and given as PTTRB of the A and the DBOTF than have improperly disclosed the s..s entrusted to him. Drop hands."}, {"s": "SW", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A g..p or t..n."}, {"s": "SW", "t": "Give me that g..p or t..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The g..p or t..n of a FCFM, whereby one FC may know another by night as well as by day."}, {"s": "SW", "t": "What does this g..p or t..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "SW", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN In this Degree as in the former I was taught to be cautious but with you I will l..r or h..e it."}, {"s": "SW", "t": "L..r (or h..e) it and you begin. Done. - Whence was this w..d derived?"}, {"s": "SD", "t": "& CAN From the r..t h..d p..r at the p..h..y or entrance of KST, so named after J..n, the Assistant High Priest, who officiated at it's dedication."}, {"s": "SW", "t": "The import of the w..d?"}, {"s": "SD", "t": "& CAN To e..b..h."}, {"s": "SW", "t": "And what when conjoined with that in the former degree?"}, {"s": "SD", "t": "& CAN S..a..y for God said \"In S..h I will e..b..h this mine house to stand firm for ever."}, {"s": "SW", "t": "Pass .. The Can. is taken to the l..t of SW, who taking him by the r..t h..d, with the s..n, presents him to the WM."}, {"s": "WM", "t": "I present to you Bro AB, on his being passed to the Second Degree, for some mark of your favour."}, {"s": "WM", "t": "Bro SW, I delegate you to invest him with the distinguishing b..e of a FCFM."}, {"s": "SW", "t": "SW leaves his seat from the l..t and turns the Can. to face south. To Can. Bro AB, by the WM's command, I invest you with the distinguishing b..e of a FCFM, to mark the progress you have made in the science. SW salutes the WM from the front of the p..l and returns to his seat from the south side."}, {"s": "SD", "t": "places Can. in the NW corner."}, {"s": "WM", "t": "To Can. Let me add to what has been stated by the SW, that the b..e with which you have just been invested, points out to you that, as a Craftsman, you are expected to make the liberal arts and sciences your future study, that you may the better be enabled to discharge your duty as a Mason, and estimate the wonderful works of the Almighty."}, {"s": "DC", "t": "Brethren, one, two, clap. Done."}, {"s": "WM", "t": "Bro SD, you will place our Bro at the SE part of the Lodge. Done. To Can. Masonry being a progressive science, when you were made an EA you were placed at the NE part of the Lodge to show that you were newly admitted; you are now placed at the SE part, to mark the progress you have made in the science; you now stand, to all external appearance, a just and upright FCFM and I give it to you in strong terms of recommendation ever to continue and act as such, and as I trust the import of the former charge neither is, nor ever will be, effaced from your memory, I shall content myself with observing, that as in the former Degree you made yourself acquainted with the principles of moral truth and virtue, you are now permitted to extend your researches into the hidden mysteries of nature and science."}, {"s": "DC", "t": "Brethren, one, two, clap. Done. The Can. is now placed by the SD in front of the SW's chair."}, {"s": "WM", "t": "To Can. I now present to you the working tools of a FCFM, which are the S..e, L..l and P..b..e. The S..e is to try and adjust the rectangular corners of the buildings, and assist in bringing rude matter into due form; the L..l to lay l..ls and prove horizontals; and the P..b..e to try and adjust uprights, while fixing them on their proper bases. But as we are not all operative Masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, *The S..e teaches morality, the L..L equality and the P..l..e justness and uprightness of life and actions. **Thus by s..e conduct l..l steps, and upright intentions, we hope to ascend to those immortal mansions whence all goodness emanates. *Start extended version. **Re-start after extended version. Extended version The S..e teaches us to regulate our actions by the Masonic line and rule, and so to correct and harmonise our conduct in this life, as to render us acceptable to the Divine Being from whom all goodness emanates, and to whom we must give an undisguised account of our lives and actions. The L..l demonstrates that we are all sprung from the same stock, are partakers of the same nature, and sharers of the same hope; and that although distinctions among men are highly necessary to preserve due subordination, and to reward merit and ability, yet that no eminence of station should cause us to forget that we are Brethren, and that he who is placed on the lowest spoke of fortune's wheel is equally entitled to our regard with him who has attained its highest, as a time will most assuredly come, and the best and wisest of us know not how soon, when all distinctions save those of piety and virtue shall cease, and death, the great leveller of all human greatness, shall reduce us all to the same state. The infallible P..b..e, which like Jacob's ladder forms a line of union between heaven, and earth and is the criterion of moral rectitude and truth, teaches us that to walk with humility and uprightness before God, neither turning to the right hand nor to the left from the strict path of virtue, is a duty incumbent on every Mason. Not to be an enthusiast, persecutor, slanderer, or reviler of religion; not bending towards avarice, injustice, malice, or envy and contempt of our fellow-creatures, but giving up every selfish propensity which may tend to injure others, and steering the bark of this life over the rough seas of passion without quitting the helm of rectitude, is the highest degree of perfection to which human nature is capable of attaining. As the builder raises his column by the level and the perpendicular, so ought every Mason to carry himself in this life as to observe a due medium between avarice and profusion, to hold the scales of justice with an equal poise, to make every passion and prejudice coincide with the strict line of his duty, and in every pursuit to have eternity in view. Hence, the S..e teaches us morality, the L..l equality, and the P..b..e justness and uprightness of life and actions. Extended version ends."}, {"s": "DC", "t": "Brethren, one, two, clap. Done."}, {"s": "WM", "t": "You are now at liberty to retire, in order to restore yourself to your personal comforts, and on your return to the Lodge, I shall call your attention to an explanation of the Tracing Board, if time will permit. The SD places the Can. in the NW corner of the Lodge."}, {"s": "SD", "t": "Salute the WM as a FCFM. Done. The SD escorts the Candidate to the door of the Lodge and resumes his seat."}, {"s": "JD", "t": "and SD places the TB and pointer in the centre of the Lodge. Tyler gives second degree k..s."}, {"s": "IG", "t": "To JW, s..p and s..n. Bro JW there is a report."}, {"s": "JW", "t": "Stands, gives k..s of second degree, s..p and s..n. WM there is a report."}, {"s": "WM", "t": "Enquire who seeks admission Bro JW."}, {"s": "JW", "t": "Seated. To. IG who stands with s..p and s..n. See who seeks admission Bro IG."}, {"s": "IG", "t": "Enquires through hatch in door, addresses WM with s..p and s..n. WM, Bro AB seeks re-admission."}, {"s": "WM", "t": "Admit him Bro IG if properly clothed, Bro SD. Bro IG opens the door, admits Candidate, SD guides him to NW corner of the Lodge."}, {"s": "SD", "t": "Advance and salute the WM as a FCFM first as an E.A. Done."}, {"s": "SD", "t": "squares the Lodge and places the Candidate at the south side of the TB and returns to his seat after telling the Candidate to await his return. JD assists SD with other Candidates. Explanation of the Second Degree Tracing Board When the Temple at Jerusalem was completed by King Solomon, its costliness and splendour became objects of admiration to the surrounding nations, and its fame spread to the remotest parts of the then-known world. There was nothing, however, in connection with this magnificent structure more remarkable, or which more particularly struck the attention, than the two great pillars which were placed at the porchway or entrance. That on the l..t was called .., which denotes in s..h, that on the r..t,.., which denotes to e..h, and when conjoined s..a..y, for God said, In s..h I will establish this mine house to stand firm for ever. The height of those pillars was 17 cubits and a half each, the circumference 12, the diameter 4; they were formed hollow, the better to serve as archives to masonry, for therein were deposited the constitutional rolls. Being formed hollow, the outer rim or shell was four inches or a hand's breadth in thickness. They were made of molten brass; and were cast on the banks of the Jordan, in the clayey ground between Succoth and Zeredatha, where King Solomon ordered those and all his holy vessels to be cast. The Superintendent of the casting was H..m A..ff. Those pillars were adorned with two chapiters, each 5 cubits high; the chapiters were enriched with network, lily-work, and pomegranates; network from the connection of its meshes, denotes unity; lily-work from its whiteness peace; and pomegranates, from the exuberance of their seed, denote plenty. There were two rows of pomegranates on each chapiter, one hundred in a row. Those pillars were further adorned with two spherical balls, on which were delineated maps of the celestial and terrestrial globes, pointing out \"Masonry universal.\" They were considered finished when the network or canopy was thrown over them; and were set up at the entrance of the Temple, as a memorial to the children of Israel of that miraculous pillar of fire and cloud, which had two wonderful effects: the fire gave light to the Israelites during their escape from their Egyptian bondage; the cloud proved darkness to Pharaoh and his followers when they attempted to overtake them. King Solomon ordered them to be placed at the entrance of the Temple, as the most proper and conspicuous situation for the children of Israel to have the happy deliverance of their forefathers continually before their eyes, in going to and returning from Divine worship. At the building of K.S. Temple, an immense number of Masons were employed. They consisted of E.As. and F.Cs.: the E.As. received a weekly allowance of Corn, Wine and Oil; the F.Cs. were paid their wages in specie, which they went to receive in the middle chamber of the Temple; they got there by the p..h..y or entrance at the south side. After our ancient Brethren had entered the porch, they arrived at the foot of a winding staircase, leading to the middle chamber of the Temple, where their ascent was opposed by the JW, who demanded of them the p..s g..p and p..s w..d leading from the First to the Second Degree. The p..s g..p you are already in possession of, and the p..s w..d, I dare say you recollect is .. S..h denotes p..y, and is here depicted by an ear of corn near to a f..l of w..r. The word S..h dates its origin from the time that an army of Ephraimites crossed the river Jordan in a hostile manner against Jephtha, the renowned Gileaditish general; the reason they assigned for this unfriendly visit was, that they had not been called out to partake of the honours of the Ammonitish war, but their true aim was to partake of the rich spoils, with which, in consequence of that war, Jephtha and his army were then laden. The Ephraimites were always considered a clamorous and turbulent people, but then broke out into open violence, and, after many severe taunts to the Gileadites in general, threatened to destroy their victorious commander and his house with fire. Jephtha, on his part, tried all lenient means to appease them, but, finding these ineffectual, had recourse to rigorous ones; he therefore drew out his army, gave the Ephraimites battle, defeated and put them to flight, and in order to render his victory decisive, and secure himself from a like molestation in future, he sent detachments of his army. to secure the passages of the river Jordan, over which he knew the insurgents must of necessity attempt to go in order to regain their own country, giving strict orders to his guards, that if a fugitive came that way, owning himself an Ephraimite, he should be immediately slain; but if he prevaricated, or said nay, a test w..d was to be put to him, to pronounce the w..d Sh..o..h; they, through a defect in aspiration, peculiar to their dialect, could not pronounce it properly, but called it Si..o..h, which small variation discovered their country and cost them their lives, and Scripture informs us that there fell on that day, on the field of battle and on the banks of the Jordan, forty and two thousand Ephraimites. And as S..o..h was then a test w..d to distinguish friend from foe, K..g S..n afterwards caused it to be adopted as a p..s w..d in a F.C.L., to prevent any unqualified person from ascending the winding staircase, leading to the middle chamber of the Temple. After our ancient Brethren had given those convincing proofs to the JW, he said, Pass, S..o..h, they then passed up the winding staircase, consisting of 3, 5, 7, or more s..ps; 3 rule a Lodge, 5 hold a Lodge, 7 or more make it perfect: the 3 that rule are the WM and his two Ws.; the 5 that hold a Lodge are the WM, 2 Wardens and 2 F.C.; the 7 that make it perfect are 2 E.A. added to the former five. 3 rule a Lodge, because there were but three Grand Masters who bore sway at the building of the first Temple at Jerusalem - viz., Solomon, King of Israel, H., King of T..e, and H..m A..ff. 5 hold a Lodge, in allusion to the 5 noble Orders of Architecture - viz., the Tuscan, Doric, Ionic, Corinthian, and Composite; 7 or more make a perfect Lodge, because King Solomon was 7 years and upwards in building, completing, and dedicating the Temple at Jerusalem to God's service; they have likewise an allusion to the 7 liberal arts and sciences - viz., G., R., L., A., G., M., and A. After our ancient Brethren had gained the summit of the winding staircase, they arrived at the door of the middle chamber, which they found open, but properly tyled against all under the Degree of a F.C. by the SW, who demanded of them the s..n, t..n, and w..d of a F.C. After they had given those convincing proofs to the SW, he said, Pass, J..n, they then passed into the middle chamber of the Temple, where they went to receive their wages, which they did without scruple, or diffidence, without scruple well knowing they were justly entitled to them; and without diffidence, from the great reliance they placed on the integrity of their employers in those days. When our ancient Brethren were in the middle chamber of the Temple, their attention was peculiarly drawn to certain Hebrew characters, which are here depicted by a letter, G, WM, S and J W\u2019s. k..k, all stand with s..n of F..y, denoting God, the Grand Geometrician of the Universe, to whom we must all submit, and whom we ought humbly to adore."}, {"s": "DC", "t": "Brethren, one, two, clap. Done. Be seated Brethren."}, {"s": "SD", "t": "conducts the Can. to a seat in the NW and removes TB and pointer. The Ceremony proceeds with both Candidates until they have answered the questions alternatively and exit the Lodge. The Ceremony proceeds with the first Candidate until the Obligation is completed when the SD takes the Candidate to a seat in the South, in front of the Treasurer's chair. The SD returns to his seat. The DC instructs the Brethren to be seated and ask the IG to enquire if the second Candidate is ready, which he does through the hatch. The Tyler knocks the second Candidate in and the ceremony is repeated to the completion of the Obligation. Both Candidates are then assembled by the D\u2019s. in the South, facing East and the Ceremony proceeds and is completed. During the explanation of the s..s, and when the Candidates are presented to the W\u2019s. during the perambulations, the Candidates answer questions, alternately, the assistance of a PM will be required. Double Ceremonies in the other degrees are not to be encouraged in the Vulcan Lodge. Closing the Lodge in the Second Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to close the Lodge in the Second Degree. All rise. Bro JW, what is the constant care of every FCFM?"}, {"s": "JW", "t": "With s..p and s..n. To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "Drops s..n. Bro IG, prove the Lodge close Tyled. IG gives s..p and s..n which is returned by the JW."}, {"s": "IG", "t": "IG gives three k..s, of FC, which are answered by the Tyler, IG takes s..p and s..n of the Second Degree and says, Bro JW the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s, s..p and s..n. Worshipful Master, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW, the next care?"}, {"s": "SW", "t": "With s..p and s..n. To see that the Brethren appear to order as Craftsmen."}, {"s": "WM", "t": "To order, Brethren, in the Second Degree. The Brethren take the s..p, and stand to order with the s..n of a FCFM."}, {"s": "WM", "t": "Bro JW, in this position what have you discovered?"}, {"s": "JW", "t": "A sacred symbol."}, {"s": "WM", "t": "Bro SW, where is it situated?"}, {"s": "SW", "t": "In the centre of the building."}, {"s": "WM", "t": "To JW. To whom does it allude?"}, {"s": "JW", "t": "To the Grand Geometrician of the Universe."}, {"s": "WM", "t": "Then, Brethren."}, {"s": "Chap", "t": "Let us remember that wherever we are, or whatever we do, He is with us, and His all -seeing eye observes us, and while we continue to act in conformity with the principles of the Craft, let us not fail to discharge our duty to Him with fervency and zeal."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro SW, the labours of this Degree being ended, you have my command to close this FC Lodge. Gives the k..s."}, {"s": "SW", "t": "Brethren, in the name of the Grand Geometrician of the Universe, and by command of the WM, I close this FC Lodge. Gives k..s when all d..p s..n."}, {"s": "JW", "t": "Happy we have met, Happy may we part, And happy meet again. Gives the k..s, also the IG and T. The JD with wand turns the Second Degree TB while the IPM returns both p..s of the c..s under the s..e. After giving the First Degree s..n he returns to his seat."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "One k..k followed by S and JW. Bro IG admit the EAs. ALTERNATIVE"}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s stands and says, By virtue of the power vested in me as Master of this Lodge and thereby the humble representative of KS I close this FC Lodge and this shall be may warrant gives Second Degree k..s followed by the S and J W\u2019s., IG and T. JD with wand turns the Second Degree TB while the IPM returns both p..s of c..s under the s..e, after giving CB returns to his chair."}, {"s": "WM", "t": "And it now stands open in the First Degree and this shall be my warrant. Gives First Degree k..s followed by S and J W\u2019s, IG and T. WM sits."}, {"s": "WM", "t": "gives one k..k followed by S and J W\u2019s and says, Bro IG admit the EAs. IG with s..p and s..n. Done. Other Lodge Business"}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the first time I rise to enquire if any Brother has ought to propose for the good of Freemasonry in general or this the Vulcan Lodge No. 4510 in particular. Bro Sec are there any communications from the Grand Lodge. Sec reads communications from Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Grand Lodge. If present greeting are given by G Officers."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the second time I rise etc., Bro. Sec are there any communications from Prov. Grand Lodge. Sec reads communications from Prov. Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Provincial Grand Lodge. Greetings from PGL given by the most recently appointed PGO of the Lodge present."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the third time I rise etc. Bro Sec are there any further communications. Sec. reads any other communications."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications but I do have apologies from .. Proposition/notice of motion and any other business given at this point."}, {"s": "DC", "t": "Visiting Brethren wishing to give greetings may now do so commencing on the left of the WM and proceeding in a clockwise direction round the Lodge Room. Done."}, {"s": "SW", "t": "Brethren of the Vulcan Lodge No. 4510 upstanding."}, {"s": "ALL", "t": "With s..p and s..n. Hearty greetings WM. Closing the Lodge Generally The WM gives one k..k , followed by the S and J W\u2019s."}, {"s": "WM", "t": "Brethren, assist me to close the Lodge All rise. Bro JW JW with s..p and s..n, What is the constant care of every Mason?"}, {"s": "JW", "t": "To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done. JW drops sign"}, {"s": "JW", "t": "Bro IG With s..p and s..n prove the Lodge close Tyled."}, {"s": "IG", "t": "Bro IG drops s..n gives three k..s, which are answered by the Tyler; he takes the s..p and gives the s..n of the First Degree, and says, Bro JW, the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n WM, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW SW with s..p and s..n the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren in the First Degree. The Brethren takes the s..p and stand to order with the s..n of an EAFM."}, {"s": "WM", "t": "Bro SW your constant place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "As the Sun sets in the West to close the day, so the SW is placed in the West to close the Lodge, by command of the"}, {"s": "WM", "t": "after having seen that every Brother has had his due."}, {"s": "WM", "t": "And has every Bro had his due?"}, {"s": "SW", "t": "To the best of my masonic belief they have WM."}, {"s": "WM", "t": "Brethren, before we close the Lodge."}, {"s": "Chap", "t": "Let us with all reverence and humility express our gratitude to the Great Architect of the Universe, for favours already received, and may He continue to preserve our order by cementing and adorning it with every moral and social virtue."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro SW the labour of the evening being ended, you have my command to close the Lodge. Gives the k..s."}, {"s": "SW", "t": "Brethren, in the name of the Great Architect of the universe, and by command of the WM, I close the Lodge. Gives the k..s when all drop s..n."}, {"s": "JW", "t": "And it is closed accordingly, until the third Monday of Lodges of emergencies excepted, of which every subscribing Bro will receive due notice. Gives the k..s, followed by the IG and T. The JD without wand goes directly to the JW's chair, turns the first degree TB switches off his light then turns out the SW's light. The SD turns out the WM's light. The IPM, closes the VoSL and c..s placing them with the points inside the angle of the S..e., pointing W. He gives CB and returns to his chair. The SW lowers his c..n and the JW raises his all simultaneously."}, {"s": "IPM", "t": "Brethren nothing now remains but according to ancient custom to lock up our s..s in a safe and sacred repository of the Heart uniting in the act of fidelity, fidelity, fidelity all strike L.B. with their R.H.'s on each of these words and may G. preserve the order all raise R.H. to R. shoulder palm forwards."}, {"s": "WM", "t": "I extend a hearty invitation to all our visitors to stay to our after meeting and I hope as many as possible of our Brethren will stay to entertain them. The Alms box will be in the hands of the IG."}, {"s": "DC", "t": "I will thank the Brethren to remain standing while the WM accompanied by Officers of GL, PGL, and installed Masters retire. The organist commences the closing ode. The ADC exchanges CBs with the JD, and commences to SQ. the Lodge followed by the JD at the NE corner he exchanges CB with the SD and continues to s..e the Lodge exchanging CBs. with the J and S W\u2019s. who exit their chairs from the left following the Ds. as they pass. After exchanging CBs. with the WM; the ADC and D\u2019s. and W\u2019s. continue to s..e the Lodge to the door followed by the WM Officers of GL, PGL and IMs. who exit through the D\u2019s. crossed wands. The IG stands inside the door of the Lodge with the Alms Box. The Tyler stands outside the door with s..d."}, {"s": "WM", "t": "takes Candidate outside with him to be greeted by the Brethren."}], "3rd Degree - Raising": [{"s": "_dir", "t": "CEREMONY OF RAISING TO THE THIRD DEGREE"}, {"s": "_dir", "t": "Assembly in the Lodge Room"}, {"s": "DC", "t": "With w..d. All below rank of I.M. please enter the Lodge. Brethren enter and occupy seats in the N or S, with the exception of the D's and W's. The W's. stand immediately inside the door with the D's to their E, carrying their wands. The Juniors in the N. The IM's, Officers of Prov. GL and GL form a procession in two's outside the door, junior in rank first, WM, IPM and DC last."}, {"s": "Tyler", "t": "With sword, on signal from DC enters the Lodge Room. Upstanding Brethren to receive the WM. The D's followed by the W's lead the procession in narrow columns E along the N side of the Lodge stopping approx. 3 feet short of the KS and all turn inwards. The organist commences the opening ode, the D's cross their wands and the"}, {"s": "WM", "t": "followed by IPM enter and proceed under them to their seats. The DC directs the officers of GL and Prov. GL in two's seniors first, to the WM's right and IM's to the WM's left. The DC passes under the D's wands and commences to SQ. the Lodge. The D's, after uncrossing their wands, and W's follow. The DC stops in front of the JW's chair, the D's stop and cross their wands to allow the JW to enter his chair from the E side where he remains standing and exchanges CB with the DC. The DC, D's and W\u2019s. proceed to the SW's chair where the procedure is repeated for the SW to enter his chair. The JD then goes to his chair and exchanges CB with the DC. The DC proceeds to the NE corner followed by the"}, {"s": "SD", "t": "who goes to his chair and exchanges CB with the DC; who proceeds to his seat immediately on the WM's right, unless an official visitor or representative of PGL is attending. Opening the Lodge in the First Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to open the Lodge. All Rise. To JW, calling him by name Bro AB what is the first care of every Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "To IG, by name Bro AB, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "Gives three k..s, which are answered by the Tyler. The IG turns to the JW, Bro AB, the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives three k..s, and says, to WM. W.Bro AB, the Lodge is properly Tyled."}, {"s": "WM", "t": "To. SW, by name Bro AB the next care?"}, {"s": "SW", "t": "To see that none but Masons are present."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order with the s..n of an EA. Bro JW, how many principal officers are there in the Lodge?"}, {"s": "JW", "t": "Three: the WM, S and J W's."}, {"s": "WM", "t": "Bro SW, how many assistant officers are there?"}, {"s": "SW", "t": "Three, besides the Tyler or Outer Guard: namely, the S and J D\u2019s. and IG."}, {"s": "WM", "t": "To JW. The situation of the Tyler or Outer Guard?"}, {"s": "JW", "t": "Outside the door of the Lodge."}, {"s": "WM", "t": "To JW. His duty?"}, {"s": "JW", "t": "Being armed with a drawn sword, to keep off all intruders and Cowans to Masonry, and see that the Candidates are properly prepared."}, {"s": "WM", "t": "Bro IG Your situation in the Lodge?"}, {"s": "IG", "t": "Within the entrance of the Lodge."}, {"s": "WM", "t": "To IG. Your duty?"}, {"s": "IG", "t": "To admit Masons on proof, receive the Candidates in due form, and obey the commands of the JW."}, {"s": "WM", "t": "Bro JD. Your situation in the Lodge?"}, {"s": "JD", "t": "At the right of the SW."}, {"s": "WM", "t": "To JD. Your duty?"}, {"s": "JD", "t": "To carry all messages and communications of the WM from the S to the JW and see that the same are punctually obeyed."}, {"s": "WM", "t": "Bro SD. Your situation in the Lodge?"}, {"s": "SD", "t": "At or near to the right of the WM."}, {"s": "WM", "t": "To SD. Your duty?"}, {"s": "SD", "t": "To bear all messages and commands of the WM to the SW and await the return of the JD."}, {"s": "WM", "t": "Bro JW. Your place in the Lodge?"}, {"s": "JW", "t": "In the South."}, {"s": "WM", "t": "To JW. Why are you placed there?"}, {"s": "JW", "t": "To mark the Sun at its Meridian, to call the Brethren from labour to refreshment, and from refreshment to labour, that profit and pleasure may be the result."}, {"s": "WM", "t": "Bro SW. Your place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "To mark the setting Sun; to close the Lodge by command of the WM, after having seen that every Brother has had his due."}, {"s": "WM", "t": "W.Bro IPM. The Master's place?"}, {"s": "IPM", "t": "In the East."}, {"s": "WM", "t": "To IPM. Why is he placed there?"}, {"s": "IPM", "t": "As the Sun rises in the East to open and enliven the day, so the WM is placed in the East to open the Lodge, and employ and instruct the Brethren in Freemasonry."}, {"s": "WM", "t": "The Lodge being duly formed, before I declare it open."}, {"s": "Chap", "t": "Let us invoke the assistance of the Great Architect of the Universe on all our undertakings; may our labours, thus begun in order, be conducted in peace, and closed in harmony."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Great Architect of the Universe, I declare the Lodge duly opened for the purposes of Freemasonry in the First Degree. The WM gives three k..s, when all drop s..n, k..s are then repeated by the S and J W's, IG and Tyler. On completion of the k..s the JD with wand squares the Lodge, crossing immediately in front of the JW, saluting the WM on passing, turns the first d..e TB and switches on the JW's and the SW's lights. The IPM opens the VoSL places both P..S of the c..s under the s..e, pointing W salutes the WM and returns to his seat. The SD switches on the WM's light. The JW lowers his c..n and the SW raises his. These movements are carried out simultaneously."}, {"s": "DC", "t": "Be seated Brethren. Special Greetings/Standing to Order in Respect of Departed Merit The WM gives one k..k followed by the S and J W's and the makes an Appropriate announcement. Minutes"}, {"s": "WM", "t": "The WM gives one k..k followed by the S and J W\u2019s. The next business is to read and if approve, confirm the minutes of the last regular meeting (installation festival) Bro Sec, which must be read in the 1st Degree and no other."}, {"s": "SEC", "t": "Stands with s..p and s..n then reads the minutes. Those are the minutes as I have them recorded WM. With s..p and s..n."}, {"s": "WM", "t": "WM gives one k..k followed by S and J W's. Brethren you have heard the minutes as read by our Bro Sec will all Brethren who were then present and deem them a true and correct record please signify in the usual manner among Masons. Done. To the contrary. Done. Bro Sec. Your minutes are confirmed."}, {"s": "SEC", "t": "With s..p and s..n. Thank you WM."}, {"s": "SD", "t": "takes the Minute Book to WM for signature, and with s..p s..n returns it to the Sec."}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. I will thank all below the rank of an FCFM to retire from the Lodge for a short while. Opening the Lodge in the Second Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J Ws. Brethren, assist me to open the Lodge in the Second Degree. All rise. Bro JW, what is the first care of every FCFM?"}, {"s": "JW", "t": "With s..p and s..n. To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "To IG with s..p and s..n. Bro IG, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "IG gives three k..s, and being answered by the Tyler, he takes the s..p and gives the s..n of the First Degree, and says, Bro JW the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n. Worshipful Master, the Lodge is properly Tyled."}, {"s": "WM", "t": "Bro SW, the next care?"}, {"s": "SW", "t": "With s..p and s..n. To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order as EAs. Bro JW, are you a FCFM?"}, {"s": "JW", "t": "I am, WM; try me, and prove me."}, {"s": "WM", "t": "To JW. By what instrument in Architecture will you be proved?"}, {"s": "JW", "t": "The S..e."}, {"s": "WM", "t": "To JW. What is a S..e?"}, {"s": "JW", "t": "An angle of 90 degrees, or the fourth part of a circle."}, {"s": "WM", "t": "To JW. Being yourself acquainted with the proper method, you will prove the Brethren Craftsmen, and demonstrate that proof to me by copying their example."}, {"s": "JW", "t": "Brethren, it is the WM\u2019s command that you prove yourselves Craftsmen. When the Brethren have taken the s..p and given the s..n , and the JW has seen them to be correct, he makes the following report: WM, the Brethren have proved themselves Craftsmen, and in obedience to your command I thus copy their example. Done."}, {"s": "WM", "t": "Bro JW, I acknowledge the correctness of the s..n. Gives s..p and s..n. Before we open the Lodge in the second Degree."}, {"s": "Chap", "t": "Let us supplicate the Grand Geometrician of the Universe, that the rays of heaven may shed their influence, to enlighten us in the paths of virtue and science."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Grand Geometrician of the Universe, I declare the Lodge duly opened, on the S..e, for the instruction and improvement of Craftsmen."}, {"s": "WM", "t": "gives second degree k..k when all drop s..n and are then repeated by S and J W\u2019s., IG and T. The JD with wand turns the second degree TB while the IPM raises one p..t of the c..s above the s..e, and gives the second degree s..n before returning to his place."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "gives one k..k followed by the S and J W\u2019s. I will thank all below the rank of MM. with the exception of Bro AB to retire from the Lodge for a short while. Done. Questions before Raising"}, {"s": "WM", "t": "Brethren, Bro AB is this evening a Candidate to be raised to the Third Degree, but it is first requisite that he should give proofs of this proficiency in the Second; I shall therefore proceed to put the necessary questions, Bro SD The SD places the Can. in the NE corner facing the WM."}, {"s": "WM", "t": "To Can. How were you prepared to be passed to the Second Degree?"}, {"s": "CAN", "t": "In a manner somewhat similar to the former; save that in this Degree I was not h..d w..d; my l..t a..m, b..t and r..t k..e were made b..e, and my l..t h..l was s..p s..d."}, {"s": "WM", "t": "On what were you admitted?"}, {"s": "CAN", "t": "The s..e."}, {"s": "WM", "t": "What is a S..e?"}, {"s": "CAN", "t": "An angle of 90 degrees, or the fourth part of a circle."}, {"s": "WM", "t": "What are the peculiar objects of research in this Degree?"}, {"s": "CAN", "t": "The hidden mysteries of nature and science."}, {"s": "WM", "t": "As it is the hope of reward that sweetens labour, where did our ancient Brethren go to receive their wages?"}, {"s": "CAN", "t": "Into the middle chamber of King Solomon's Temple."}, {"s": "WM", "t": "How did they receive them?"}, {"s": "CAN", "t": "Without scruple or diffidence."}, {"s": "WM", "t": "Why in this peculiar manner?"}, {"s": "CAN", "t": "Without scruple, well knowing they were justly entitled to them; and without diffidence, from the great reliance they placed on the integrity of their employers in those days."}, {"s": "WM", "t": "What were the names of the two great pillars which were placed at the porchway or entrance of King Solomon's Temple?"}, {"s": "CAN", "t": "That on the l..t was called .., and that on the r..t, .."}, {"s": "WM", "t": "What are their separate and conjoint significations?"}, {"s": "CAN", "t": "The former denotes in s..h, the latter to e..h, and when conjoined, s..y, for God said, In strength I will establish this mine house to stand firm for ever."}, {"s": "WM", "t": "These, Brethren, are the usual Questions. If any Brother desires me to put others, I will do so."}, {"s": "WM", "t": "To Can. Do you pledge your honour as a man, and your fidelity as a Craftsman, that you will steadily persevere through the Ceremony of being raised to the Sublime Degree of a MM."}, {"s": "CAN", "t": "I do."}, {"s": "WM", "t": "Do you likewise pledge yourself, that you will conceal what I shall now impart to you with the same strict caution as the other secrets in F..y?"}, {"s": "CAN", "t": "I do."}, {"s": "WM", "t": "Then I will entrust you with a test of merit, which is a p..s g..p and p..s w..d leading to the Degree to which you seek to be admitted. The SD places the Can. within reach of the WM's r..t h..d. The p..s g..p is given by a distinct p..s..e of the .. between the second and third, etc. This p..s g..p demands a p..s w..d, which is TC Repeat."}, {"s": "CAN", "t": "TC."}, {"s": "WM", "t": "Resumes to Can. TC was the first artificer in metals. The import of the w..d is w..dly p..s..s. You must be particularly careful to remember this w..d, as without it you cannot gain admission into a Lodge in a Superior Degree. Pass TC. The SD takes the Can. by the r..t h..d to the NW corner of Lodge."}, {"s": "SD", "t": "Salute the WM as a FCFM. Done. Can. then retires to be prepared. Ceremony of Opening the Lodge in the Third Degree"}, {"s": "WM", "t": "Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to the open the Lodge in the Third Degree. All Rise."}, {"s": "WM", "t": "Bro JW, what is the first care of every Master Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW, Direct that duty to be done."}, {"s": "JW", "t": "Bro IG with s..p and s..n see that the Lodge is properly Tyled."}, {"s": "IG", "t": "Gives the k..s of FC, and being answered by the Tyler, he takes the s..p and gives the s..n of the Second Degree and says, Bro JW, the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n. Worshipful Master, the Lodge is properly Tyled."}, {"s": "WM", "t": "Bro SW, the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Craftsmen."}, {"s": "WM", "t": "To order, Brethren, in the Second Degree. The Brethren take the s..p, and stand to order with the s..n of a FC."}, {"s": "WM", "t": "Bro JW, are you a MM?"}, {"s": "JW", "t": "I am, WM try me, and prove me."}, {"s": "WM", "t": "To JW. By what instruments in Architecture will you be proved?"}, {"s": "JW", "t": "The S..e and C..p..s."}, {"s": "WM", "t": "To JW. Being yourself acquainted with the proper method, you will prove the Brethren MM\u2019s by s..ns and demonstrate that proof to me by copying their example."}, {"s": "JW", "t": "Brethren, it is the WM's command that you prove yourselves MM\u2019s by s..ns. Which they do and when he sees they are correct, he reports as follows: WM, the Brethren have proved themselves MM\u2019s by s..ns, and in obedience to your command, I thus copy their example. Done."}, {"s": "WM", "t": "Bro JW, I acknowledge the correctness of the s..ns. Gives them, with the s..p. Bro JW, whence come you?"}, {"s": "JW", "t": "The East."}, {"s": "WM", "t": "Bro SW whither directing your course?"}, {"s": "SW", "t": "The West."}, {"s": "WM", "t": "To Bro JW. What inducement have you to leave the East and go to the West?"}, {"s": "JW", "t": "To seek for that which was lost, which, by your instruction, and our own industry, we hope to find."}, {"s": "WM", "t": "To Bro SW. What is that which was lost?"}, {"s": "SW", "t": "The genuine secrets of a MM."}, {"s": "WM", "t": "To Bro JW. How came they lost?"}, {"s": "JW", "t": "By the untimely death of our Master H. A..ff."}, {"s": "WM", "t": "To Bro SW. Where do you hope to find them?"}, {"s": "SW", "t": "With the Centre."}, {"s": "WM", "t": "To Bro JW. What is a centre?"}, {"s": "JW", "t": "A point within a circle, from which every part of the circumference is equidistant."}, {"s": "WM", "t": "To Bro SW. Why with the Centre?"}, {"s": "SW", "t": "That being the point from which a MM cannot err."}, {"s": "WM", "t": "We will assist you to repair that loss and may Heaven aid our united endeavours."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Most High, I declare the Lodge duly opened, on the Centre, for the purposes of F..y in the Third Degree."}, {"s": "WM", "t": "gives the k..s when all drop the s..n followed by the S and J W\u2019s., IG and Tyler. The SD turns the Third Degree TB while the IPM raises both p..s of the c..s above the s..e. He then gives the Third Degree s..n before returning to his seat."}, {"s": "DC", "t": "All glory to the Most High. Three times as all give g..d and r..l s..n on each occasion. Be seated Brethren. G..e is prepared by JD and SD. When the Can. is ready, the Tyler gives k..s of the Second Degree,"}, {"s": "IG", "t": "The IG dims lights and advances towards the JW, with the s..p and p..l s..n of a MM and says, Bro JW there is an alarm."}, {"s": "JW", "t": "Rises, gives the k..s and s..p and s..n of the Third Degree, and says WM there is an alarm."}, {"s": "WM", "t": "Bro JW, inquire the cause of the alarm."}, {"s": "JW", "t": "Seated. Bro IG, with s..p and s..n see the cause of the alarm."}, {"s": "IG", "t": "Opens the door to Tyler Whom have you there?"}, {"s": "Tyler", "t": "To IG. Bro AB, who has been regularly initiated into Freemasonry, passed to the Degree of a FC, and has made such further progress as he hopes will entitle him to be raised to the sublime Degree of a MM, for which ceremony he is properly prepared."}, {"s": "IG", "t": "To Tyler. How does he hope to obtain the privileges of the Third Degree?"}, {"s": "Tyler", "t": "To IG. By the help of God, the united aid of the s..e and c..p..s, and the benefit of a p..s w..d."}, {"s": "IG", "t": "To Can. Give me that p..s g..p and p..s w..d Done. Wait while I report to the WM. The IG closes the door, advances with s..p and s..n towards the WM. At the door of the Lodge stands Bro AB, who has been regularly initiated into Freemasonry, passed to the Degree of a FC, and has made such further progress as he hopes will entitle him to be raised to the sublime Degree of a MM, for which ceremony he is properly prepared."}, {"s": "WM", "t": "How does he hope to obtain the privileges of the third degree?"}, {"s": "IG", "t": "By the help of God, the united aid of the s..e and c..p..s, and the benefit of a p..s w..d."}, {"s": "WM", "t": "We acknowledge the powerful aid by which he seeks admission; do you, Bro IG, vouch that he is in possession of the p..s w..d?"}, {"s": "IG", "t": "I do, WM. Having received it from the Can."}, {"s": "WM", "t": "Then let him be admitted in due form. Bro D\u2019s. The Can. is met at the door by the IG, who applies the p..s of the c..s to both b..s of the Can, and then raises them above his own head, to show that he has so applied them. The Deacons (the S. on the right side) then lead the Can. to the K..g S..l."}, {"s": "SD", "t": "To Can. Advance and salute the WM as an FCFM first as an EA."}, {"s": "WM", "t": "Let the Can. kneel, while the blessing of Heaven is invoked on what we are about to do. WM, S and J W\u2019s. k..k, all rise with s..n of R..e. S and J D\u2019s. cross wands over Can. SD ensures Can. shows s..n of R..e."}, {"s": "Chap", "t": "Almighty and Eternal God! Architect and Ruler of the Universe, at whose creative fiat all things first were made, we, the frail creatures of Thy providence, humbly implore Thee to pour down on this convocation assembled in Thy Holy Name the continual dew of Thy blessing. Especially we beseech Thee to impart Thy grace to this Thy servant, who offers himself as a Candidate to partake with us the mysterious s..s of a MM. Endue him with such fortitude that in the hour of trial he fail not, but that passing safely under Thy protection, through the valley of the shadow of death, he may finally rise from the tomb of transgression, to shine as the stars for ever and ever."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Let the Can. rise."}, {"s": "DC", "t": "Be seated Brethren. 1st Perambulation The SD takes him by the r..t h..d, and leads him once round the Lodge, as follows:"}, {"s": "SD", "t": "To Can. Salute the WM as a EAFM. Done. Advance to the JW as an EAFM. Done."}, {"s": "JW", "t": "What is that?"}, {"s": "SD", "t": "& CAN The first reg s..p in F..y."}, {"s": "JW", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The p..l s..n of a EAFM. Drop s..n."}, {"s": "JW", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A g..p or t..n."}, {"s": "JW", "t": "Stands. Give me that g..p or t..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The g..p of t..n of an EAFM."}, {"s": "JW", "t": "What does this g..p t..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "JW", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN At my initiation I was taught to be cautious but with you I will l..r of h..e it."}, {"s": "JW", "t": "L..r (or h..e) it and you begin. Done. Pass .. Guides Can. in front of P..d..e."}, {"s": "SD", "t": "then conducts Can. to SW. Salute the SW as an EAFM. Done. 2nd Perambulation"}, {"s": "SD", "t": "Places Can. in NW corner of the Lodge and squares the Lodge for second time. Salute the WM as a FCFM. Done. Moves to JW. Salute the JW as a FCFM. Done. Moves to SW. Advance to the SW as a FCFM first as an EA. Done."}, {"s": "SW", "t": "What is that?"}, {"s": "SD", "t": "& CAN The second reg s..p in F..y."}, {"s": "SW", "t": "In this position do you bring anything with you?"}, {"s": "SD", "t": "& CAN A s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The s..n of F..y emblematically to shield the repository of my s..s from the attacks of the insidious."}, {"s": "SW", "t": "Do you bring anything else?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The H..g s..n or s..n of P..e."}, {"s": "SW", "t": "When did it takes it's rise?"}, {"s": "SD", "t": "& CAN At the time that J..a fought the battles of the Lord when it was in this position he prayed fervently to the Almighty to continue the light of day that he might complete the overthrow of his enemies."}, {"s": "SW", "t": "Do you bring anything further?"}, {"s": "SD", "t": "& CAN Another s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is that?"}, {"s": "SD", "t": "& CAN The p..l s..n of a FCFM."}, {"s": "SW", "t": "To what does it allude?"}, {"s": "SD", "t": "& CAN The symbolic penalty of this degree which implied that as a man of honour, a FCFM would rather have had the LBCO the HTT and given as PTTRB of the A. or the DBOTF than have improperly disclosed the s..s entrusted to him."}, {"s": "SW", "t": "Have you anything to communicate?"}, {"s": "SD", "t": "& CAN A G..p or T..n"}, {"s": "SW", "t": "Give me that G..p or T..n. Done. What is this?"}, {"s": "SD", "t": "& CAN The G..p or T..n of a FCFM whereby one FC may know another by night as well as by day."}, {"s": "SW", "t": "What does this G..p or T..n demand?"}, {"s": "SD", "t": "& CAN A w..d."}, {"s": "SW", "t": "Give me that w..d."}, {"s": "SD", "t": "& CAN In this Degree as in the former I was taught to be cautious but with you I will l..r or h..e it."}, {"s": "WM", "t": "L..r (or H..e) it and you begin. Done. Whence was this w..d derived?"}, {"s": "SD", "t": "& CAN From the r..t h..d pillar at the porchway or entrance of K..g S..n's Temple so named after J..n the assistant HP who officiated at its dedication."}, {"s": "SW", "t": "The import of the w..d?"}, {"s": "SD", "t": "& CAN To E..b..h."}, {"s": "SW", "t": "And what when conjoined with that in the former degree?"}, {"s": "SD", "t": "& CAN S..y for G'd said \"In S..h I will E..b..h this mine house to stand firm for ever."}, {"s": "SW", "t": "Pass.. Can. is then placed in NW corner of the Lodge."}, {"s": "WM", "t": "K..ks, followed by S and J W\u2019s. The Brethren will take notice that Bro AB, who has been regularly initiated into Freemasonry, and passed to the Degree of a Fellow Craft, is about to pass in view before them, to show that he is the Can. properly prepared to be raised to the sublime Degree of a MM. 3rd Perambulation The Can is again led round the Lodge as follows:"}, {"s": "SD", "t": "To Can. Salute the WM as a FCFM. Salute the JW as a FCFM. Advance to the SW as a FCFM showing the s..n and communicate the p..s g..p and p..s w..d you received from the WM previous to leaving the Lodge. Done. The SW rises, and Can. gives p..s g..p."}, {"s": "SW", "t": "What is this?"}, {"s": "SD", "t": "& CAN The p..s g..p leading from the Second to Third Degree."}, {"s": "SW", "t": "What does this p..s g..p demand?"}, {"s": "SD", "t": "& CAN A p..s w..d."}, {"s": "SW", "t": "Give me that p..s w..d."}, {"s": "SD", "t": "& CAN TC."}, {"s": "SW", "t": "What was T.C."}, {"s": "SD", "t": "& CAN The first artificer in Metals."}, {"s": "SW", "t": "The import of the w..d?"}, {"s": "SD", "t": "& CAN WP."}, {"s": "SW", "t": "Pass, TC. The SW rises, and, with the s..n of F..y, takes the r..t hand of the Can. and presents him to the WM as follows:"}, {"s": "SW", "t": "WM, I present to you Bro AB, a Can. properly prepared to be raised to the Third Degree."}, {"s": "WM", "t": "Bro SW, you will direct the SD to instruct the Can. to advance to the E by the proper s..ps."}, {"s": "SD", "t": "conducts Can. to NW corner."}, {"s": "SW", "t": "Bro SD, it is the WM's command that you instruct the Can. to advance to the E by the proper s..ps. SD conducts Can. to centre of N side of Lodge facing JW."}, {"s": "SD", "t": "To Can. The proper method of advancing from W to E is by s..n s..s the first three as if s..p..g over an open g..e, the last four bold or marching s..s. For your instruction I will go through them. After which, you will please copy my example commencing with the l..t f..t etc. Done. Joined by JD. at k..g s..l."}, {"s": "WM", "t": "To Can. Bro AB, it is but fair to inform you that a most serious trial of your fortitude and fidelity, as well as a more solemn Ob., await you. Are you prepared to meet them as you ought? Can I am."}, {"s": "WM", "t": "Then you will k..l on both k..s, place both h..s on the VoSL, repeat your names at length, and say after me. The WM and W\u2019s. give one k..k, the Brethren rise and place their r..t h..d on l..t b..t. and D's cross w..ds over Can. OBLIGATION I, AB, in the presence of the Most High, and of this worthy and worshipful Lodge of MM, duly constituted, regularly assembled, and properly dedicated, of my own free will and accord, do hereby and hereon most solemnly and sincerely promise and swear, that I will always hele, conceal, and never reveal any or either of the secrets or mysteries of or belonging to the Degree of a MM to any one in the world, unless it be to him or them to whom the same may justly and lawfully belong; and not even to him or them, until after due trial, strict examination, or full conviction that he or they are worthy of that confidence, or in the body of a MM's Lodge, duly opened on the c..e, I further solemnly pledge myself to adhere to the principles of the s..e and c..s.., answer and obey all lawful s..ns and summonses sent to me from a MM's Lodge if within the length of my c..e t..w, and to plead no excuse except sickness or the pressing emergency of my own public of private avocations. I further solemnly engage myself to maintain and uphold the five p..s of f..w..p in act as well as in word, that my h..d given to a MM shall be a sure pledge of brotherhood, that my f..t shall travel through dangers and difficulties to unite with his in forming a column of mutual defence and support, that the posture of my daily supplications shall remind me of his wants, and dispose my heart to succour his weakness and relieve his necessities, so far as may fairly be done without detriment to myself or connections; that my breast shall be the sacred repository of his secrets when entrusted to my care, murder, treason, felony, and all other offences contrary to the laws of God and the ordinances of the realm being at all times most especially excepted; and, finally, I will maintain a MM's honour, and carefully preserve it as my own; I will not injure him, myself, or knowingly suffer it be done by others, if in my power to prevent it; but, on the contrary, will boldly repel the slanderer of his good name, and most strictly respect the chastity of those nearest and dearest to him, in the persons of his wife, his sister, and his child. All these points I solemnly swear to observe, without evasion, equivocation, or mental reservation of any kind. So help me the Most High, and keep me steadfast in this my solemn Ob. of a MM."}, {"s": "WM", "t": "To Can. As a pledge of your fidelity, and to render this binding as a solemn O..i..n so long as you shall live, you will seal it with your l..s thrice on the VoSL Done. Let me once more call your attention to the position of the s..e and c..p..s,; when you were made an EA both p..s were hid, in the Second Degree one was disclosed, in this the whole is exhibited, implying that you are now at liberty to work with both those p..s in order to render the circle of your Masonic duties complete, takes him by r..t h..d. Rise, newly O..i..d MM."}, {"s": "DC", "t": "Be seated Brethren. Done. THE EXHORTATION WM Bro AB, having entered on the solemn O..i..n of a MM, you are now entitled to demand that last and greatest trial, by which alone you can be admitted to a participation of the s..s of this Degree. But it is first my duty to call your attention to a retrospect of those Degrees in Freemasonry through which you have already passed, that you may the better be enabled to distinguish and appreciate the connection of our whole system, and the relative dependency of it's several parts. Your admission among Masons in a state of helpless indigence, was an emblematical representation of the entrance of all men on this their mortal existence; it inculcated the useful lessons of natural equality and mutual dependence; it instructed you, in the active principles of universal beneficence and charity, to seek the solace of your own distress by extending relief and consolation to your fellow-creatures in the hour of their affliction; above all, it taught you to bend with humility and resignation to the will of the Great Architect of the Universe; to dedicate your heart, thus purified from every baneful and malignant passion, fitted only for the reception of truth and wisdom, to His glory and the welfare of your fellow-mortals. Proceeding onwards, still guiding your progress by the principles of moral truth, you were led, in the Second Degree, to contemplate the intellectual faculty, and to trace it, from its development, through the paths of Heavenly science, even to the throne of God Himself. The secrets of nature and the principles of intellectual truth were then unveiled to your view. To your mind, thus modelled by virtue and science, nature, however, presents one great and useful lesson more, she prepares you, by contemplation, for the closing hour of existence and when by means of that contemplation, she has conducted you through intricate windings of this mortal life, she finally instructs you how to die. Such, my Brother, are the peculiar objects of the Third Degree in Freemasonry; they invite you to reflect on this awful subject, and teach you to feel that to the just and virtuous man death has no terrors equal to the stain of falsehood and dishonour; of this great truth the annals of Masonry afford a glorious example in the unshaken fidelity and noble death of our Master, H..m A..f, who was s..n just before the completion of K..g S..o..n's Temple, at
