<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ritual Practice">
<meta name="theme-color" content="#0d1b2a">
<link rel="manifest" href="manifest.json">
<title>Vulcan Lodge No. 4510 — Ritual Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, #0d1b2a 0%, #1b2a4a 40%, #162040 70%, #0f1830 100%);
    min-height: 100vh;
    min-height: 100dvh;
    color: #c8cfe0;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  /* Mosaic pavement background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(45deg, rgba(201,168,76,0.02) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(201,168,76,0.02) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(201,168,76,0.02) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(201,168,76,0.02) 75%);
    background-size: 40px 40px;
    background-position: 0 0, 0 20px, 20px -20px, -20px 0;
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; }

  .header {
    text-align: center;
    padding: 30px 0 20px;
    position: relative;
  }
  .header-emblem {
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
    opacity: 0.9;
    filter: drop-shadow(0 0 12px rgba(212,175,55,0.3));
  }
  .header .badge {
    font-size: 11px;
    font-weight: 600;
    color: #c9a84c;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 400;
    color: #d4af37;
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 13px;
    color: #7a8ba8;
  }
  /* Ornamental divider */
  .masonic-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 8px 0 16px;
    opacity: 0.5;
  }
  .masonic-divider .divider-line {
    height: 1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }
  .masonic-divider .divider-symbol {
    color: #c9a84c;
    font-size: 14px;
    line-height: 1;
  }
  /* Pillars flanking sections */
  .pillared {
    position: relative;
    padding-left: 18px;
    padding-right: 18px;
  }
  .pillared::before, .pillared::after {
    content: '';
    position: absolute;
    top: 12px;
    bottom: 12px;
    width: 3px;
    background: linear-gradient(180deg, rgba(201,168,76,0.0), rgba(201,168,76,0.15), rgba(201,168,76,0.25), rgba(201,168,76,0.15), rgba(201,168,76,0.0));
    border-radius: 2px;
  }
  .pillared::before { left: 4px; }
  .pillared::after { right: 4px; }
  /* Degree badge */
  .degree-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.08);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: #d4af37;
    flex-shrink: 0;
  }
  /* Rope border on active cards */
  .card-masonic {
    border-image: repeating-linear-gradient(
      90deg,
      rgba(201,168,76,0.2) 0px,
      rgba(201,168,76,0.08) 6px,
      rgba(201,168,76,0.2) 12px
    ) 1;
    border-width: 1px 0;
    border-style: solid;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
    border-radius: 18px;
  }

  .card {
    background: rgba(22,38,65,0.85);
    border-radius: 18px;
    padding: 24px 20px;
    border: 1px solid rgba(201,168,76,0.15);
    backdrop-filter: blur(12px);
    margin-bottom: 16px;
    animation: fadeIn .4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab {
    padding: 10px 18px;
    border-radius: 14px;
    border: 1px solid rgba(201,168,76,0.25);
    background: transparent;
    color: #c9a84c;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .tab:hover { transform: translateY(-2px); background: rgba(201,168,76,0.08); }
  .tab.active {
    background: linear-gradient(135deg, #c9a84c, #a0842e);
    color: #0d1b2a;
    border-color: transparent;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: #d4af37;
    margin-bottom: 16px;
  }

  /* Selection screen */
  .select-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
  }
  .select-btn {
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.05);
    color: #c8cfe0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .select-btn:hover {
    transform: translateY(-2px);
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.4);
  }
  .select-btn.chosen {
    background: rgba(201,168,76,0.15);
    border-color: #c9a84c;
    color: #d4af37;
  }
  .select-btn .btn-title {
    font-weight: 700;
    color: #d4af37;
    display: block;
    margin-bottom: 4px;
  }
  .select-btn .btn-sub {
    font-size: 12px;
    color: #7a8ba8;
  }

  /* Script view */
  .line-block {
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
  }
  .line-block:last-child { border-bottom: none; }
  .line-block .speaker {
    font-size: 11px;
    font-weight: 700;
    color: #7a8ba8;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 3px;
  }
  .line-block .speaker.my-speaker {
    color: #d4af37;
  }
  .line-block .text {
    font-size: 14px;
    line-height: 1.6;
    color: #c8cfe0;
  }
  .line-block .dir-text {
    font-size: 13px;
    font-style: italic;
    color: #c07050;
    line-height: 1.5;
  }
  .line-block.my-line {
    background: rgba(201,168,76,0.08);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 4px -14px;
    border: 1px solid rgba(201,168,76,0.18);
  }
  .line-block.my-line .text {
    font-weight: 500;
    color: #e8d48b;
  }

  /* Cue practice */
  .cue-card { text-align: center; padding: 30px 20px; }
  .cue-label {
    font-size: 11px;
    font-weight: 600;
    color: #7a8ba8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .cue-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: #a8b8d0;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .your-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: #d4af37;
    line-height: 1.5;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .your-line.hidden-line {
    background: rgba(201,168,76,0.08);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    border: 2px dashed rgba(201,168,76,0.3);
    font-style: italic;
    color: #7a8ba8;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }
  .your-line.hidden-line:hover { background: rgba(201,168,76,0.15); }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(201,168,76,0.12);
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(135deg, #d4af37, #a0842e);
    border-radius: 3px;
    transition: width .3s ease;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 14px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    display: inline-block;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary {
    background: linear-gradient(135deg, #c9a84c, #a0842e);
    color: #0d1b2a;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: #c9a84c;
  }
  .btn-sm {
    padding: 8px 16px;
    font-size: 12px;
  }
  .btn-nav {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .quiz-input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(201,168,76,0.25);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    background: rgba(13,27,42,0.8);
    color: #c8cfe0;
    resize: vertical;
    min-height: 80px;
  }
  .quiz-input:focus {
    border-color: #c9a84c;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .feedback {
    padding: 14px;
    border-radius: 12px;
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.5;
  }
  .feedback.correct {
    background: rgba(80,180,100,0.12);
    border: 1px solid rgba(80,180,100,0.25);
    color: #7cd49a;
  }
  .feedback.incorrect {
    background: rgba(200,120,80,0.12);
    border: 1px solid rgba(200,120,80,0.25);
    color: #e0a070;
  }

  .score-display {
    text-align: center;
    padding: 10px;
    font-size: 13px;
    color: #7a8ba8;
    font-weight: 500;
  }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }
  .checklist-item:last-child { border-bottom: none; }
  .check-box {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid #c9a84c;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    margin-top: 2px;
  }
  .check-box.checked {
    background: linear-gradient(135deg, #c9a84c, #a0842e);
    border-color: transparent;
  }
  .check-box.checked::after {
    content: '\2713';
    color: #0d1b2a;
    font-size: 14px;
    font-weight: 700;
  }
  .check-label {
    font-size: 14px;
    line-height: 1.5;
    color: #c8cfe0;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    padding: 16px 10px;
    background: rgba(201,168,76,0.06);
    border-radius: 14px;
    border: 1px solid rgba(201,168,76,0.1);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: #d4af37;
  }
  .stat-label {
    font-size: 11px;
    color: #7a8ba8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid rgba(201,168,76,0.2);
    background: transparent;
    color: #c9a84c;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .back-btn:hover { background: rgba(201,168,76,0.08); }

  .context-lines {
    margin-bottom: 16px;
    padding: 14px;
    background: rgba(13,27,42,0.5);
    border-radius: 12px;
    border: 1px solid rgba(201,168,76,0.08);
  }
  .context-lines .ctx-label {
    font-size: 10px;
    font-weight: 700;
    color: #5a6b88;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .context-lines .ctx-line {
    font-size: 13px;
    color: #7a8ba8;
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .context-lines .ctx-speaker {
    color: #8a9ab8;
    font-weight: 600;
  }

  /* Voice mic button */
  .mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.1);
    color: #c9a84c;
    font-size: 28px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .mic-btn:hover { background: rgba(201,168,76,0.2); }
  .mic-btn.recording {
    background: rgba(220,60,60,0.25);
    border-color: #dc3c3c;
    color: #ff6b6b;
    animation: pulse 1s ease-in-out infinite;
  }
  .mic-btn.unsupported { opacity: 0.3; pointer-events: none; }
  .mic-hint {
    text-align: center;
    font-size: 11px;
    color: #7a8ba8;
    margin-top: 4px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,60,60,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(220,60,60,0); }
  }

  /* Voice transcript preview */
  .voice-transcript {
    text-align: center;
    font-size: 14px;
    color: #e8d48b;
    font-style: italic;
    min-height: 20px;
    margin: 8px 0;
    padding: 0 12px;
  }

  /* Enhanced mobile responsiveness */
  @media (max-width: 600px) {
    .app { padding: 12px; padding-top: env(safe-area-inset-top, 12px); padding-bottom: env(safe-area-inset-bottom, 12px); }
    .header { padding: 20px 0 14px; }
    .header h1 { font-size: 24px; }
    .header .subtitle { font-size: 12px; }
    .card { padding: 18px 14px; border-radius: 14px; margin-bottom: 12px; }
    .section-title { font-size: 19px; margin-bottom: 12px; }
    .tabs { gap: 6px; margin-bottom: 14px; }
    .tab { padding: 8px 12px; font-size: 11px; border-radius: 10px; }
    .select-btn { padding: 14px 16px; }
    .select-btn .btn-title { font-size: 14px; }
    .cue-card { padding: 20px 12px; }
    .cue-text { font-size: 17px; }
    .your-line { font-size: 18px; }
    .context-lines { padding: 10px; }
    .context-lines .ctx-line { font-size: 12px; }
    .quiz-input { font-size: 16px; min-height: 70px; }
    .btn { padding: 12px 20px; font-size: 13px; min-height: 44px; }
    .btn-nav { gap: 8px; }
    .back-btn { font-size: 12px; padding: 8px 12px; }
    .stat-box { padding: 12px 6px; }
    .stat-num { font-size: 24px; }
    .stat-label { font-size: 10px; }
    .stats-row { gap: 8px; }
    .line-block .text { font-size: 13px; }
    .line-block .speaker { font-size: 10px; }
    .checklist-item { padding: 10px 0; gap: 10px; }
    .check-label { font-size: 13px; }
    .mic-btn { width: 56px; height: 56px; font-size: 24px; }
  }

  @media (max-width: 360px) {
    .app { padding: 8px; }
    .header h1 { font-size: 20px; }
    .tab { padding: 7px 10px; font-size: 10px; }
    .card { padding: 14px 10px; }
    .stats-row { flex-wrap: wrap; }
    .stat-box { min-width: calc(50% - 8px); }
  }
</style>
</head>

<div class="app" id="app"></div>
<script>
// ─── CEREMONY DATA ───
const CEREMONIES = {"1st Degree - Initiation": [{"s": "_dir", "t": "CEREMONY OF INITIATION"}, {"s": "_dir", "t": "Assembly in the Lodge Room"}, {"s": "DC", "t": "With Wand. All below rank of IM please enter the Lodge. Brethren enter and occupy seats in the N or S, with the exception of the D's and W's. The W's stand immediately inside the door with the D's to their E, carrying their wands, the Juniors in the N. The IM's, Officers of Prov. GL and GL form a procession in two's outside the door, junior in rank first, WM, IPM and DC last."}, {"s": "Tyler", "t": "With sword, on signal from DC enters the Lodge Room. Upstanding Brethren to receive the WM. The D's followed by the W's lead the procession in narrow columns E along the N side of the Lodge stopping approx. 3 feet short of the KS and all turn inwards. The organist commences the opening ode, the D's cross their wands and the"}, {"s": "WM", "t": "followed by IPM enter and proceed under them to their seats. The DC directs the officers of GL and Prov. GL in two's, seniors first, to the WM's right and IM's to the WM's left. The DC passes under the D's wands and commences to SQ. the Lodge. The D's, after uncrossing their wands, and W's follow. The DC stops in front of the JW's chair, the D's stop and cross their wands to allow the JW to enter his chair from the E side where he remains standing and exchanges CB with the DC. The DC, D's and SW proceed to the SW's chair where the procedure is repeated for the SW to enter his chair. The JD then goes to his chair and exchanges CB with the DC. The DC proceeds to the N E corner followed by the SD who goes to his chair and exchanges CB with the DC; who proceeds to his seat immediately on the WM's right, unless an official visitor or representative of PGL is attending. Opening the Lodge in the First Degree"}, {"s": "WM", "t": "The WM Gives one k..k followed by the S and J W\u2019s. Brethren, assist me to open the Lodge. To JW, calling him by name Bro A.B. what is the first care of every Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done."}, {"s": "JW", "t": "To IG., by name Bro AB, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "Gives three k..s, which are answered by the Tyler. The IG turns to the JW, Bro AB, the Lodge is properly Tyled."}, {"s": "JW", "t": "Gives three k..s, and says, to WM. W. Bro AB, the Lodge is properly Tyled."}, {"s": "WM", "t": "To. SW., by name Bro AB the next care?"}, {"s": "SW", "t": "To see that none but Masons are present."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order with the s..n of an EA. Bro JW, how many principal officers are there in the Lodge?"}, {"s": "JW", "t": "Three: the WM, S and J W's."}, {"s": "WM", "t": "Bro SW, how many assistant officers are there?"}, {"s": "SW", "t": "Three, besides the Tyler or Outer Guard: namely, the S and J D\u2019s and IG."}, {"s": "WM", "t": "To JW. The situation of the Tyler or Outer Guard?"}, {"s": "JW", "t": "Outside the door of the Lodge."}, {"s": "WM", "t": "To JW. His duty?"}, {"s": "JW", "t": "Being armed with a drawn Sword, to keep off all intruders and Cowans to Masonry, and see that the Candidates are properly prepared."}, {"s": "WM", "t": "Bro, IG Your situation in the Lodge?"}, {"s": "IG", "t": "Within the entrance of the Lodge."}, {"s": "WM", "t": "To IG. Your duty?"}, {"s": "IG", "t": "To admit Masons on proof, receive the Candidates in due form, and obey the commands of the JW."}, {"s": "WM", "t": "Bro JD Your situation in the Lodge?"}, {"s": "JD", "t": "At the right of the SW."}, {"s": "WM", "t": "To JD. Your duty?"}, {"s": "JD", "t": "To carry all messages and communications of the WM from the S to the JW and see that the same are punctually obeyed."}, {"s": "WM", "t": "Bro SD Your situation in the Lodge?"}, {"s": "SD", "t": "At or near to the right of the WM."}, {"s": "WM", "t": "To SD. Your duty?"}, {"s": "SD", "t": "To bear all messages and commands of the WM to the SW and await the return of the JD."}, {"s": "WM", "t": "Bro JW Your place in the Lodge?"}, {"s": "JW", "t": "In the South."}, {"s": "WM", "t": "To JW. Why are you placed there?"}, {"s": "JW", "t": "To mark the Sun at its Meridian, to call the Brethren from labour to refreshment, and from refreshment to labour, that profit and pleasure may be the result."}, {"s": "WM", "t": "Bro SW. Your place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "To mark the setting Sun; to close the Lodge by command of the WM, after having seen that every Brother has had his due."}, {"s": "WM", "t": "W. Bro IPM. The Master's place?"}, {"s": "IPM", "t": "In the East."}, {"s": "WM", "t": "To IPM. Why is he placed there?"}, {"s": "IPM", "t": "As the Sun rises in the East to open and enliven the day, so the WM is placed in the East to open the Lodge, and employ and instruct the Brethren in Freemasonry."}, {"s": "WM", "t": "The Lodge being duly formed, before I declare it open."}, {"s": "Chap", "t": "Let us invoke the assistance of the Great Architect of the Universe on all our undertakings; may our labours, thus begun in order, be conducted in peace, and closed in harmony."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Great Architect of the Universe, I declare the Lodge duly opened for the purposes of Freemasonry in the First Degree. The WM gives three k..s with LH, when all drop s..n, k..s are repeated by the S and J W's, IG and Tyler. On completion of the k..s the JD with wand squares the Lodge, crossing immediately in front of the JW, saluting the WM on passing, turns the first d..e TB and switches on the JW's and the SW's lights. The IPM opens the VoSL places both P..S of the c..s under the s..e, pointing W salutes the WM and returns to his seat. The SD switches on the WM's light. The JW lowers his c..n and the SW raises his. These movements are carried out simultaneously."}, {"s": "DC", "t": "Be seated Brethren. Special Greetings/Standing to Order in Respect of Departed Merit The WM gives one k..k followed by the S and J W\u2019s and makes an appropriate announcement. Minutes The WM gives one k..k followed by the S and J W\u2019s."}, {"s": "WM", "t": "The next business is to read and if approved confirm the minutes of the last regular meeting/installation festival. Bro Sec., which must be done in the 1st Degree and no other."}, {"s": "SEC", "t": "Stands with s..p and s..n then reads the minutes. Those are the minutes as I have them recorded WM. With s..p and s..n."}, {"s": "WM", "t": "Gives one k..k followed by S and J W\u2019s. Brethren you have heard the minutes as read by our Bro Sec will all Brethren who were then present and deem them a true and correct record please signify in the usual manner among Masons. Done. To the contrary. Done. Bro Sec, the minutes are confirmed."}, {"s": "SEC", "t": "With s..p and s..n. Thank you WM. SD takes the Minute Book from Sec to WM for signature, accepts Minute Book from"}, {"s": "WM", "t": "with s..p and s..n and returns it to the Sec."}, {"s": "Tyler", "t": "Prepares the Candidate r..t a..m, l..t b..t and k..e made b..e and r..t h..l s..p s..d and a c..e. t..w about his n..k."}, {"s": "WM", "t": "With one k..k followed by S and J W\u2019s. The next business is to initiate Mr AB I will be assisted in the ceremony by ------."}, {"s": "DC", "t": "Requests the IG to have the candidate knocked in."}, {"s": "Tyler", "t": "Gives one k..k."}, {"s": "IG", "t": "Stands with s..p and s..n, Bro JW there is an alarm."}, {"s": "JW", "t": "Rises, gives k..s. s..p and s..n. WM, there is an alarm."}, {"s": "WM", "t": "Seated. Bro JW, inquire the cause of the alarm."}, {"s": "JW", "t": "Seated to Bro IG who stands. With s..p and s..n. Bro IG see the cause of the alarm."}, {"s": "IG", "t": "Opens the door and says, to Tyler, Whom have you there?"}, {"s": "Tyler", "t": "To IG. Mr AB, a poor Candidate in a state of d..k..s, who has been well and worthily recommended, regularly proposed and approved in open Lodge, and now comes of his own free will and accord, properly prepared, humbly soliciting to be admitted to the mysteries and privileges of Ancient Freemasonry."}, {"s": "IG", "t": "To Tyler. How does he hope to obtain those privileges?"}, {"s": "Tyler", "t": "By the help of God, being free and of good report."}, {"s": "IG", "t": "To Tyler. Wait while I report to the WM. The IG. closes the door, advances with the s..p and s..n and says, WM, there is at the door of the Lodge Mr AB, a poor Candidate in a state of d..k..s, who has been well and worthily recommended, regularly proposed and approved in open Lodge, and now comes of his own free will and accord, properly prepared humbly soliciting to be admitted to the mysteries and privileges of Ancient Freemasonry."}, {"s": "WM", "t": "To IG. How does he hope to obtain those privileges?"}, {"s": "IG", "t": "By the help of God, being free and of good report."}, {"s": "WM", "t": "The tongue of good report has already been heard in his favour; do you, Bro IG vouch that he is properly prepared?"}, {"s": "IG", "t": "I do, WM. Having seen the Candidate."}, {"s": "WM", "t": "Then let him be admitted in due form. Bro D\u2019s. The IG keeps the door closed until the D's have arrived. The Candidate is met at the door by the IG, who applies the P..d to his l..t b..t; the JD asks him if he feels anything, and after a reply in the affirmative, the IG raises the P..d above his own head, to show the WM that he has applied it. The JD takes the right hand of the Candidate with his left, and the"}, {"s": "SD", "t": "takes his left hand in his right with forearms interlocked and they lead him before the kneeling stool in front of the SW. To Can, Mr AB, as no person can be made a Mason unless he is free and of mature age, I demand of you, are you free and of the full age of twenty-one years?"}, {"s": "CAN", "t": "I am."}, {"s": "WM", "t": "To Can. Thus assured, I will thank you to k..l, while the blessing of heaven is invoked on our proceedings. One k..k by WM. followed by S and J W\u2019s. All rise with s..n of R..e. During the Prayer the D\u2019s cross wands over the Can. JD ensures Can. gives s..n of R..e."}, {"s": "Chap", "t": "Vouchsafe Thine aid, Almighty Father and Supreme Governor of the Universe, to our present convention, and grant that this Candidate for Freemasonry may so dedicate and devote his life to Thy service as to become a true and faithful Brother among us. Endue him with a competency of Thy Divine Wisdom, that, assisted by the Secrets of our Masonic art, he may the better be enabled to unfold the beauties of true godliness, to the honour and glory of Thy Holy Name."}, {"s": "ALL", "t": "So mote it be. D's lower wands."}, {"s": "WM", "t": "To Can. Mr AB, in all cases of difficulty and danger in whom do you put your trust?"}, {"s": "JD", "t": "& CAN In God."}, {"s": "WM", "t": "Right glad am I to find your faith so well founded, relying on such sure support, you may safely arise and follow your leader with a firm but humble confidence, for where the name of God is invoked we trust no danger can ensue. Let the Candidate rise."}, {"s": "JD", "t": "assists Can. to rise and places him in the NW Corner. WM gives one k..k followed by S and J W\u2019s."}, {"s": "DC", "t": "Be seated Brethren."}, {"s": "WM", "t": "The Brethren from the N, E, S, and W will take notice that Mr AB is about to pass in view before them, to show that he is the Candidate, properly prepared, and a fit and proper person to be made a Mason. The SD resumes his seat by following the JD. The JD takes the Can. by the right hand, and squares the Lodge, past the"}, {"s": "WM", "t": "to the JW, and with the Candidate's right hand strikes the JW three times on the right shoulder."}, {"s": "JW", "t": "To JD. Whom have you there?"}, {"s": "JD", "t": "Mr AB, a poor Candidate in a state of d..k..s, who has been well and worthily recommended, regularly proposed and approved in open Lodge, and now comes of his own free will and accord, properly prepared, humbly soliciting to be admitted to the mysteries and privileges of Ancient Freemasonry."}, {"s": "JW", "t": "How does he hope to obtain those privileges?"}, {"s": "JD", "t": "By the help of God, being free and of good report."}, {"s": "JW", "t": "Rises takes the right hand of the Can. and guides him across the front of the pedestal and says, Enter, free and of good report. The JD takes him to the right of the SW who repeats the examination. He is then guided to the left side of the"}, {"s": "SW", "t": "who takes his r..t h..d in his l..t."}, {"s": "SW", "t": "Rises with the s..n, of F..y and says, WM I present to you Mr AB, a Candidate properly prepared to be made a Mason."}, {"s": "WM", "t": "Bro SW, your presentation shall be attended to, for which purpose I will address a few questions to the Candidate, which I trust he will answer with candour. JD places Can. in NW corner. To Can Mr AB, do you seriously declare on your honour, that, unbiased by the improper solicitation of friends against your own inclination, and uninfluenced by mercenary or other unworthy motives, you freely and voluntarily offer yourself a Candidate for the mysteries and privileges of Freemasonry?"}, {"s": "JD", "t": "& CAN I do."}, {"s": "WM", "t": "Do you likewise pledge yourself that you are prompted to solicit those privileges from a favourable opinion preconceived of the Institution, a general desire for knowledge, and a sincere wish to render yourself more extensively serviceable to your fellow-creatures?"}, {"s": "JD", "t": "& CAN I do."}, {"s": "WM", "t": "Do you further seriously declare on your honour, that, avoiding fear on the one hand, and rashness on the other, you will steadily persevere through the ceremony of your initiation, and, if admitted, will afterwards act and abide by the ancient usages and established customs of the Order?"}, {"s": "JD", "t": "& CAN I will."}, {"s": "WM", "t": "Bro SW, you will direct the JD to instruct the Candidate to advance to the p..d..l in due form."}, {"s": "SW", "t": "Bro JD, it is the WM's command that you instruct the Candidate to advance to the p..d..l in due form. The JD takes Can. in front of p..d..l standing 36\" away."}, {"s": "JD", "t": "The method of advancing to the p..d..l is by 3 irregular s..s of 9, 12 and 15 inches. You will therefore take a short pace of 9\" with your left foot bringing the h..s together in the form of a s..e. You will now take another pace of 12\" with your left foot bringing the h..s together as before. Now take a further pace of 15\" with your left foot bringing the h..s together as before. The SD joins Can and JD at p..d..l standing on left of Can."}, {"s": "WM", "t": "Moves to front of p..d..l. To Can. It is my duty to inform you that Masonry is free, and requires a perfect freedom of inclination in every Candidate for its mysteries; it is founded on the purest principles of piety and virtue; it possesses many great and invaluable privileges; and in order to secure those privileges to worthy men, and we trust to worthy men alone, vows of fidelity are required; but let me assure you, that in those vows there is nothing incompatible with your civil, moral, or religious duties; are you therefore willing to take a solemn obligation, founded on the principles I have stated, to keep inviolate the secrets and mysteries of the Order?"}, {"s": "JD", "t": "& CAN I am."}, {"s": "WM", "t": "Then you will k..l on your l..t k..e, place your r..t f..t in form of a s..e, give me your r..t h..d, which I place on this book, which is the VoSL while your l..t will be employed in supporting a pair of c..s, one p..t extended to your NLB, (being careful not to hurt yourself). Repeat your names at length, and say after me. D's assist Can. in adopting correct position. The WM and W\u2019s. give one knock, the Brethren rise and place the r..t h..d on the l..t b..t and D\u2019s cross wands. OBLIGATION I, AB, in the presence of the Great Architect of the Universe, and of this worthy, worshipful, and warranted Lodge of ancient, free, and accepted Masons, regularly assembled and properly dedicated, of my own free will and accord, do hereby touches Can.'s hand and hereon touching VoSL, sincerely and solemnly promise and swear, that I will always hele, conceal, and never reveal any part or parts, point or points, of the secrets or mysteries of or belonging to free and accepted Masons in Masonry, which may heretofore have been known by me, shall now, or may at any future period, be communicated to me, unless it be to a true and lawful Brother or Brothers, and not even to him or them until after due trial, strict examination or sure information from some well known Brother that he or they are worthy of that confidence, or in the body of a just, perfect, and regular Lodge of ancient Freemasons. I further solemnly promise that I will not write those secrets, indite, carve, mark, engrave, or otherwise them delineate, or cause or suffer it to be so done by others, if in my power to prevent it, on anything moveable or immovable under the Canopy of Heaven, whereby or whereon any letter, character, or figure, or the least trace of any letter, character, or figure, may become legible or intelligible to myself or any one in the world, so that our secret arts and hidden mysteries may improperly become known through my unworthiness. These several points I solemnly swear to observe, without evasion, equivocation, or mental reservation of any kind, in the certain knowledge that on the violation of any of them I shall be branded as a wilfully perjured individual, void of all moral worth, and totally unfit to be received into this worshipful Lodge, or any other warranted Lodge, or society of men who prize honour and virtue above the external advantages of rank and fortune. So help me God, and keep me steadfast in this my great and solemn obligation of an EAFM. Removes Compasses."}, {"s": "WM", "t": "What you have repeated may be considered but as a serious promise; as a pledge of your fidelity, and to render it a solemn obligation, you will seal it with your lips on the VoSL Done. D\u2019s lower wands and all discharge s..n of F..y."}, {"s": "WM", "t": "Having been kept a considerable time in a state of d..k..s what in your present situation is the predominant wish of your heart?"}, {"s": "JD", "t": "& CAN L..t."}, {"s": "WM", "t": "Bro JD, at the appropriate moment let that blessing be restored. Brethren, one, two, three, at the last w..d the Brethren simultaneously clap hands to their sides; the JD at this moment restores the l..t. The JD gently lays his hand of the head on the Can. to prevent him from seeing any other object than the VoSL. Having been restored to the blessing of the material l..t, let me direct your attention to what we consider the three great, though emblematical, lights in Freemasonry, the VoSL the S..e and C..s; the Sacred Writings are to rule and govern our faith, the S..e to regulate our actions, and the C..s to keep us in due bounds with all mankind, particularly our Brethren in Freemasonry. Takes the Candidate by the right hand, and says, Rise, newly obligated Brother among Masons."}, {"s": "DC", "t": "Brethren be seated. Done."}, {"s": "JD", "t": "places Can. in the S facing JW. SD resumes his seat."}, {"s": "WM", "t": "You are now enabled to discover the three lesser lights in Freemasonry; they are situated pointing E, S, and W, and are meant to represent the Sun, Moon, and Master of the Lodge; pointing the Sun to rule the day, the Moon to govern the night, and the Master to rule and direct his Lodge. Can. turned to face WM and IG moves behind the JD and presents P..D to JD from behind and awaits its return. Bro AB, by your meek and candid behaviour this evening you have symbolically, escaped two great dangers, but there was a third which, traditionally would have awaited you until the latest period of your existence. The dangers you have escaped are those of s..b..g and s..g, for on your entrance into the Lodge this p..n..d was presented to your naked l..t b..t, to imply that had you rashly attempted to rush forward, you would have been accessory to your own d..h by s..b..g not so the Brother who held it as he would have remained firm and done his duty. There was likewise this c..e t..w with a r..g n..e about your neck, which would have rendered any attempt to retreat equally fatal. But the danger which, traditionally, would have awaited you until your latest hour was the physical penalty at one time associated with the Obligation of a Mason had you improperly disclosed the secrets of Masonry, that of having the t.c.a, the t.t.o.b.t.r, and the b.b in the s. of the s..s a.c.t's l.b.h.w.m, where the t.r.e. and f.t. in every 24 hrs. The inclusion of such a penalty is unnecessary, for the Obligation you have taken this evening is binding on you for as long as you shall live. Can. placed in the south east corner facing east. Having entered on the great and solemn obligation of an EA Freemason, I am now permitted to inform you that there are several Degrees in Freemasonry, and peculiar s..s restricted to each; these, however, are not communicated indiscriminately, but are conferred on Candidates according to merit and abilities. I shall therefore proceed to entrust you with the s..s of this Degree, or those marks by which we are known to each other, and distinguished from the rest of the world; but must premise for your general information that all sq..s, l..s, and perpendiculars, are true and proper s..ns to know a Mason by; you are therefore expected to stand perfectly erect, your feet formed in a s..e; your body being thus considered an emblem of your mind, and your feet of the rectitude of your actions. Done. You will now take a short pace towards me with your l..t f..t, bringing the r..t h..l into its h..l..w; that is the first regular s..p in Freemasonry, and it is in this position the s..s of the Degree are communicated; they consist of a s..n, t..n and w..d. Place your hand in this position. The s..n is given by, etc. This is an allusion to the symbolic penalty of the degree which implied that, as a man of honour, a Mason would rather have had the t.c.a. etc. than have improperly disclosed the secrets entrusted to him. The g..p or t..n is given by a distinct pr..e of the .. on the .. .. of .. .. .., this when properly given and received serves to distinguish a Bro by night as well as by day; this g..p demands a w..d, a w..d highly prized amongst Masons, as the guard to their privileges, too much caution cannot, therefore, be observed in communicating it; it should never be given at length, but always by l..t..r or s..b..e; to enable you to do this I must tell you what that w..d is; it is B..; Can Repeats as during the course of the ceremony you will be called on for this w..d, the JD will now dictate the answers you are to give."}, {"s": "JD", "t": "and Can. step back one pace. I will thank Bro AB, to advance to me as a Mason. Done by JD and Can. What is that?"}, {"s": "JD", "t": "& CAN The first regular s..p in Freemasonry."}, {"s": "WM", "t": "In this position do you bring anything with you?"}, {"s": "JD", "t": "& CAN A s..n."}, {"s": "WM", "t": "Give me that s..n. Done by JD, Can. and WM. What is that?"}, {"s": "JD", "t": "& CAN The p..l s..n of an EAFM."}, {"s": "WM", "t": "To what does it allude?"}, {"s": "JD", "t": "& CAN The symbolic p..y of the Deg. which implied that, as a man of h..r a Mason would rather have had the t.c.a etc. than have improperly d..d the s..s entrusted to him. All drop s..n."}, {"s": "WM", "t": "Have you anything to communicate?"}, {"s": "JD", "t": "& CAN A g..p or t..n."}, {"s": "WM", "t": "Give me that g..p or t..n. Done. What is this?"}, {"s": "JD", "t": "& CAN The g..p or t..n of an EAFM whereby one Bro may know another by n..t as well as by d..y."}, {"s": "WM", "t": "What does this g..p or t..n demand?"}, {"s": "JD", "t": "A. w..d."}, {"s": "WM", "t": "Give me that w..d."}, {"s": "JD", "t": "At my initiation I was taught to be cautious, but with you I will l..r or h..e it."}, {"s": "WM", "t": "L..r (or h..e) it and you begin. Done. This w..d is derived from the l..t h..d p..l..r at the p..h..y or e..t..e to KST, so named after .. the Great Grandfather of David, a Prince and Ruler in Israel. The import of the w..d is in .. Takes the Can. by the h..d, and says Pass, .. After WM resumes his seat."}, {"s": "JD", "t": "JD. takes the Can to the JW and says, with s..n, Bro JW, I present to you Bro AB on his initiation."}, {"s": "JW", "t": "I will thank Bro AB to advance to me as a Mason. Done. What is that?"}, {"s": "JD", "t": "& CAN The first regular s..p in Freemasonry."}, {"s": "JW", "t": "In this position do you bring anything with you?"}, {"s": "JD", "t": "& CAN A s..n."}, {"s": "JW", "t": "Give me that s..n. Done. What is this?"}, {"s": "JD", "t": "& CAN The p..l s..n of an EAFM. All drop h..ds."}, {"s": "JW", "t": "Have you anything to communicate?"}, {"s": "JD", "t": "& CAN A g..p or t..n."}, {"s": "JW", "t": "Give me that g..p or t..n. JW rises. Done. What is this?"}, {"s": "JD", "t": "& CAN The g..p or t..n of an EAFM."}, {"s": "JW", "t": "What does this g..p t..n demand?"}, {"s": "JD", "t": "& CAN A w..d."}, {"s": "JW", "t": "Give me that w..d."}, {"s": "JD", "t": "& CAN At my initiation I was taught to be cautious, but with you I will l..r or h..e it."}, {"s": "JW", "t": "L..r (or h..e) it and you begin. Done. Pass .."}, {"s": "JD", "t": "Takes Can to the SW and says, with s..n. Bro SW, I present to you Bro AB on his initiation."}, {"s": "SW", "t": "I will thank Bro AB to advance to me as a Mason. Done To Can. What is this?"}, {"s": "JD", "t": "& CAN The first regular s..p in Freemasonry."}, {"s": "SW", "t": "In this position do you bring anything with you?"}, {"s": "JD", "t": "& CAN A s..n."}, {"s": "SW", "t": "Give me that s..n. Done. What is this?"}, {"s": "JD", "t": "& CAN The p..l s..n of an EAFM."}, {"s": "SW", "t": "To what does it allude?"}, {"s": "JD", "t": "& CAN The symbolic penalty of the degree, which implied that, as a man of honour a Mason would rather have had the t.c.a. etc. than have improperly disclosed the secrets entrusted to him. All drop s..n."}, {"s": "SW", "t": "Have you have anything to communicate?"}, {"s": "JD", "t": "& CAN A g..p or t..n."}, {"s": "SW", "t": "Give me that g..p or t..n."}, {"s": "SW", "t": "rises. Done. What is this?"}, {"s": "JD", "t": "& CAN The g..p or t..n of an EAFM whereby one Bro may know etc.."}, {"s": "SW", "t": "What does this g..p or t..n demand?"}, {"s": "JD", "t": "& CAN A w..d."}, {"s": "SW", "t": "Give me that w..d."}, {"s": "JD", "t": "& CAN At my initiation I was taught to be cautious, but with you I will l..r or h..e it."}, {"s": "SW", "t": "L..r (or h..e) it and you begin. Done. Whence is this w..d derived?"}, {"s": "JD", "t": "& CAN From the l..t h..d p..r at the p..y or e..t..e to KST, so named after .., the G G of D, a P and R in I."}, {"s": "SW", "t": "The import of the w..d?"}, {"s": "JD", "t": "& CAN In s..h."}, {"s": "SW", "t": "Pass .. The JD conducts the Can to l..t of SW. and places his r..t h..d in SW's l..t. SW. with s..n, WM, I present to you Bro AB, on his initiation, for some mark of your favour."}, {"s": "WM", "t": "Bro SW, I delegate you to invest him with the distinguishing b..e of a Mason."}, {"s": "SW", "t": "Leaves his seat from the left and turns Can. to face south. SW. puts apron on Can. Bro AB, by the WMs command, I invest you with the distinguishing badge of a Mason. It is more ancient that the Golden Fleece, or Roman Eagle, more honourable than the Garter, or any other order in existence, being the badge of innocence, and the bond of friendship; and I strongly exhort you ever to wear and consider it as such; and I further inform you, that if you never disgrace that badge, SW strikes it, it will never disgrace you."}, {"s": "SW", "t": "salutes the WM from in front of p..l and returns to his seat from the south side after the SW is seated. The JD moves the Can. to the NW Corner."}, {"s": "WM", "t": "Let me add to the observations of the SW, that you are never to put on that badge, should there be any Bro in a Lodge which you are about to visit with whom you are at variance, or against whom you entertain animosity; in such a case, it is expected you will invite him to withdraw, in order amicably to settle your differences, which if happily effected, you may then clothe, enter the Lodge, and work with that love and harmony which should at all times characterise Freemasons. But if, unfortunately your differences are of such a nature as not to be so easily adjusted, it were better that one or both of you retire, than that the harmony of the Lodge should be disturbed by your presence. Bro JD you will place our Bro at the NE part of the Lodge. Done. JD ensures Can. feet are correctly aligned. Bro AB, at the erection of all stately and superb edifices it is customary to lay the first or foundation stone at the NE corner of the building; you, being newly initiated into F. Masonry, are placed at the NE part of the Lodge, figuratively to represent that stone; and from the foundation laid this evening may you raise a superstructure perfect in its parts and honourable to the builder. You now stand to all external appearance a just and upright Freemason, and I give it you in strong terms of recommendation ever to continue and act as such; indeed, I shall immediately proceed to put your principles in some measure to the test, by calling on you to exercise that virtue, which may justly be denominated the distinguishing characteristic of a Freemason's heart I mean Charity. I need not here dilate upon its excellencies; no doubt it has often been felt and practised by you; suffice it to say, that it has the approbation of heaven and earth, and, like its sister Mercy, blesses him who gives as well as him who receives. In a society so widely extended as Freemasonry, the branches of which are spread over the four quarters of the globe, it cannot be denied that we have many members of rank and opulence, neither can it be concealed that among the thousands who range under its banners, there are some who, perhaps from circumstances of unavoidable calamity and misfortune, are reduced to the lowest ebb of poverty and distress. On their behalf it, is our usual custom to awaken the feeling of every new made Bro, by making such a claim on his charity as his circumstances in life may fairly warrant; whatever, therefore, you feel disposed to give, deposit with the JD, and it will be thankfully received, and faithfully applied. The JD with the plate received from the Sec/SD moves to face the Can."}, {"s": "JD", "t": "Have you anything to give in the cause of charity? Were you divested of all m..c s..s and v..s prior to entering the Lodge otherwise would you have given freely? Candidate affirms. With the s..n WM, our newly made Bro affirms that he was deprived of everything valuable previous to entering the Lodge, or he would have given freely."}, {"s": "WM", "t": "To Can. I congratulate you, my Bro, on the honourable sentiments by which you are actuated, likewise on the inability which in the present instance precludes you from gratifying them; believe me, this trial was not made with a view to sport with your feelings; far from us be any such intention; it was done for three especial reasons, first, as I have premised, to put your principles to the test; secondly, to evince to the Brethren that you had neither v..s nor m..t..c substances about you, for if you had, the ceremony of your initiation thus far must have been repeated; and lastly, as a warning to you heart, that should you at any future period meet a friend or Brother in distressed circumstances who might solicit your assistance, you will recollect the peculiar moment in which you were admitted into F. Masonry, poor and p..y..s, and cheerfully embrace the opportunity of practising that virtue you now profess to admire."}, {"s": "DC", "t": "Brethren, one, two, clap. Done. WM resumes his seat then the JD places the Can. in front of the JW."}, {"s": "WM", "t": "I now present to you the working tools of an EAFM; they are the 24-in. G..e, the common G..l, and C..l. The 24in G..e is to measure the work, the common G..l to knock off all superfluous knobs and excrescences, and the C..l to further smooth and prepare the stone, and render it fit for the hands of the more expert workman. But as we are not all operative masons, but rather free and accepted, or speculative, we apply these tools to our morals. In this sense, the 24-in. G..e represents the 24 hours of the day, part to be spent in prayer to Almighty God, part in labour and refreshment, and part in serving a friend or Brother in time of need, without detriment to ourselves or connections. The common G..l represents the force of conscience, which should keep down all vain and unbecoming thoughts which might obtrude during any of the aforementioned periods, so that our words and actions may ascend unpolluted to the throne of the grace. The C..l points out the advantages of education, by which means we are rendered fit members for well-organised society. As in the course of the evening you will be called on for certain fees for your initiation, it is right you should know by what authority we act. This is our charter or warrant points to it from the Grand Lodge of England, which is open to your inspection on this or any future lodge evening; this is our book of Constitutions, and these are our Bylaws Gives both to Can, both of which I recommend to your serious perusal, as by the one you will be taught the duties you owe to the Craft in general, and by the other, those you owe to this Lodge in particular. You are now at liberty to retire, in order to restore yourself to your personal comforts, and on your return to the Lodge I shall direct your attention to a charge, founded on the excellence of our institution and the qualifications of its members, should time permit."}, {"s": "DC", "t": "Brethren, one, two, clap. Done. The JD takes the Can to the NW corner and directs him to salute the WM as a Mason. Can retires from lodge. Charge after Initiation"}, {"s": "Tyler", "t": "K..ks."}, {"s": "IG", "t": "With s..p and s..n. Bro JW there is a report."}, {"s": "JW", "t": "With k..k, s..p and s..n. WM there is a report."}, {"s": "WM", "t": "Seated. To JW who stands with s..p and s..n. Bro JW enquire who seeks admission."}, {"s": "JW", "t": "Seated. Bro IG see who seeks admission."}, {"s": "IG", "t": "Looks through hatch, receives Tyler\u2019s report through hatch. WM Bro AB on his return seeks admission."}, {"s": "WM", "t": "Admit him if properly clothed. Bro JD."}, {"s": "JD", "t": "Conducts Candidate to NW corner. Advance and salute the WM as an EAFM. Done. Places the Candidate under G. facing WM. JD returns to his seat."}, {"s": "WM", "t": "To Can. As you have passed through the ceremony of your initiation, allow me to congratulate you on being admitted a member of our ancient and honourable Institution: ancient no doubt it is, as having subsisted from time immemorial; and honourable it must be acknowledged to be, as by a natural tendency it conduces to make those so who are obedient to its precepts; indeed, no institution can boast a more solid foundations than that on which Freemasonry rests, the practice of every moral and social virtue; and to so high an eminence has its credit been advanced, that in every age monarchs themselves have been promoters of the art, have not thought it derogatory from their dignity to exchange the Sceptre for the Trowel, have patronised our mysteries, and joined in our assemblies. As a Freemason, I would recommend to your most serious contemplation the VoSL, charging you to consider it as the unerring standard of truth and justice, and to regulate your actions by the Divine precepts it contains; therein you will be taught the important duties you owe to God, your neighbour and yourself. To God, by never mentioning his name but with that awe and reverence which are due from the creature to his Creator, by imploring His aid in all your lawful undertakings, and by looking up to Him in every emergency for comfort and support. To your neighbour, by acting with him on the square, by rendering him every kind office which justice or mercy may require, by relieving his necessities, soothing his afflictions, and doing to him as in similar cases you would wish he should do to you. And to yourself, by such a prudent and well-regulated course of discipline as may best conduce to the preservation of your corporeal and mental facilities in their fullest energy, thereby enabling you to exert those talents wherewith God has blessed you, as well to His Glory as the welfare of your fellow creatures. As a citizen of the world, I am to enjoin you to be exemplary in the discharge of your civil duties; by never proposing, or at all countenancing, any act which may have a tendency to subvert the peace and good order of society, by paying due obedience to the laws of any state which may for a time become the place of your residence, or afford you its protection; and above all, never losing sight of the allegiance due to the sovereign of your native land, ever remembering that nature has implanted in your breast a sacred and indissoluble attachment towards that country whence you derived your birth and infant nurture. As an individual, I would recommend the practice of every domestic as well as public virtue. Let Prudence direct you, Temperance chasten you, Fortitude support you, and Justice be the guide of all your actions. Be especially careful to maintain, in their fullest splendour, those truly Masonic ornaments which have already been amply illustrated: Benevolence and Charity. Still, however, as a Freemason, there are other excellences of character to which your attention may be peculiarly and forcibly directed: amongst the foremost of these are secrecy, Fidelity and Obedience. Secrecy consists in an inviolable adherence to the O..i..n you have entered into, never improperly to disclose any of those Masonic secrets which have now been, or may at any future time be, entrusted to your keeping, and cautiously to avoid every occasion which might inadvertently lead you so to do. Your Fidelity must be exemplified by a strict observance of the constitutions of the Fraternity, by adhering to the ancient Landmarks of the Order, by never attempting to exhort, or otherwise unduly obtain, the secrets of a superior degree, and by carefully refraining to recommend any one to a participation of our secrets, unless you have strong grounds to believe that by a similar fidelity he will ultimately reflect honour on our choice. Your Obedience must be proved by a close conformity to our laws and regulations, by prompt attention to all s..ns and summonses, by modest and correct demeanour in the Lodge, by abstaining from every topic of political or religious discussion, by a ready acquiescence in all votes and resolutions duly passed by a majority of the Brethren, and by a perfect submission to the Master and his Wardens, whilst acting in the discharge of their respective offices. And as a last and general recommendation, let me exhort you to dedicate yourself to such pursuits as may render you respectable in life, useful to mankind, and an ornament to the society of which you have this day become a member. That you will more especially study such of the liberal arts and sciences as may lie within the compass of your attainment, and that, without neglecting the ordinary duties of your station, you will feel yourself called on to make a daily advancement in Masonic knowledge. From the very commendable attention you appear to have given to his charge, I am led to hope that you will duly appreciate the value of Freemasonry, and imprint indelibly on your heart the sacred dictates of Truth, of Honour, and of Virtue."}, {"s": "DC", "t": "Brethren, one, two, clap. Done."}, {"s": "JD", "t": "Conducts Candidate to the NW corner. Salute the WM as an EAFM. JD seats Can in the NW part of the Lodge. Explanation of the First Degree Tracing Board (Optional) The usages and customs among Freemasons have ever borne a near affinity to those of the ancient Egyptians. Their philosophers, unwilling to expose their mysteries to vulgar eyes, couched their systems of learning and polity under signs and hieroglyphical figures, which were communicated to their chief priests or Magi alone, who were bound by solemn oath to conceal them. The system of Pythagoras was founded on a similar principle, as well as many others of more recent date. Masonry, however, is not only the most ancient but the most honourable Society that ever existed, as there is not a character or emblem here depicted, but serves to inculcate the principles of piety and virtue among all its genuine professors. Let me first call your attention to the form of the Lodge, which is a regular parallelepipedon, in length from E to W, in breadth between N and S, in depth from the surface of the earth to its centre, and even as high as the heavens. The reason that a Freemason's Lodge is represented of that vast extent is to show the universality of the science, that a Mason's charity should know no bounds save those of prudence. Our Lodge stands on holy ground, because the first Lodge was consecrated on account of three grand offerings thereon made, which met with Divine approbation. First, the ready compliance of Abraham with the will of God in not refusing to offer up his only son Isaac as a burnt sacrifice, when it pleased the Almighty to substitute a more agreeable victim in his stead. Secondly, the many pious prayers and ejaculations of King David, which actually appeased the wrath of God, and stayed a pestilence which then raged among his people, owing to his inadvertently having had them numbered. Thirdly, the many thanksgivings, oblations, burnt sacrifices, and costly offerings which Solomon, King of Israel, made at the completion, consecration, and dedication of the Temple at Jerusalem to God's service. Those three did then, have since, and I trust ever will, render the groundwork of Freemasonry holy. Our Lodge is situated due E and W, because of all places of Divine worship, as well as Mason's regular, well-formed, constituted Lodges are, or ought to be, so situated; for which we assign three Masonic reasons: 1st, the Sun, the Glory of the Lord, rises in the E and sets in the W; 2nd, Learning originated in the E, and thence spread its benign influence to the W; the third, last, and grand reason, which is too long to be entered upon now, is explained in the course of our Lectures, which I hope you will have many opportunities of hearing. Our Lodge is supported by three great pillars. They are called Wisdom, Strength, and Beauty: Wisdom to contrive, Strength to support, and Beauty to adorn; Wisdom to conduct us in all our undertakings, Strength to support us under all our difficulties, and Beauty to adorn the inward man. The Universe is the Temple of the Deity whom we serve; Wisdom, Strength, and Beauty are about His throne as pillars of His works, for His Wisdom is infinite, His Strength omnipotent, and Beauty shines through the whole of the creation in symmetry and order. The heavens He has stretched forth as a canopy; the earth He has planted as His footstool; He crowns His Temple with Stars as with a diadem, and His hands extend their power and glory. The Sun and Moon are messengers of His will, and all His law is Concord. The three great Pillars supporting a Mason's L..e are emblematical of these Divine attributes; they further represent Solomon, King of I..l, H..m, King of T..e, and H..m A..ff. Solomon, King of I..l, for his Wisdom in building, completing, and dedicating the Temple at Jerusalem to God's service; H..m, King of T..e, for his Strength in supporting him with men and materials; and H..m A..ff, for his curious and masterly workmanship in beautifying and adorning the same. But as we have no noble orders in Architecture known by the names of Wisdom, Strength, and Beauty, we refer them to the three most celebrated, the Doric, Ionic, and Corinthian. The covering of a Masonic Lodge is a celestial canopy of diverse colours, even as the heavens. The way by which we, as Masons, hope to arrive at it is by the assistance of a ladder, in Scripture called Jacob's ladder. It is composed of many staves or rounds, which point out as many moral virtues, but three principal ones, Faith, Hope, and Charity: Faith in the Great Architect of the Universe, Hope in salvation, and to be in Charity with all men. It reaches to the heavens, and rests on the VoSL, because, by the doctrines contained in that Holy Book, we are taught to believe in the dispensations of Divine Providence, which belief strengthens our faith, and enables us to ascend the first step; this faith naturally creates in us a hope of becoming partakers of the blessed promises therein recorded, which hope enables us to ascend the second step; but the third and last being Charity, comprehends the whole, and the Mason who is possessed of this virtue in its most ample sense, may justly be deemed to have attained the summit of his profession; figuratively speaking, an ethereal mansion, veiled from mortal eyes by the starry firmament, emblematically depicted here by seven stars, which have an allusion to as many regularly made Masons, without which number no Lodge is perfect, neither can any Candidate be legally initiated into the Order. The interior of a Freemason's Lodge is composed of Ornaments, Furniture, and Jewels. The ornaments of the Lodge are the Mosaic pavement, the blazing star, and the indented or tessellated border; the Mosaic pavement is the beautiful flooring of a Freemason's Lodge, the blazing star the glory in the centre, and the indented or tessellated border, the skirtwork round the same. The Mosaic pavement may justly be deemed the beautiful flooring of the L..e, by reason of it being variegated and chequered. This points out the diversity of objects which decorate and adorn the creation, the animate as well as the inanimate parts thereof. The blazing star, or glory in the centre, refers us to the Sun, which enlightens the earth, and by this benign influence dispenses blessings to mankind in general. The indented or tessellated border refers us to the planets, which in their various revolutions form a beautiful border or skirtwork round that grand luminary, the Sun, as the other does round that of a F. Mason's L..e. The furniture of the Lodge are the V. of the S.L., the C..s, and S..e; the Sacred Writings are to rule and govern our faith. On them we O..i..e our Candidates for Freemasonry; so are the C..s and S..e, when united, to regulate our lives and actions. The Sacred Volume is derived from God to man in general, the C..s belong to the Grand Master in particular, and the S..e to the whole Craft. The Jewels of the Lodge are three moveable and three immovable. The moveable Jewels are the S..e, L..l, and P..b R..e. Among operative masons the S..e is to try and adjust rectangular corners of buildings and assist in bringing rude matter into due form; the L..l to lay levels and prove horizontals; and the P..b R..e to try and adjust uprights while fixing on their proper bases. Among Free and Accepted Masons, the S..e teaches morality, the L..l equality, and the P..b R..e justness and uprightness of life and actions. They are called moveable Jewels, because they are worn by the Master and his Wardens, and are transferable to their successors on nights of Installation. The Master is distinguished by the S..e, the Senior Warden by the L..l and the Junior Warden by the P..b R..e. The immovable Jewels are the Tracing Board, the Rough and Perfect Ashlars. The Tracing Board is for the Master to lay lines and draw designs on; the Rough Ashlar for the EA to work, mark and indent on; and the Perfect Ashlar for the experienced Craftsman to try and adjust his Jewels on. They are called immovable Jewels, because they lie open and immovable in the Lodge for the Brethren to moralise upon. As the Tracing Board is for the Master to lay lines and draw designs on, the better to enable the Brethren to carry on the intended structure with regularity and propriety, so the VoSL may justly be deemed to be the spiritual Tracing Board of the Great Architect of the Universe, in which are laid down such Divine laws and moral plans, that were we conversant therewith, and obedient thereto, they would bring us to an ethereal mansion not built by hands, but eternal in the Heavens. The Rough Ashlar is a stone, rough and unhewn as taken from the quarry, till, by the industry and ingenuity of the workman, it is modelled, wrought into due form, and rendered fit for the intended building; this represents the mind of man in its infant or primitive state, rough and unpolished as that stone, till by the kind care and instruction of his parents or guardians, in giving him a liberal and virtuous education, his mind becomes cultivated, and he is thereby rendered a fit member of civilised society. The Perfect Ashlar is a stone of a true die or square, fit only to be tried by the S..e and C..p..s; this represents the mind of a man in decline of years, after a well spent life in acts of piety and virtue, which can no otherwise be tried and approved than by the S..e of God's Word and the C..p..s of his own self-convincing conscience. In all regular, well-formed, constituted Lodges, there is a point within a c..e round which a Mason cannot err; this c..e is bounded between North and South by two grand parallel lines, the one representing Moses, the other King Solomon; on the upper part of this c..e rests the VoSL, supporting Jacob's ladder, the top of which reaches to the heavens; and were we as conversant with that holy book, and as adherent to the doctrines therein contained, as both those parallels were, it would lead us to Him who will not deceive us, neither will He suffer deception. In going round this c..e, we must of necessity touch on both those parallel lines, likewise on the VoSL; and while a Mason keeps himself thus circumscribed, he cannot err. The word Lewis denotes strength, and is here depicted by certain pieces of metal dovetailed into a stone, which form a cramp, and enables the operative Mason to raise great weights to certain heights with little encumbrance, and to fix them on their proper bases. Lewis likewise denotes the son of a Mason; his duty is to bear the heat and burden of the day, from which his parents, by reason of their age, ought to be exempt; to help them in time of need, and thereby render the close of their days happy and comfortable; his privilege for so doing is to be made a Mason before any other person, however dignified. Pendent to the corners of the Lodge are four tassels, meant to remind us of the four cardinal virtues, namely: Temperance, Fortitude, Prudence, and Justice, the whole of which, tradition informs us, were constantly practised by a great majority of our ancient Brethren. The distinguishing characteristics of a good Free Mason are Virtue, Honour, and Mercy, and should these be banished from all other societies may they ever be found in a Mason's breast. Other Lodge Business"}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the first time I rise to enquire if any brother has ought to propose for the good of Freemasonry in general or this the Vulcan Lodge No. 4510 in particular. Bro Sec are there any communications from the Grand Lodge. Sec. reads communications from Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Grand Lodge. If present greetings are given by G. Officers."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the second time I rise etc., Bro Sec are there any communications from Prov. Grand Lodge. Sec reads communication from Prov. Grand Lodge."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications from Provincial Grand Lodge. Greetings from PGL given by the most recently appointed PGO of the Lodge present."}, {"s": "WM", "t": "One k..k followed by S and J W\u2019s. Brethren for the third time I rise etc., Bro Sec are there any further communications. Sec reads any other communication."}, {"s": "SEC", "t": "With s..p and s..n. WM those are all the communications but I do have apologies from .. Proposition/notice of motion and any other business given at this point."}, {"s": "DC", "t": "Visiting Brethren wishing to give greetings may now do so commencing on the left of the WM and proceeding in a clockwise direction round the Lodge Room. Done."}, {"s": "SW", "t": "Brethren of the Vulcan Lodge No. 4510 upstanding."}, {"s": "ALL", "t": "With s..p and s..n. Hearty greetings WM. Closing the Lodge Generally The WM gives one k..k , followed by the S and J W\u2019s."}, {"s": "WM", "t": "Brethren, assist me to close the Lodge. All rise. Bro JW. JW with s..p and s..n What is the constant care of every Mason?"}, {"s": "JW", "t": "To prove the Lodge close Tyled."}, {"s": "WM", "t": "To JW. Direct that duty to be done. JW. drops s..n"}, {"s": "JW", "t": "Bro IG. With s..p and s..n prove the Lodge close Tyled."}, {"s": "IG", "t": "Bro IG drops s..n gives three k..s, which are answered by the Tyler; he takes the s..p and gives the s..n of the First Degree, and says, Bro JW, the Lodge is close Tyled."}, {"s": "JW", "t": "Gives the k..s s..p and s..n WM, the Lodge is close Tyled."}, {"s": "WM", "t": "Bro SW. SW with s..p and s..n the next care?"}, {"s": "SW", "t": "To see that the Brethren appear to order as Masons."}, {"s": "WM", "t": "To order, Brethren in the First Degree. The Brethren take the s..p and stand to order with the s..n of an E.A.F.M."}, {"s": "WM", "t": "Bro SW, your constant place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "As the Sun sets in the West to close the day, so the SW is placed in the West to close the Lodge, by command of the"}, {"s": "WM", "t": "after having seen that every Brother has had his due."}, {"s": "WM", "t": "And has every Bro had his due?"}, {"s": "SW", "t": "To the best of my masonic belief they have WM."}, {"s": "WM", "t": "Brethren, before we close the Lodge."}, {"s": "Chap", "t": "Let us with all reverence and humility express our gratitude to the Great Architect of the Universe, for favours already received, and may He continue to preserve our order by cementing and adorning it with every moral and social virtue."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Bro SW the labours of the evening being ended, you have my command to close the Lodge. Gives the k..s with LH."}, {"s": "SW", "t": "Brethren, in the name of the Great Architect of the universe, and by command of the WM, I close the Lodge. SW gives the k..s with L.H. when all drop s..n."}, {"s": "JW", "t": "And it is closed accordingly, until the third Monday of lodges of emergency excepted, of which every subscribing Bro will receive due notice. Gives the k..s, followed by the IG and T. The JD, without wand, goes directly to the JW.'s chair, turns the first degree TB switches off his light then switches out the SW's light. The SD switches out the WM's light. The IPM, closes the VoSL and C..s placing the C..s with the points inside the angle of the S..e., pointing W. He gives CB and returns to his chair. The SW lowers his c..n and the JW raises his simultaneously."}, {"s": "IPM", "t": "Brethren nothing now remains but according to ancient custom to lock up our s..s in a safe and sacred repository of the Heart uniting in the act of fidelity, fidelity, fidelity all strike L.B. with their RH's on each of these words and may God preserve the order all raise R.H. to R. shoulder palm forwards."}, {"s": "WM", "t": "I extend a hearty invitation to all our visitors to stay to our after meeting and I hope as many as possible of our own Brethren will stay to entertain them. The Alms box will be in the hands of the IG."}, {"s": "DC", "t": "I will thank the Brethren to remain standing while the WM accompanied by his W\u2019s, Officers of GL, PGL, and IM's retire. Bro Organist may we have the closing ode please. The ADC exchanges CBs with the JD, and commences to SQ. the Lodge followed by the JD. At the NE corner he exchanges CB with the SD and continues to s..e the Lodge exchanging a CB with the J and S W\u2019s. who exit their chairs from the left following the D\u2019s as they pass. After exchanging CBs with the WM the ADC, D\u2019s and W\u2019s continue to s..e the Lodge to the door followed by the WM Officers of GL, PGL and IMs who exit through the D's crossed wands. The IG stands inside the door of the Lodge with the Alms Box. The Tyler stands outside the door with s..d."}, {"s": "WM", "t": "takes Candidate outside with him to be greeted by the Brethren."}], "2nd Degree - Passing": [{"s": "_dir", "t": "CEREMONY OF PASSING TO THE SECOND DEGREE"}, {"s": "_dir", "t": "Assembly in the Lodge Room"}, {"s": "DC", "t": "With wand. All below rank of IM please enter the Lodge. Brethren enter and occupy seats in the N or S, with the exception of the D's and W's. The W's stand immediately inside the door with the D's to their E, carrying their wands. The Juniors in the N. The IM's, Officers of Prov. GL and GL form a procession in two's outside the door, junior in rank first, WM, IPM and DC last."}, {"s": "Tyler", "t": "With sword, on signal from DC enters the Lodge Room. Upstanding Brethren to receive the WM. The D's followed by the W's lead the procession in narrow columns E along the N side of the Lodge stopping approx. 3 feet short of the KS and all turn inwards. The organist commences the opening ode, the D's cross their wands and the"}, {"s": "WM", "t": "followed by IPM enter and proceed under them to their seats. The DC directs the officers of GL and Prov. GL in two's seniors first, to the WM's right and IM's to the WM's left. The DC passes under the D's wands and commences to SQ. the Lodge. The D's, after uncrossing their wands, and W's follow. The DC stops in front of the JW's chair, the D's stop and cross their wands to allow the JW to enter his chair from the E side where he remains standing and exchanges CB with the DC. The DC, D's and SW proceed to the SW's chair where the procedure is repeated for the SW to enter his chair. The JD then goes to his chair and exchanges CB with the DC. The DC proceeds to the NE corner followed by the"}, {"s": "SD", "t": "who goes to his chair and exchanges CB with the DC; who proceeds to his seat immediately on the WM's right, unless an official visitor or representative of PGL is attending. Opening the Lodge in the First Degree"}, {"s": "WM", "t": "The WM gives one k..k followed by the S and J Ws. Brethren, assist me to open the Lodge. To JW, calling him by name Bro AB what is the first care of every Mason?"}, {"s": "JW", "t": "To see that the Lodge is properly Tyled."}, {"s": "WM", "t": "To JW Direct that duty to be done."}, {"s": "JW", "t": "To IG, by name Bro AB, see that the Lodge is properly Tyled."}, {"s": "IG", "t": "Gives three k..s which are answered by the Tyler. The IG turns to the JW, Bro AB, the Lodge is properly Tyled."}, {"s": "JW", "t": "WM, the Lodge is properly Tyled."}, {"s": "WM", "t": "To. SW, by name Bro AB the next care?"}, {"s": "SW", "t": "To see that none but Masons are present."}, {"s": "WM", "t": "To order, Brethren, in the First Degree. The Brethren take the s..p, and stand to order with the s..n of an EA Bro JW, how many principal officers are there in the Lodge?"}, {"s": "JW", "t": "Three: the WM, S and J W's."}, {"s": "WM", "t": "Bro SW, how many assistant officers are there?"}, {"s": "SW", "t": "Three, besides the Tyler or Outer Guard: namely, the S and J D\u2019s. and IG."}, {"s": "WM", "t": "To JW. The situation of the Tyler or Outer Guard?"}, {"s": "JW", "t": "Outside the door of the Lodge."}, {"s": "WM", "t": "To JW. His duty?"}, {"s": "JW", "t": "Being armed with a drawn sword, to keep off all intruders and Cowans to Masonry, and see that the Candidates are properly prepared."}, {"s": "WM", "t": "To IG. Bro, IG Your situation in the Lodge?"}, {"s": "IG", "t": "Within the entrance of the Lodge."}, {"s": "WM", "t": "To IG. Your duty?"}, {"s": "IG", "t": "To admit Masons on proof, receive the Candidates in due form, and obey the commands of the JW."}, {"s": "WM", "t": "To JD. Bro JD.Your situation in the Lodge?"}, {"s": "JD", "t": "At the right of the SW."}, {"s": "WM", "t": "To JD. Your duty?"}, {"s": "JD", "t": "To carry all messages and communications of the WM from the S to the JW, and see that the same are punctually obeyed."}, {"s": "WM", "t": "To SD. Bro SD, your situation in the Lodge?"}, {"s": "SD", "t": "At or near to the right of the WM."}, {"s": "WM", "t": "To SD. Your duty?"}, {"s": "SD", "t": "To bear all messages and commands of the WM to the SW and await the return of the JD."}, {"s": "WM", "t": "To JW. Bro JW, your place in the Lodge?"}, {"s": "JW", "t": "In the South."}, {"s": "WM", "t": "To JW. Why are you placed there?"}, {"s": "JW", "t": "To mark the Sun at its Meridian, to call the Brethren from labour to refreshment, and from refreshment to labour, that profit and pleasure may be the result."}, {"s": "WM", "t": "To SW. Bro SW, your place in the Lodge?"}, {"s": "SW", "t": "In the West."}, {"s": "WM", "t": "To SW. Why are you placed there?"}, {"s": "SW", "t": "To mark the setting Sun; to close the Lodge by command of the WM, after having seen that every Brother has had his due."}, {"s": "WM", "t": "To IPM. W.Bro IPM. The Master's place?"}, {"s": "IPM", "t": "In the East."}, {"s": "WM", "t": "To IPM. Why is he placed there?"}, {"s": "IPM", "t": "As the Sun rises in the East to open and enliven the day, so the WM is placed in the East to open the Lodge, and employ and instruct the Brethren in Freemasonry."}, {"s": "WM", "t": "The Lodge being duly formed, before I declare it open."}, {"s": "Chap", "t": "Let us invoke the assistance of the Great Architect of the Universe on all our undertakings; may our labours, thus begun in order, be conducted in peace, and closed in harmony."}, {"s": "ALL", "t": "So mote it be."}, {"s": "WM", "t": "Brethren, in the name of the Great Architect of the Universe, I declare the Lodge duly opened for the purposes of Freemasonry in the First Degree. The WM gives three k..s, when all drop s..n, k..s are then repeated by the S and J W's, IG and Tyler. On completion of the k..s the JD with wand squares the Lodge, crossing immediately in front of the JW, saluting the WM on passing, turns the first d..e TB and switches on the JW's and the SW's lights. The IPM opens the VoSL places both P..S of the c..s under the s..e, pointing W salutes the WM and returns to his seat. The SD switches on the WM's light. The JW lowers his c..n and the SW raises his. These movements are carried out simultaneously."}, {"s": "DC", "t": "Be seated Brethren. Special Greetings/Standing to Order in Respect of Departed Merit The WM gives one k..k followed by the S and J W's and then makes an appropriate announcement. Minutes"}, {"s": "WM", "t": "The WM gives one k..k followed by the S and J W\u2019s. The next business is to read and if approved, confirm the minutes of the last regular meeting (installation festival) Bro Sec, which must be read in the 1st Degree and no other."}, {"s": "SEC", "t": "Stands with s..p and s..n then reads the minutes. Those are the minutes as I have them recorded WM With s..p and s..n."}, {"s": "WM", "t": "WM gives one k..k followed by S and J W's. Brethren y
